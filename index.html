<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mia Visuals</title>
<meta name="description" content="An index of visual HTML experiments by Mia." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    /* Palette — editorial white */
    --bg:            #FDFCFA;
    --surface:       #FFFFFF;
    --ink:           #111111;
    --ink-muted:     #6B6B6B;
    --ink-softer:    #9A9A9A;
    --title-gray:    #6F6F6F;
    --border:        #ECEAE6;
    --border-strong: #DEDCD7;
    --accent:        #111111;

    /* Typography */
    --serif: "Fraunces", "Source Serif 4", "Spectral", Georgia, serif;
    --sans:  "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

    /* Spacing rhythm */
    --edge: clamp(20px, 4vw, 56px);
    --grid-gap: clamp(18px, 2.2vw, 32px);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--bg);
    min-height: 100dvh;
  }

  a { color: inherit; text-decoration: none; }

  /* ───────── Header ───────── */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px var(--edge) 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: saturate(1.05);
  }

  .site-header .mark {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 15px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .site-header .meta {
    display: flex;
    gap: 22px;
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .site-header .meta span.dot::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 999px;
    background: #2BA84A;
    margin-right: 8px;
    vertical-align: middle;
    transform: translateY(-1px);
  }

  /* ───────── Hero ───────── */
  .hero {
    padding: clamp(56px, 10vw, 120px) var(--edge) clamp(36px, 6vw, 72px);
    border-bottom: 1px solid var(--border);
  }

  .hero-inner {
    max-width: 1680px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: end;
  }

  h1.title {
    font-family: var(--serif);
    font-weight: 300;
    font-variation-settings: "opsz" 144;
    font-size: clamp(64px, 13vw, 220px);
    line-height: 0.92;
    letter-spacing: -0.035em;
    color: var(--title-gray);
    margin: 0;
  }

  h1.title em {
    font-style: italic;
    font-weight: 300;
  }

  .hero-aside {
    max-width: 320px;
    color: var(--ink-muted);
    font-size: 13px;
    line-height: 1.55;
    padding-bottom: 8px;
  }

  .hero-aside p { margin: 0 0 10px; }

  .hero-aside .count {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink);
  }

  /* ───────── Toolbar ───────── */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px var(--edge);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .toolbar .left, .toolbar .right {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .toolbar button {
    background: none;
    border: 0;
    padding: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
    letter-spacing: inherit;
    text-transform: inherit;
  }
  .toolbar button[aria-pressed="true"] { color: var(--ink); }
  .toolbar button:hover { color: var(--ink); }

  /* ───────── Pagination ───────── */
  .pagination {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .pagination button {
    background: none;
    border: 0;
    padding: 0;
    font: inherit;
    color: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    cursor: pointer;
    transition: color .2s ease;
  }
  .pagination button:hover:not([disabled]) { color: var(--ink); }
  .pagination button[disabled] {
    color: #CFCDC8;
    cursor: default;
  }

  .pagination .indicator {
    font-family: var(--sans);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    letter-spacing: 0.08em;
    min-width: 56px;
    text-align: center;
  }
  .pagination .indicator .sep {
    color: var(--border-strong);
    margin: 0 4px;
  }

  .pagination[hidden] { display: none; }

  .pagination .pages {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pagination .pages button {
    min-width: 26px;
    padding: 4px 6px;
    color: var(--ink-muted);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    position: relative;
  }
  .pagination .pages button:hover { color: var(--ink); }
  .pagination .pages button[aria-current="page"] {
    color: var(--ink);
    cursor: default;
  }
  .pagination .pages button[aria-current="page"]::after {
    content: "";
    position: absolute;
    left: 6px;
    right: 6px;
    bottom: -2px;
    height: 1px;
    background: var(--ink);
  }
  .pagination .pages .ellipsis {
    color: var(--ink-softer);
    user-select: none;
    padding: 0 2px;
    letter-spacing: 0.02em;
  }

  .pagination-bottom {
    display: flex;
    justify-content: center;
    padding: 28px var(--edge) clamp(60px, 8vw, 100px);
    border-top: 1px solid var(--border);
  }
  .pagination-bottom[hidden] { display: none; }

  /* ───────── Prominent "Next page" CTA ───────── */
  .next-cta {
    display: flex;
    justify-content: center;
    padding: clamp(24px, 4vw, 48px) var(--edge) clamp(20px, 3vw, 32px);
  }
  .next-cta[hidden] { display: none; }

  .next-cta button {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 15px 30px;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background-color .25s ease, color .25s ease, border-color .25s ease;
  }
  .next-cta button:hover {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .next-cta button .arrow {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 400;
    line-height: 1;
    display: inline-block;
    transition: transform .3s cubic-bezier(.2,.7,.2,1);
  }
  .next-cta button:hover .arrow            { transform: translateX(4px); }
  .next-cta button[data-loop-back]:hover .arrow { transform: translateX(-4px); }

  /* ───────── Grid ───────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--grid-gap) var(--grid-gap);
    padding: clamp(24px, 3vw, 40px) var(--edge) clamp(40px, 5vw, 72px);
  }

  @media (max-width: 820px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }

  /* ───────── Card ───────── */
  .card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    cursor: pointer;
  }

  .card .thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: border-color .3s ease, transform .5s cubic-bezier(.2,.7,.2,1);
  }

  /* Iframe scaled-thumbnail technique:
     render the embedded page at a large "desktop" viewport, then scale down.
     pointer-events disabled so the whole card handles clicks. */
  .card .thumb .scaler {
    position: absolute;
    top: 0;
    left: 0;
    width: 1400px;
    height: 1050px; /* 4:3 */
    transform-origin: top left;
    pointer-events: none;
  }

  .card .thumb iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
    overflow: hidden;
  }

  .card .thumb .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-softer);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background:
      linear-gradient(180deg, #FBFAF7 0%, #F5F3EE 100%);
    transition: opacity .4s ease;
  }
  .card .thumb .placeholder::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,.05) 1px, transparent 0);
    background-size: 14px 14px;
    opacity: .6;
  }
  .card .thumb .placeholder span { position: relative; z-index: 1; }

  .card .thumb .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 12px;
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
  }
  .card .thumb .overlay .pill {
    font-family: var(--sans);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    background: rgba(17,17,17,0.92);
    padding: 7px 11px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
  }

  .card:hover .thumb {
    border-color: var(--border-strong);
  }
  .card:hover .thumb .overlay { opacity: 1; }

  .card .index {
    position: absolute;
    top: 10px;
    left: 12px;
    font-family: var(--sans);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    color: rgba(17,17,17,0.55);
    mix-blend-mode: multiply;
    z-index: 2;
  }

  .card .meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 0 2px;
  }

  .card .meta .name {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 16px;
    letter-spacing: -0.008em;
    color: var(--ink);
    line-height: 1.25;
  }

  .card .meta .date {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-softer);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ───────── Static poster mode (mobile / low-power) ───────── */
  /* Same editorial palette as .placeholder, but treated as the final state
     rather than a loading stand-in. No iframe, no JS from the embedded page. */
  .card .thumb.poster {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 20px 52px;
    background: linear-gradient(180deg, #FBFAF7 0%, #F4F2EC 100%);
  }
  .card .thumb.poster::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,.05) 1px, transparent 0);
    background-size: 14px 14px;
    opacity: .55;
    pointer-events: none;
  }
  .card .thumb.poster .poster-body {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 92%;
  }
  .card .thumb.poster .poster-title {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(19px, 4.2vw, 26px);
    letter-spacing: -0.012em;
    line-height: 1.12;
    color: var(--ink);
  }
  .card .thumb.poster .poster-cue {
    position: absolute;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--sans);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-softer);
    z-index: 1;
  }

  /* ───────── States ───────── */
  .empty, .error {
    grid-column: 1 / -1;
    padding: 80px 0;
    text-align: center;
    color: var(--ink-muted);
    font-family: var(--serif);
    font-size: 18px;
  }
  .empty small, .error small {
    display: block;
    margin-top: 10px;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--ink-softer);
  }

  /* ───────── Footer ───────── */
  footer {
    padding: 28px var(--edge) 48px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-softer);
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="mark">Mia Visuals <span style="color:var(--ink-softer)">— Index</span></div>
  <div class="meta">
    <span class="dot">Live</span>
    <span id="lastUpdated">—</span>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1 class="title">Mia <em>Visuals</em></h1>
    <aside class="hero-aside">
      <p>A running index of HTML experiments — sketches, prototypes, and visual studies.</p>
      <p class="count"><span id="count">—</span> pieces, updated automatically at deploy.</p>
    </aside>
  </div>
</section>

<nav class="toolbar" aria-label="View controls">
  <div class="left pagination" id="paginationTop" hidden>
    <button type="button" data-page-dir="prev" aria-label="Previous page">Previous</button>
    <div class="pages" aria-label="Jump to page"></div>
    <button type="button" data-page-dir="next" aria-label="Next page">Next</button>
  </div>
  <div class="right">
    <button type="button" data-sort="modified" aria-pressed="true">Recent</button>
    <button type="button" data-sort="title"    aria-pressed="false">A–Z</button>
  </div>
</nav>

<main class="grid" id="grid" aria-live="polite">
  <!-- Cards injected here -->
</main>

<div class="next-cta" id="nextCta" hidden>
  <button type="button" id="nextCtaBtn">
    Next page <span class="arrow" aria-hidden="true">→</span>
  </button>
</div>

<nav class="pagination-bottom" id="paginationBottomWrap" aria-label="Pagination" hidden>
  <div class="pagination">
    <button type="button" data-page-dir="prev" aria-label="Previous page">Previous</button>
    <div class="pages" aria-label="Jump to page"></div>
    <button type="button" data-page-dir="next" aria-label="Next page">Next</button>
  </div>
</nav>

<footer>
  <span>© Mia Visuals</span>
  <span id="footerCount">—</span>
</footer>

<script>
(() => {
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const footerCountEl = document.getElementById('footerCount');
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const sortButtons = document.querySelectorAll('[data-sort]');

  /* Pagination refs */
  const paginationTop    = document.getElementById('paginationTop');
  const paginationBottom = document.getElementById('paginationBottomWrap');
  const nextCtaWrap      = document.getElementById('nextCta');
  const nextCtaBtn       = document.getElementById('nextCtaBtn');

  /* ─── Mode detection ─────────────────────────────────────────
     Mobile / touch / small-viewport devices use static posters.
     No iframes created, no embedded JS ever runs on the index.
     The actual visual still opens on tap. */
  const prefersStatic =
    matchMedia('(hover: none) and (pointer: coarse)').matches ||
    matchMedia('(max-width: 820px)').matches;

  /* Hard cap on concurrent live previews on desktop. Even when the
     viewport + rootMargin would technically cover more cards, we never
     exceed this. The furthest-from-center card gets unloaded first. */
  const MAX_ACTIVE = 6;
  const active = new Set();

  /* Pagination — only items on the current page ever exist in the DOM. */
  const PER_PAGE = 6;
  let currentPage = 1;

  let visuals = [];
  let currentSort = 'modified';

  /* ─── Utilities ──────────────────────────────────────────── */
  const fmtDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  };

  const escapeHtml = (s) => String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const escapeAttr = (s) => escapeHtml(s);

  const fitScaler = (card) => {
    const thumb  = card.querySelector('.thumb');
    const scaler = card.querySelector('.scaler');
    if (!thumb || !scaler) return;
    const w = thumb.clientWidth;
    if (!w) return;
    scaler.style.transform = `scale(${w / 1400})`;
  };

  /* ─── Live-preview lifecycle (desktop only) ───────────────── */

  const activate = (card) => {
    if (active.has(card)) return;
    const iframe = card.querySelector('iframe');
    if (!iframe) return;
    const src = iframe.getAttribute('data-src');
    if (!src || iframe.src) return;

    iframe.src = src;
    active.add(card);
    iframe.addEventListener('load', () => {
      const ph = card.querySelector('.placeholder');
      if (ph) ph.style.opacity = '0';
      fitScaler(card);
    }, { once: true });

    enforceLimit(card);
  };

  /* Fully tears down the embedded page — replaces the iframe with a fresh
     (src-less) clone so any rAF loops, WebGL contexts, timers, and workers
     inside it are released. */
  const deactivate = (card) => {
    if (!active.has(card)) return;
    const oldIframe = card.querySelector('iframe');
    if (oldIframe) {
      const src = oldIframe.getAttribute('data-src');
      const fresh = oldIframe.cloneNode(false);
      fresh.removeAttribute('src');
      if (src) fresh.setAttribute('data-src', src);
      oldIframe.replaceWith(fresh);
    }
    const ph = card.querySelector('.placeholder');
    if (ph) ph.style.opacity = '';
    active.delete(card);
  };

  const enforceLimit = (justAdded) => {
    if (active.size <= MAX_ACTIVE) return;
    const viewCenter = innerHeight / 2;
    const distFromCenter = (el) => {
      const r = el.getBoundingClientRect();
      return Math.abs((r.top + r.bottom) / 2 - viewCenter);
    };
    // Evict furthest-from-viewport first; never evict the card we just added.
    const sorted = [...active].sort((a, b) => distFromCenter(b) - distFromCenter(a));
    for (const victim of sorted) {
      if (active.size <= MAX_ACTIVE) break;
      if (victim !== justAdded) deactivate(victim);
    }
  };

  /* ─── Observer (desktop only) ─────────────────────────────── */
  const io = (prefersStatic || !('IntersectionObserver' in window))
    ? null
    : new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting) activate(entry.target);
          else deactivate(entry.target);
        }
      }, { rootMargin: '200px 0px', threshold: 0 });

  /* ─── Rendering ──────────────────────────────────────────── */
  const renderCard = (v, i) => {
    const indexLabel = String(i + 1).padStart(2, '0');
    const card = document.createElement('a');
    card.className = 'card';
    card.href = v.path;
    card.target = '_blank';
    card.rel = 'noopener';

    if (prefersStatic) {
      // Static poster — zero iframes, zero embedded JS.
      card.innerHTML = `
        <div class="thumb poster">
          <span class="index">${indexLabel}</span>
          <div class="poster-body">
            <div class="poster-title">${escapeHtml(v.title)}</div>
          </div>
          <div class="poster-cue">Open visual ↗</div>
        </div>
        <div class="meta">
          <div class="name">${escapeHtml(v.title)}</div>
          <div class="date">${fmtDate(v.modified)}</div>
        </div>
      `;
    } else {
      // Live preview — iframe loaded lazily, torn down when out of viewport.
      card.innerHTML = `
        <div class="thumb">
          <span class="index">${indexLabel}</span>
          <div class="placeholder" aria-hidden="true"><span>Loading preview</span></div>
          <div class="scaler">
            <iframe
              title="${escapeHtml(v.title)} preview"
              data-src="${escapeAttr(v.preview || v.path)}"
              loading="lazy"
              scrolling="no"
              sandbox="allow-scripts allow-same-origin"
              tabindex="-1"
              aria-hidden="true"></iframe>
          </div>
          <div class="overlay"><span class="pill">Open ↗</span></div>
        </div>
        <div class="meta">
          <div class="name">${escapeHtml(v.title)}</div>
          <div class="date">${fmtDate(v.modified)}</div>
        </div>
      `;
    }

    return card;
  };

  const render = () => {
    /* Page-level teardown: every card from the previous page is
       removed from the DOM, so no offscreen iframe keeps running.
       Disconnecting the observer also drops its refs to those nodes
       so they're eligible for GC. */
    if (io) io.disconnect();
    [...active].forEach(deactivate);
    grid.innerHTML = '';

    if (!visuals.length) {
      grid.innerHTML = `
        <div class="empty">
          No visuals yet.
          <small>Drop an .html file into <code>/visuals</code> and redeploy.</small>
        </div>`;
      countEl.textContent = '0';
      footerCountEl.textContent = '0 pieces';
      updatePaginationUI(1, 1, 0);
      return;
    }

    const sorted = [...visuals].sort((a, b) => {
      if (currentSort === 'title') return a.title.localeCompare(b.title);
      return new Date(b.modified) - new Date(a.modified);
    });

    const total = sorted.length;
    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    // Clamp in case currentPage is stale (e.g. after sort/empty).
    currentPage = Math.min(Math.max(1, currentPage), totalPages);

    const start = (currentPage - 1) * PER_PAGE;
    const end   = Math.min(start + PER_PAGE, total);
    const pageItems = sorted.slice(start, end);

    pageItems.forEach((v, localIdx) => {
      // Use the absolute index from the sorted list so card numerals
      // stay stable across pages (page 2 shows 07, 08, …).
      const absoluteIdx = start + localIdx;
      const card = renderCard(v, absoluteIdx);
      grid.appendChild(card);
      if (!prefersStatic) {
        fitScaler(card);
        if (io) io.observe(card);
      }
    });

    updatePaginationUI(currentPage, totalPages, total);
  };

  /* ─── Pagination UI ──────────────────────────────────────── */

  /* Compact numbered list:
     ≤ 7 pages → show every page.
     > 7 pages → first, last, and a window around current, with ellipses. */
  const buildPageList = (current, total) => {
    if (total <= 7) {
      return Array.from({ length: total }, (_, i) => i + 1);
    }
    if (current <= 3) {
      return [1, 2, 3, 4, 5, '…', total];
    }
    if (current >= total - 2) {
      return [1, '…', total - 4, total - 3, total - 2, total - 1, total];
    }
    return [1, '…', current - 1, current, current + 1, '…', total];
  };

  const renderPageList = (container, current, total) => {
    container.innerHTML = '';
    const frag = document.createDocumentFragment();
    for (const p of buildPageList(current, total)) {
      if (p === '…') {
        const span = document.createElement('span');
        span.className = 'ellipsis';
        span.setAttribute('aria-hidden', 'true');
        span.textContent = '…';
        frag.appendChild(span);
      } else {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.pageNum = String(p);
        btn.textContent = String(p).padStart(2, '0');
        btn.setAttribute('aria-label', `Page ${p}`);
        if (p === current) btn.setAttribute('aria-current', 'page');
        frag.appendChild(btn);
      }
    }
    container.appendChild(frag);
  };

  const updatePaginationUI = (page, totalPages, total) => {
    const show = total > 0 && totalPages > 1;
    paginationTop.hidden    = !show;
    paginationBottom.hidden = !show;
    nextCtaWrap.hidden      = !show;
    if (!show) return;

    // Numbered page lists (both top and bottom share this markup).
    document.querySelectorAll('.pagination .pages').forEach(container => {
      renderPageList(container, page, totalPages);
    });

    // Prev/Next disabled states at boundaries.
    document.querySelectorAll('[data-page-dir]').forEach(btn => {
      const dir = btn.dataset.pageDir;
      btn.disabled = (dir === 'prev' && page <= 1) ||
                     (dir === 'next' && page >= totalPages);
    });

    // Prominent CTA: forward on earlier pages, loop-back on the last one.
    if (page >= totalPages) {
      nextCtaBtn.innerHTML = '<span class="arrow" aria-hidden="true">←</span> Back to first page';
      nextCtaBtn.setAttribute('aria-label', 'Back to first page');
      nextCtaBtn.dataset.loopBack = 'true';
    } else {
      nextCtaBtn.innerHTML = `Next page <span class="arrow" aria-hidden="true">→</span>`;
      nextCtaBtn.setAttribute('aria-label', `Go to page ${page + 1} of ${totalPages}`);
      delete nextCtaBtn.dataset.loopBack;
    }
  };

  const goToPage = (n) => {
    const totalPages = Math.max(1, Math.ceil(visuals.length / PER_PAGE));
    const next = Math.min(Math.max(1, n), totalPages);
    if (next === currentPage) return;
    currentPage = next;
    render();
    scrollGalleryIntoView();
  };

  /* Only scrolls UP to the gallery — if the user clicks Next on the top
     pagination, they're already at the top and we don't yank them. If they
     click from the bottom pagination, we bring them back up. */
  const scrollGalleryIntoView = () => {
    const header  = document.querySelector('.site-header');
    const toolbar = document.querySelector('.toolbar');
    if (!toolbar) return;
    const headerH = header ? header.offsetHeight : 0;
    const target  = toolbar.getBoundingClientRect().top + window.scrollY - headerH - 8;
    if (window.scrollY > target + 2) {
      const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
      window.scrollTo({ top: Math.max(0, target), behavior: reduced ? 'auto' : 'smooth' });
    }
  };

  /* ─── Wire up ────────────────────────────────────────────── */

  sortButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      currentSort = btn.dataset.sort;
      sortButtons.forEach(b => b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'));
      currentPage = 1; // Start from page 1 after a sort change.
      render();
    });
  });

  /* Event delegation on both pagination strips — handles Prev, Next,
     and the dynamically-rendered numbered page buttons in one place. */
  document.querySelectorAll('.pagination').forEach(pg => {
    pg.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn || btn.disabled) return;

      if (btn.dataset.pageDir === 'prev')       goToPage(currentPage - 1);
      else if (btn.dataset.pageDir === 'next')  goToPage(currentPage + 1);
      else if (btn.dataset.pageNum)             goToPage(Number(btn.dataset.pageNum));
    });
  });

  /* Prominent CTA: forward on earlier pages, loops to page 1 on the last. */
  nextCtaBtn.addEventListener('click', () => {
    const totalPages = Math.max(1, Math.ceil(visuals.length / PER_PAGE));
    goToPage(currentPage >= totalPages ? 1 : currentPage + 1);
  });

  // Re-fit scalers on resize (no-op in static mode).
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (!prefersStatic) document.querySelectorAll('.card').forEach(fitScaler);
    }, 80);
  });

  /* When the tab goes to the background, kill every live preview so the
     machine isn't running N animation loops invisibly. Reactivate visible
     ones when we come back. */
  document.addEventListener('visibilitychange', () => {
    if (prefersStatic || !io) return;
    if (document.hidden) {
      [...active].forEach(deactivate);
    } else {
      // Force the observer to re-evaluate what's currently visible.
      document.querySelectorAll('.card').forEach(card => {
        io.unobserve(card);
        io.observe(card);
      });
    }
  });

  /* ─── Load manifest ──────────────────────────────────────── */
  fetch('visuals.json', { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      visuals = Array.isArray(data.visuals) ? data.visuals : [];
      countEl.textContent = visuals.length;
      footerCountEl.textContent = `${visuals.length} piece${visuals.length === 1 ? '' : 's'}`;
      if (data.generatedAt) {
        lastUpdatedEl.textContent = 'Updated ' + fmtDate(data.generatedAt);
      }
      render();
    })
    .catch(err => {
      console.error('Failed to load visuals.json', err);
      grid.innerHTML = `
        <div class="error">
          Couldn't load the index.
          <small>Make sure <code>visuals.json</code> is present at the site root.</small>
        </div>`;
    });
})();
</script>

</body>
</html>
