<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Digital Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    background: #000;
    width: 100%; height: 100%;
    cursor: grab;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body:active { cursor: grabbing; }
  canvas { display: block; }

  /* ---------- LABEL PILLS (more visible now) ---------- */
  #labels {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .pill {
    position: absolute;
    top: 0; left: 0;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px 6px 10px;
    background: rgba(22, 22, 30, 0.96);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.38);
    border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.005em;
    white-space: nowrap;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
    transform-origin: center center;
    will-change: transform, opacity;
    transition:
      opacity 0.45s ease,
      color 0.35s ease,
      background 0.35s ease,
      border-color 0.35s ease;
    box-shadow:
      0 6px 22px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .pill.l1 { font-size: 13px; font-weight: 600; padding: 7px 14px 7px 12px; }
  .pill.l2 { font-size: 11.5px; }
  .pill.l3 {
    font-size: 10.5px;
    padding: 5px 10px 5px 9px;
    color: rgba(255,255,255,0.95);
  }
  .pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 9px currentColor;
  }
  .pill.l2 .dot, .pill.l3 .dot { width: 6px; height: 6px; }
  .pill:hover {
    background: rgba(36, 36, 44, 0.98);
    border-color: rgba(255,255,255,0.55);
    color: #fff;
  }
  .pill.hidden {
    opacity: 0 !important;
    pointer-events: none;
  }
  .pill.focused { z-index: 5; }

  /* ---------- CARD ---------- */
  #cards { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

  .card {
    position: fixed;
    pointer-events: auto;
    box-sizing: border-box;
    color: #fff;
    font-family: 'Inter', sans-serif;
    background: rgba(18, 18, 24, 0.88);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    backdrop-filter: blur(14px) saturate(1.2);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 100px;  /* starts as pill */
    overflow: hidden;
    box-shadow:
      0 4px 16px rgba(0, 0, 0, 0.55),
      0 0 0 0.5px rgba(255,255,255,0.03) inset;
    will-change: transform, width, height, border-radius, left, top;
    transition:
      left 0.52s cubic-bezier(0.22, 1, 0.36, 1),
      top 0.52s cubic-bezier(0.22, 1, 0.36, 1),
      width 0.52s cubic-bezier(0.22, 1, 0.36, 1),
      height 0.52s cubic-bezier(0.22, 1, 0.36, 1),
      border-radius 0.52s cubic-bezier(0.22, 1, 0.36, 1),
      background 0.35s ease,
      border-color 0.35s ease,
      box-shadow 0.35s ease;
  }
  .card.open {
    background: rgba(14, 14, 20, 0.94);
    border-color: rgba(255, 255, 255, 0.14);
    box-shadow:
      0 22px 60px rgba(0, 0, 0, 0.6),
      0 0 0 0.5px rgba(255,255,255,0.04) inset;
  }
  .card-inner {
    /* Wraps the whole card content, clipped by card border-radius */
    width: 100%;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px 7px 12px;
    white-space: nowrap;
    transition: padding 0.52s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .card.open .card-header {
    padding: 18px 16px 10px 18px;
  }
  .card-header .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 9px currentColor;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.005em;
    color: rgba(255,255,255,0.98);
    transition:
      font-size 0.52s cubic-bezier(0.22, 1, 0.36, 1),
      letter-spacing 0.52s ease;
  }
  .card.open .card-title {
    font-size: 16px;
    letter-spacing: 0.003em;
  }
  .card-close {
    margin-left: auto;
    background: transparent;
    border: 0;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    width: 24px; height: 24px;
    padding: 0;
    font-size: 20px;
    line-height: 20px;
    opacity: 0;
    transition: opacity 0.28s ease, color 0.2s ease;
    pointer-events: none;
  }
  .card.open .card-close {
    opacity: 1;
    pointer-events: auto;
  }
  .card-close:hover { color: rgba(255,255,255,0.95); }

  .card-body {
    padding: 2px 20px 20px 20px;
    opacity: 0;
    transform: translateY(6px);
    transition:
      opacity 0.3s ease 0.18s,
      transform 0.32s cubic-bezier(0.22, 1, 0.36, 1) 0.18s;
    overflow-y: auto;
    overscroll-behavior: contain;
    max-height: calc(100vh - 120px);
  }
  .card.open .card-body {
    opacity: 1;
    transform: translateY(0);
  }

  .card-category {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
    margin-bottom: 12px;
  }
  .card-insight {
    font-size: 14px;
    line-height: 1.55;
    color: rgba(255,255,255,0.96);
    font-weight: 400;
    margin-bottom: 18px;
  }
  .card-section { margin-bottom: 14px; }
  .card-section-label {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.42);
    font-weight: 500;
    margin-bottom: 7px;
  }
  .card-section-text {
    font-size: 12.5px;
    line-height: 1.5;
    color: rgba(255,255,255,0.82);
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .card-tag {
    display: inline-block;
    padding: 3px 9px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    font-size: 10.5px;
    color: rgba(255,255,255,0.86);
  }
  .card-note {
    margin-top: 4px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11.5px;
    color: rgba(255,255,255,0.6);
    font-style: italic;
    line-height: 1.45;
  }

  #hint {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.04em;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.6s ease;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>

        float clusterAct = 0.70 + 0.18 * cBeat + 0.12 * cEnv;
        float isCluster = step(0.5, aClusterCore);
        float pulse = mix(bgPulse, clusterAct, isCluster);
        float hoverMatch = 1.0 - step(0.5, abs(aClusterId - uHoverCluster));
        float hover = uHoverStrength * hoverMatch * isCluster;
        float hoverBoost = 1.0 + 0.55 * hover;
        float focusMatch = 1.0 - step(0.5, abs(aClusterId - uFocusCluster));
        float focusedBoost = 1.0 + 0.35 * uFocusStrength * focusMatch * isCluster;
        float dimOther = 1.0 - 0.62 * uFocusStrength * (1.0 - focusMatch);
        vColor = aColor * pulse * hoverBoost * focusedBoost * dimOther;
        vec3 breathed = breathingDisp(position, aSeed, uTime);
        vec4 mv = modelViewMatrix * vec4(breathed, 1.0);
        float sizeMult = 0.94 + 0.10 * pulse + 0.18 * hover;
        gl_PointSize = aSize * 920.0 * uPxR * sizeMult / -mv.z;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform sampler2D uMap; varying vec3 vColor;
      void main() {
        vec4 t = texture2D(uMap, gl_PointCoord);
        if (t.a < 0.005) discard;
        gl_FragColor = vec4(vColor, 1.0) * t;
      }
    `,
    transparent: true, blending: THREE.AdditiveBlending,
    depthWrite: false, depthTest: false
  });
  const points = new THREE.Points(ptGeo, ptMat);

  // Hub halos
  const HN = HUB_COUNT;
  const hPos = new Float32Array(HN*3), hCol = new Float32Array(HN*3),
        hSz = new Float32Array(HN), hSeed = new Float32Array(HN),
        hCluster = new Float32Array(HN), hCore = new Float32Array(HN);
  for (let i=0; i<HN; i++) {
    const idx = hubIdx[i];
    const principal = isPrincipal[idx]===1;
    hPos[i*3]=positions[idx][0]; hPos[i*3+1]=positions[idx][1]; hPos[i*3+2]=positions[idx][2];
    const haloBright = principal ? 0.65 : 0.45;
    hCol[i*3]=cols[idx][0]*haloBright; hCol[i*3+1]=cols[idx][1]*haloBright; hCol[i*3+2]=cols[idx][2]*haloBright;
    hSz[i]=(principal?1.20:0.55) + Math.random()*0.30;
    hSeed[i]=seeds[idx]; hCluster[i]=i; hCore[i]=2;
  }
  const hGeo = new THREE.BufferGeometry();
  hGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3));
  hGeo.setAttribute('aColor', new THREE.BufferAttribute(hCol, 3));
  hGeo.setAttribute('aSize', new THREE.BufferAttribute(hSz, 1));
  hGeo.setAttribute('aSeed', new THREE.BufferAttribute(hSeed, 1));
  hGeo.setAttribute('aClusterId', new THREE.BufferAttribute(hCluster, 1));
  hGeo.setAttribute('aClusterCore', new THREE.BufferAttribute(hCore, 1));
  const hubGlow = new THREE.Points(hGeo, ptMat);

  // Lines
  const cellSize = 0.15;
  const grid = new Map();
  function cellKey(x,y,z){return Math.floor(x/cellSize)+'|'+Math.floor(y/cellSize)+'|'+Math.floor(z/cellSize);}
  for (let i=0;i<N;i++){const k=cellKey(positions[i][0],positions[i][1],positions[i][2]);
    let arr=grid.get(k); if(!arr){arr=[];grid.set(k,arr);} arr.push(i);}
  function neighbors(x,y,z,range){
    const r=Math.ceil(range/cellSize);
    const ix=Math.floor(x/cellSize), iy=Math.floor(y/cellSize), iz=Math.floor(z/cellSize);
    const out=[];
    for (let dx=-r;dx<=r;dx++) for (let dy=-r;dy<=r;dy++) for (let dz=-r;dz<=r;dz++){
      const k=(ix+dx)+'|'+(iy+dy)+'|'+(iz+dz);
      const arr=grid.get(k);
      if (arr) for (let j=0;j<arr.length;j++) out.push(arr[j]);
    } return out;
  }
  const lineV=[], lineC=[], lineCl=[], lineCo=[], lineSd=[];
  const seen=new Set();
  for (let i=0;i<N;i++){
    const p1=positions[i];
    const isH=isHub[i]===1;
    const range=isH?0.42:0.165; const maxConn=isH?24:4;
    const cands=neighbors(p1[0],p1[1],p1[2],range);
    const dists=[];
    for (let k=0;k<cands.length;k++){
      const j=cands[k]; if (j===i) continue;
      const p2=positions[j];
      const dx=p1[0]-p2[0], dy=p1[1]-p2[1], dz=p1[2]-p2[2];
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if (d<range) dists.push({j,d});
    }
    dists.sort((a,b)=>a.d-b.d);
    const n=Math.min(dists.length, maxConn);
    for (let k=0;k<n;k++){
      const j=dists[k].j;
      const ek=i<j?(i+','+j):(j+','+i);
      if (seen.has(ek)) continue;
      seen.add(ek);
      const p2=positions[j];
      const dr=dists[k].d/range;
      let opa;
      if (isH || isHub[j]===1) opa = 0.60*(1-dr*dr);
      else if (clusterCore[i]>0 && clusterCore[j]>0 && clusterId[i]===clusterId[j]) opa = 0.45*(1-dr);
      else if (clusterCore[i]>0 || clusterCore[j]>0) opa = 0.22*(1-dr);
      else opa = 0.14*(1-dr);
      const c1=cols[i], c2=cols[j];
      lineV.push(p1[0],p1[1],p1[2], p2[0],p2[1],p2[2]);
      lineC.push(c1[0]*opa,c1[1]*opa,c1[2]*opa, c2[0]*opa,c2[1]*opa,c2[2]*opa);
      lineCl.push(clusterId[i], clusterId[j]);
      lineCo.push(clusterCore[i], clusterCore[j]);
      lineSd.push(seeds[i], seeds[j]);
    }
  }
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lineV), 3));
  lineGeo.setAttribute('aColor', new THREE.BufferAttribute(new Float32Array(lineC), 3));
  lineGeo.setAttribute('aClusterId', new THREE.BufferAttribute(new Float32Array(lineCl), 1));
  lineGeo.setAttribute('aClusterCore', new THREE.BufferAttribute(new Float32Array(lineCo), 1));
  lineGeo.setAttribute('aSeed', new THREE.BufferAttribute(new Float32Array(lineSd), 1));

  const lineMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uHoverCluster: { value: -1.0 }, uHoverStrength: { value: 0.0 },
      uFocusCluster: { value: -1.0 }, uFocusStrength: { value: 0.0 }
    },
    vertexShader: `
      attribute vec3 aColor;
      attribute float aClusterId, aClusterCore, aSeed;
      varying vec3 vColor;
      uniform float uTime, uHoverCluster, uHoverStrength, uFocusCluster, uFocusStrength;
      ${breathingGLSL}
      void main() {
        float cPhase = aClusterId * 2.3994;
        float cBeat = 0.50 + 0.50 * sin(uTime * 0.55 + cPhase);
        float cEnv  = 0.50 + 0.50 * sin(uTime * 0.17 + cPhase * 0.41 + 1.7);
        float clusterAct = 0.78 + 0.14 * cBeat + 0.08 * cEnv;
        float isCluster = step(0.5, aClusterCore);
        float pulse = mix(0.95, clusterAct, isCluster);
        float hoverMatch = 1.0 - step(0.5, abs(aClusterId - uHoverCluster));
        float hover = uHoverStrength * hoverMatch * isCluster;
        float hoverBoost = 1.0 + 0.70 * hover;
        float focusMatch = 1.0 - step(0.5, abs(aClusterId - uFocusCluster));
        float focusedBoost = 1.0 + 0.40 * uFocusStrength * focusMatch * isCluster;
        float dimOther = 1.0 - 0.72 * uFocusStrength * (1.0 - focusMatch);
        vColor = aColor * pulse * hoverBoost * focusedBoost * dimOther;
        vec3 breathed = breathingDisp(position, aSeed, uTime);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(breathed, 1.0);
      }
    `,
    fragmentShader: `varying vec3 vColor; void main(){gl_FragColor=vec4(vColor,1.0);}`,
    transparent: true, blending: THREE.AdditiveBlending,
    depthWrite: false, depthTest: false
  });
  const lines = new THREE.LineSegments(lineGeo, lineMat);

  const root = new THREE.Group();
  root.add(lines); root.add(hubGlow); root.add(points);
  scene.add(root);

  // ============================================================
  // LABEL PILLS
  // ============================================================
  const labelsEl = document.getElementById('labels');
  const hintEl = document.getElementById('hint');
  const cardsEl = document.getElementById('cards');

  const labelNodes = [];

  function makePill(level, text, tone) {
    const el = document.createElement('div');
    el.className = 'pill ' + level;
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = TONE_COLOR[tone];
    dot.style.color = TONE_COLOR[tone];
    el.appendChild(dot);
    const txt = document.createElement('span');
    txt.textContent = text;
    el.appendChild(txt);
    labelsEl.appendChild(el);
    return el;
  }

  for (let pi=0; pi<principals.length; pi++) {
    const principal = principals[pi];
    const cat = CATEGORIES[principal.categoryIndex];
    const el = makePill('l1', cat.name, cat.tone);
    const node = {
      level: 'l1', el,
      text: cat.name, tone: cat.tone,
      particleIndex: principal.particleIndex,
      seed: seeds[principal.particleIndex],
      principalIdx: pi,
      screenX: 0, screenY: 0, opacity: 0, scale: 1
    };
    labelNodes.push(node);
    principal._l1Node = node;

    el.addEventListener('click', e => { e.stopPropagation(); handlePillClick(node); });
    el.addEventListener('pointerenter', () => setHoverPrincipal(pi));
    el.addEventListener('pointerleave', () => setHoverPrincipal(-1));

    for (let li=0; li<principal.l2List.length; li++) {
      const l2 = principal.l2List[li];
      const l2Def = cat.l2[l2.defIdx];
      const el2 = makePill('l2', l2Def.n, l2Def.t);
      const n2 = {
        level: 'l2', el: el2,
        text: l2Def.n, tone: l2Def.t,
        particleIndex: l2.particleIndex,
        seed: seeds[l2.particleIndex],
        principalIdx: pi, l2Idx: li,
        screenX: 0, screenY: 0, opacity: 0, scale: 1
      };
      labelNodes.push(n2);
      l2._l2Node = n2;
      el2.addEventListener('click', e => { e.stopPropagation(); handlePillClick(n2); });
      el2.addEventListener('pointerenter', () => setHoverPrincipal(pi));
      el2.addEventListener('pointerleave', () => setHoverPrincipal(-1));

      for (let l3i=0; l3i<l2.l3List.length; l3i++) {
        const l3 = l2.l3List[l3i];
        const l3Def = l2Def.l3[l3.defIdx];
        if (!l3Def) continue;
        const el3 = makePill('l3', l3Def.n, l2Def.t);
        const n3 = {
          level: 'l3', el: el3,
          text: l3Def.n, tone: l2Def.t,
          particleIndex: l3.particleIndex,
          seed: seeds[l3.particleIndex],
          principalIdx: pi, l2Idx: li, l3Idx: l3i,
          screenX: 0, screenY: 0, opacity: 0, scale: 1
        };
        labelNodes.push(n3);
        l3._l3Node = n3;
        el3.addEventListener('click', e => { e.stopPropagation(); handlePillClick(n3); });
      }
    }
  }

  // ============================================================
  // FOCUS STATE
  // ============================================================
  let focus = { level: 0 };
  let hoveredPrincipal = -1;
  let interacted = false;

  let focalTargetX=0, focalTargetY=0, focalTargetZ=0;
  let focalCurrentX=0, focalCurrentY=0, focalCurrentZ=0;

  function setFocus(newFocus) {
    focus = newFocus;
    if (focus.level === 0) {
      focalTargetX=0; focalTargetY=0; focalTargetZ=0;
      targetCameraZ = LEVELS[0].home;
    } else if (focus.level === 1) {
      const pr = principals[focus.principalIdx];
      const p = positions[pr.particleIndex];
      focalTargetX=p[0]; focalTargetY=p[1]; focalTargetZ=p[2];
      targetCameraZ = LEVELS[1].home;
    } else if (focus.level === 2) {
      const pr = principals[focus.principalIdx];
      const l2 = pr.l2List[focus.l2Idx];
      const p = positions[l2.particleIndex];
      focalTargetX=p[0]; focalTargetY=p[1]; focalTargetZ=p[2];
      targetCameraZ = LEVELS[2].home;
    }
    if (!interacted) { interacted = true; hintEl.classList.add('hidden'); }
  }

  function focusPrincipal(pi) { setFocus({ level: 1, principalIdx: pi }); }
  function focusL2(pi, li)   { setFocus({ level: 2, principalIdx: pi, l2Idx: li }); }
  function popFocus() {
    if (focus.level === 2) setFocus({ level: 1, principalIdx: focus.principalIdx });
    else if (focus.level === 1) setFocus({ level: 0 });
  }
  function setHoverPrincipal(pi) { hoveredPrincipal = pi; }

  let focusStrength = 0;
  let focusClusterSlot = -1;

  // ============================================================
  // CARD MORPH SYSTEM
  //
  // A card element starts at the clicked pill's rect, styled as a
  // pill, then animates (via CSS transitions) to full card size &
  // position. The pill fades while the card is open. On close,
  // the card collapses back to the pill's *current* rect (pills
  // breathe, so we re-measure at close time). Clicks outside and
  // ESC close.
  // ============================================================
  let currentCard = null;   // { node, el }
  let pendingOpen = null;   // { node, token } when waiting for focus anim
  let openToken = 0;

  function isMobile() { return window.innerWidth < 640; }

  function buildCardInner(node) {
    const pr = principals[node.principalIdx];
    const cat = CATEGORIES[pr.categoryIndex];

    let title, category, insight, triggers, origin, related, note;
    if (node.level === 'l1') {
      title = cat.name;
      category = 'Region · Inner world';
      insight  = cat.card.insight;
      triggers = cat.card.triggers || [];
      origin   = cat.card.origin;
      related  = cat.card.related || [];
      note     = cat.card.note;
    } else if (node.level === 'l2') {
      const l2Def = cat.l2[pr.l2List[node.l2Idx].defIdx];
      title = l2Def.n;
      category = cat.name + ' · Theme';
      insight  = l2Def.card.insight;
      triggers = l2Def.card.triggers || [];
      origin   = l2Def.card.origin;
      related  = l2Def.card.related || [];
      note     = l2Def.card.note;
    } else {
      const l2Entry = pr.l2List[node.l2Idx];
      const l2Def = cat.l2[l2Entry.defIdx];
      const l3Def = l2Def.l3[l2Entry.l3List[node.l3Idx].defIdx];
      title = l3Def.n;
      category = cat.name + ' · ' + l2Def.n;
      insight  = l3Def.insight;
      triggers = l2Def.card.triggers || [];
      origin   = l2Def.card.origin;
      related  = l2Def.card.related || [];
    }

    const dotColor = TONE_COLOR[node.tone];
    const esc = s => s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tagsHTML = arr => arr.map(t => `<span class="card-tag">${esc(t)}</span>`).join('');

    return `
      <div class="card-inner">
        <div class="card-header">
          <span class="dot" style="background:${dotColor};color:${dotColor}"></span>
          <span class="card-title">${esc(title)}</span>
          <button class="card-close" aria-label="Close">×</button>
        </div>
        <div class="card-body">
          <div class="card-category">${esc(category)}</div>
          <div class="card-insight">${esc(insight)}</div>
          ${triggers.length ? `
            <div class="card-section">
              <div class="card-section-label">Triggers</div>
              <div class="card-tags">${tagsHTML(triggers)}</div>
            </div>` : ''}
          ${origin ? `
            <div class="card-section">
              <div class="card-section-label">Origin / context</div>
              <div class="card-section-text">${esc(origin)}</div>
            </div>` : ''}
          ${related && related.length ? `
            <div class="card-section">
              <div class="card-section-label">Related themes</div>
              <div class="card-tags">${tagsHTML(related)}</div>
            </div>` : ''}
          ${note ? `<div class="card-note">${esc(note)}</div>` : ''}
        </div>
      </div>
    `;
  }

  function handlePillClick(node) {
    // Clicking the pill whose card is open → close
    if (currentCard && currentCard.node === node) {
      closeCard();
      return;
    }

    // Compute desired focus
    let target = null;
    if (node.level === 'l1') {
      target = { level: 1, principalIdx: node.principalIdx };
    } else if (node.level === 'l2') {
      target = { level: 2, principalIdx: node.principalIdx, l2Idx: node.l2Idx };
    } else if (node.level === 'l3') {
      target = { level: 2, principalIdx: node.principalIdx, l2Idx: node.l2Idx };
    }

    const needsChange =
      focus.level !== target.level ||
      focus.principalIdx !== target.principalIdx ||
      (target.level === 2 && focus.l2Idx !== target.l2Idx);

    // Close any existing card before drilling
    if (currentCard) closeCard();

    openToken++;
    const myToken = openToken;

    if (needsChange) {
      setFocus(target);
      setTimeout(() => {
        if (openToken !== myToken) return;
        openCard(node);
      }, 440);
    } else {
      // Small delay so the pill's rect is stable
      setTimeout(() => {
        if (openToken !== myToken) return;
        openCard(node);
      }, 20);
    }
  }

  function openCard(node) {
    if (currentCard) closeCard(true);

    // The pill needs to be visible to measure it. If its current
    // opacity is low, briefly show it at full opacity for measure.
    const pillEl = node.el;
    const prevOpacity = pillEl.style.opacity;
    pillEl.style.opacity = '1';
    pillEl.getBoundingClientRect(); // force reflow

    const rect = pillEl.getBoundingClientRect();

    // Create card element
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = buildCardInner(node);
    cardsEl.appendChild(card);

    // Start at pill rect
    card.style.left   = rect.left + 'px';
    card.style.top    = rect.top  + 'px';
    card.style.width  = rect.width + 'px';
    card.style.height = rect.height + 'px';
    card.style.borderRadius = '100px';

    // Hide the original pill — the card has inherited it
    node._suppressOpacity = true;
    pillEl.style.opacity = '0';

    // Measure target dimensions
    const mobile = isMobile();
    let targetW, targetH, targetX, targetY;

    if (mobile) {
      targetW = window.innerWidth - 24;
    } else {
      targetW = 320;
    }

    // Temporarily set to target width to read scrollHeight
    card.style.width = targetW + 'px';
    card.style.height = 'auto';
    const cardInner = card.firstElementChild;
    const naturalH = Math.min(cardInner.offsetHeight, window.innerHeight - 40);
    targetH = naturalH;

    // Reset to pill dimensions before animation
    card.style.width = rect.width + 'px';
    card.style.height = rect.height + 'px';
    // Force reflow so the browser registers the starting state
    card.offsetHeight;

    // Position target
    if (mobile) {
      targetX = 12;
      targetY = window.innerHeight - targetH - 16;
    } else {
      // Prefer right of pill; fallback left; fallback below
      const gap = 14;
      targetX = rect.right + gap;
      targetY = rect.top - 6;
      if (targetX + targetW > window.innerWidth - 12) {
        targetX = rect.left - targetW - gap;
      }
      if (targetX < 12) {
        // fallback below pill
        targetX = Math.min(rect.left, window.innerWidth - targetW - 12);
        targetY = rect.bottom + gap;
      }
      if (targetY + targetH > window.innerHeight - 12) {
        targetY = window.innerHeight - targetH - 12;
      }
      if (targetY < 12) targetY = 12;
      if (targetX < 12) targetX = 12;
      if (targetX + targetW > window.innerWidth - 12) {
        targetX = window.innerWidth - targetW - 12;
      }
    }

    // Animate to card form on next frame
    requestAnimationFrame(() => {
      card.classList.add('open');
      card.style.left   = targetX + 'px';
      card.style.top    = targetY + 'px';
      card.style.width  = targetW + 'px';
      card.style.height = targetH + 'px';
      card.style.borderRadius = '20px';
    });

    // Wire up close button
    const closeBtn = card.querySelector('.card-close');
    if (closeBtn) closeBtn.addEventListener('click', () => closeCard());

    currentCard = { node, el: card };
  }

  function closeCard(immediate) {
    if (!currentCard) return;
    const { node, el: card } = currentCard;
    currentCard = null;

    // Re-measure pill's current rect (it has drifted via breathing)
    const pillEl = node.el;
    // Temporarily show it to measure
    pillEl.style.opacity = '1';
    pillEl.getBoundingClientRect();
    const rect = pillEl.getBoundingClientRect();
    // Hide again until animation is done
    pillEl.style.opacity = '0';

    // Animate back to pill
    card.classList.remove('open');
    card.style.left   = rect.left + 'px';
    card.style.top    = rect.top  + 'px';
    card.style.width  = rect.width + 'px';
    card.style.height = rect.height + 'px';
    card.style.borderRadius = '100px';

    const dur = immediate ? 0 : 540;
    setTimeout(() => {
      if (card.parentNode) card.parentNode.removeChild(card);
      node._suppressOpacity = false;
      pillEl.style.opacity = ''; // let the render loop control it again
    }, dur);
  }

  // Click outside closes card
  document.addEventListener('pointerdown', e => {
    if (!currentCard) return;
    if (currentCard.el.contains(e.target)) return;
    if (e.target.closest && e.target.closest('.pill')) return; // pill handler runs
    closeCard();
  }, true);

  // ESC closes card
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && currentCard) closeCard();
  });

  // ============================================================
  // Interactions (drag, wheel, hover)
  // ============================================================
  let down=false, mx=0, my=0;
  let tRotY=0, tRotX=0, rotY=0, rotX=0;
  let lastClientX=0, lastClientY=0;
  let mouseInside=false;
  let pendingHover=-1, visibleHover=-1, visibleStrength=0;
  const tmpV = new THREE.Vector3();

  function recomputePendingHover() {
    if (!mouseInside || focus.level > 0) { pendingHover = -1; return; }
    const ndcX = (lastClientX / window.innerWidth) * 2 - 1;
    const ndcY = -(lastClientY / window.innerHeight) * 2 + 1;
    let closest=-1, closestSq=Infinity;
    for (let pi=0; pi<principals.length; pi++) {
      const idx = principals[pi].particleIndex;
      const br = jsBreathing(seeds[idx], clock.getElapsedTime());
      tmpV.set(positions[idx][0]+br.x, positions[idx][1]+br.y, positions[idx][2]+br.z);
      tmpV.applyMatrix4(root.matrixWorld);
      tmpV.project(camera);
      const dx=tmpV.x-ndcX, dy=tmpV.y-ndcY;
      const sd=dx*dx+dy*dy;
      if (sd<closestSq){closestSq=sd; closest=pi;}
    }
    pendingHover = (Math.sqrt(closestSq) < 0.09) ? closest : -1;
    hoveredPrincipal = pendingHover;
  }

  const dom = renderer.domElement;
  dom.addEventListener('pointerdown', e => {
    down = true; mx = e.clientX; my = e.clientY;
    if (dom.setPointerCapture) dom.setPointerCapture(e.pointerId);
  });
  dom.addEventListener('pointerup', e => {
    down = false;
    if (dom.releasePointerCapture) dom.releasePointerCapture(e.pointerId);
  });
  dom.addEventListener('pointercancel', () => { down = false; });
  dom.addEventListener('pointerleave',  () => { mouseInside = false; });
  dom.addEventListener('pointerenter',  () => { mouseInside = true; });
  dom.addEventListener('pointermove', e => {
    lastClientX = e.clientX; lastClientY = e.clientY;
    mouseInside = true;
    if (down) {
      tRotY += (e.clientX - mx) * 0.005;
      tRotX += (e.clientY - my) * 0.005;
      tRotX = Math.max(-1.2, Math.min(1.2, tRotX));
      mx = e.clientX; my = e.clientY;
    }
  });

  // Click on canvas (no drag): in overview, near a principal → drill
  let downX=0, downY=0, isDrag=false;
  dom.addEventListener('pointerdown', e => { downX=e.clientX; downY=e.clientY; isDrag=false; });
  dom.addEventListener('pointermove', e => {
    if (down) {
      const dx=e.clientX-downX, dy=e.clientY-downY;
      if (dx*dx+dy*dy > 16) isDrag = true;
    }
  });
  dom.addEventListener('click', e => {
    if (isDrag) return;
    if (currentCard) { closeCard(); return; }
    if (focus.level === 0 && pendingHover >= 0) {
      handlePillClick(principals[pendingHover]._l1Node);
    }
  });

  // Wheel: zoom + pop focus. Attached to window so scrolling works
  // regardless of whether the cursor is over the canvas, a pill, or
  // anything else. If the cursor is inside an open card, let the card
  // handle its own scroll.
  window.addEventListener('wheel', e => {
    if (currentCard && currentCard.el && currentCard.el.contains(e.target)) {
      return; // card scrolls internally
    }
    e.preventDefault();
    const factor = Math.exp(e.deltaY * 0.0014);
    const level = focus.level;
    const range = LEVELS[level];
    targetCameraZ *= factor;
    if (level > 0 && targetCameraZ > range.popThreshold) {
      popFocus();
      targetCameraZ = LEVELS[focus.level].home * 1.05;
    } else {
      targetCameraZ = Math.max(range.min, Math.min(range.max, targetCameraZ));
    }
    if (!interacted) { interacted = true; hintEl.classList.add('hidden'); }
  }, { passive: false });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============================================================
  // Label visibility rules (slightly firmer)
  // ============================================================
  function desiredOpacityFor(node) {
    const f = focus;
    const p = node.principalIdx;
    const lvl = node.level;
    if (f.level === 0) {
      if (lvl === 'l1') return hoveredPrincipal === -1 ? 1 : (p === hoveredPrincipal ? 1 : 0.62);
      if (lvl === 'l2') {
        // Only show L2s when their principal is hovered.
        return p === hoveredPrincipal ? 1 : 0;
      }
      return 0; // L3 hidden in overview
    }
    if (f.level === 1) {
      if (p !== f.principalIdx) {
        if (lvl === 'l1') return 0.52;
        return 0;
      }
      if (lvl === 'l1') return 0.95;
      if (lvl === 'l2') return 1;
      if (lvl === 'l3') return 0.68;
    }
    if (f.level === 2) {
      if (p !== f.principalIdx) {
        if (lvl === 'l1') return 0.42;
        return 0;
      }
      if (lvl === 'l1') return 0.6;
      if (lvl === 'l2') return node.l2Idx === f.l2Idx ? 1 : 0.58;
      if (lvl === 'l3') return node.l2Idx === f.l2Idx ? 1 : 0;
    }
    return 0;
  }
  function desiredScaleFor(node) {
    const f = focus;
    if (f.level === 0) {
      if (node.level === 'l1' && hoveredPrincipal >= 0 && node.principalIdx === hoveredPrincipal) return 1.08;
      if (node.level === 'l2' && hoveredPrincipal >= 0 && node.principalIdx === hoveredPrincipal) return 1.06;
      return 1;
    }
    if (f.level === 1 && node.principalIdx === f.principalIdx) {
      if (node.level === 'l2') return 1.05;
    }
    if (f.level === 2 && node.principalIdx === f.principalIdx) {
      if (node.level === 'l2' && node.l2Idx === f.l2Idx) return 1.10;
      if (node.level === 'l3' && node.l2Idx === f.l2Idx) return 1.04;
    }
    return 1;
  }
  function spreadPushFor(node, hoverActiveForThisPrincipal) {
    if (!hoverActiveForThisPrincipal) return { x: 0, y: 0 };
    if (node.level === 'l1') return { x: 0, y: -4 };
    const prNode = principals[node.principalIdx]._l1Node;
    const dx = node.screenX - prNode.screenX;
    const dy = node.screenY - prNode.screenY;
    const len = Math.hypot(dx, dy) || 1;
    const push = 10;
    return { x: (dx/len)*push, y: (dy/len)*push };
  }

  // ============================================================
  // Animate
  // ============================================================
  const clock = new THREE.Clock();
  const halfW = () => window.innerWidth * 0.5;
  const halfH = () => window.innerHeight * 0.5;

  function tick() {
    const t = clock.getElapsedTime();
    rotY += (tRotY - rotY) * 0.08;
    rotX += (tRotX - rotX) * 0.08;
    root.rotation.y = rotY + Math.sin(t * 0.13) * 0.04;
    root.rotation.x = rotX + Math.sin(t * 0.17) * 0.02;

    focalCurrentX += (focalTargetX - focalCurrentX) * 0.08;
    focalCurrentY += (focalTargetY - focalCurrentY) * 0.08;
    focalCurrentZ += (focalTargetZ - focalCurrentZ) * 0.08;

    const fv = tmpV.set(focalCurrentX, focalCurrentY, focalCurrentZ)
      .applyQuaternion(root.quaternion);
    root.position.set(-fv.x, -fv.y, -fv.z);

    cameraZ += (targetCameraZ - cameraZ) * 0.10;
    camera.position.z = cameraZ;

    root.updateMatrixWorld();
    recomputePendingHover();

    if (pendingHover === visibleHover) {
      const target = pendingHover >= 0 ? 1 : 0;
      visibleStrength += (target - visibleStrength) * 0.10;
    } else {
      visibleStrength += (0 - visibleStrength) * 0.18;
      if (visibleStrength < 0.04) visibleHover = pendingHover;
    }

    const targetFocusStrength = focus.level > 0 ? 1 : 0;
    focusStrength += (targetFocusStrength - focusStrength) * 0.07;
    const desiredFocusSlot = focus.level > 0 ? principals[focus.principalIdx].hubSlot : -1;
    if (focusStrength < 0.05) focusClusterSlot = desiredFocusSlot;
    if (focus.level > 0) focusClusterSlot = desiredFocusSlot;

    ptMat.uniforms.uTime.value = t;
    ptMat.uniforms.uHoverCluster.value = visibleHover >= 0 ? principals[visibleHover].hubSlot : -1;
    ptMat.uniforms.uHoverStrength.value = visibleStrength;
    ptMat.uniforms.uFocusCluster.value = focusClusterSlot;
    ptMat.uniforms.uFocusStrength.value = focusStrength;
    lineMat.uniforms.uTime.value = t;
    lineMat.uniforms.uHoverCluster.value = visibleHover >= 0 ? principals[visibleHover].hubSlot : -1;
    lineMat.uniforms.uHoverStrength.value = visibleStrength;
    lineMat.uniforms.uFocusCluster.value = focusClusterSlot;
    lineMat.uniforms.uFocusStrength.value = focusStrength;

    const hW = halfW(), hH = halfH();

    // Project all labels
    for (let i=0; i<labelNodes.length; i++) {
      const n = labelNodes[i];
      const idx = n.particleIndex;
      const br = jsBreathing(n.seed, t);
      tmpV.set(positions[idx][0]+br.x, positions[idx][1]+br.y, positions[idx][2]+br.z);
      tmpV.applyMatrix4(root.matrixWorld);
      const worldToCam = tmpV.z - camera.position.z;
      const inFront = worldToCam < 0;
      tmpV.project(camera);
      n.screenX = tmpV.x * hW + hW;
      n.screenY = -tmpV.y * hH + hH;
      n.inFront = inFront;
      const depth = Math.min(1, Math.max(0, (tmpV.z + 1) * 0.5));
      n._depthFade = Math.max(0.62, 1 - depth * 0.38);
    }

    // Apply opacity/scale/position
    for (let i=0; i<labelNodes.length; i++) {
      const n = labelNodes[i];

      // If card for this pill is open, pill stays hidden at 0
      if (n._suppressOpacity) {
        n.opacity += (0 - n.opacity) * 0.2;
      } else {
        let op = desiredOpacityFor(n);
        if (!n.inFront) op = 0;
        op *= n._depthFade;
        n.opacity += (op - n.opacity) * 0.18;
      }

      const scale = desiredScaleFor(n);
      n.scale += (scale - n.scale) * 0.18;

      const hoverActive = (focus.level === 0 && hoveredPrincipal === n.principalIdx);
      const push = spreadPushFor(n, hoverActive);
      const yOffsetByLevel = n.level === 'l1' ? -22 : n.level === 'l2' ? -16 : -12;

      const el = n.el;
      el.style.transform =
        `translate3d(${n.screenX + push.x}px, ${n.screenY + push.y + yOffsetByLevel}px, 0) ` +
        `translate(-50%, -50%) scale(${n.scale.toFixed(3)})`;
      // Don't overwrite pill opacity while a card is bound to it
      if (!n._suppressOpacity) {
        el.style.opacity = n.opacity.toFixed(3);
      }
      el.style.pointerEvents = (n.opacity > 0.15 && !n._suppressOpacity) ? 'auto' : 'none';
    }

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
