<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Inner World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#07060f;overflow:hidden}
canvas{position:fixed;top:0;left:0;cursor:grab}
canvas.dragging{cursor:grabbing}
#tooltip{position:fixed;bottom:26px;right:26px;width:252px;background:rgba(8,7,20,.97);border:1px solid rgba(255,255,255,.08);border-radius:2px;overflow:hidden;opacity:0;transform:translateY(5px);transition:opacity .3s,transform .3s;pointer-events:none;z-index:50}
#tooltip.on{opacity:1;transform:translateY(0);pointer-events:auto}
#tt-bar{height:2px}
#tt-body{padding:13px 16px 15px}
#tt-badge{font-size:7px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:5px;font-family:-apple-system,'Helvetica Neue',sans-serif}
#tt-title{font-size:14px;font-weight:500;color:rgba(255,255,255,.92);margin-bottom:7px;line-height:1.3;font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif}
#tt-desc{font-size:11px;font-weight:300;color:rgba(255,255,255,.44);line-height:1.72;font-family:-apple-system,'Helvetica Neue',sans-serif}
#tt-x{position:absolute;top:8px;right:11px;cursor:pointer;font-size:15px;color:rgba(255,255,255,.25);pointer-events:auto}
#tt-x:hover{color:rgba(255,255,255,.65)}
#hint{position:fixed;bottom:21px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.1);transition:opacity 2s;white-space:nowrap;pointer-events:none;z-index:10;font-family:-apple-system,'Helvetica Neue',sans-serif}
#zui{position:fixed;bottom:22px;right:22px;display:flex;gap:6px;z-index:20;align-items:center}
.zbtn{height:26px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:rgba(255,255,255,.5);cursor:pointer;font-family:-apple-system,sans-serif;transition:background .2s}
.zbtn:hover{background:rgba(255,255,255,.13)}
#zbtn-,#zbtn+{width:26px;font-size:17px;line-height:1;padding-bottom:1px}
#zbtn0{min-width:40px;padding:0 7px;font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tooltip"><div id="tt-bar"></div><div id="tt-body"><div id="tt-x">×</div><div id="tt-badge"></div><div id="tt-title"></div><div id="tt-desc"></div></div></div>
<div id="hint">scroll to zoom · drag to pan · click to reveal · double-click to reset</div>
<div id="zui">
  <button class="zbtn" id="zbtn-">−</button>
  <button class="zbtn" id="zbtn0">FIT</button>
  <button class="zbtn" id="zbtn+">+</button>
</div>
<script>
// ─── SETUP ───────────────────────────────────────────────────
const TAU=Math.PI*2, cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=innerWidth, H=innerHeight;
const DPR=Math.min(devicePixelRatio||1,2);
const rnd=(a,b)=>a+Math.random()*(b-a);
function resize(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(DPR,DPR);}
resize(); addEventListener('resize',resize);

// ─── DATA  (5 semantic levels: domain→theme→subtopic→detail + fillers) ────
const DOMS=[
 {id:'rel',label:'Relationships',col:'#6ab4f5',desc:'How you connect, attach, and navigate closeness with others.',
  themes:[
   {id:'r1',label:'Fear of Abandonment',desc:'The dread that those you love will eventually leave.',
    subs:[{id:'r1a',label:'Attachment Anxiety',dt:['Hyperattachment cycles','Separation panic','Clinging patterns']},
          {id:'r1b',label:'Protest Patterns',dt:['Reading into silences','Threat escalation','Pre-emptive leaving']}]},
   {id:'r2',label:'Jealousy Patterns',desc:'Intensity that spikes when a loved one shows interest elsewhere.',
    subs:[{id:'r2a',label:'Comparison Loops',dt:['Retroactive jealousy','Social comparison spiraling']},
          {id:'r2b',label:'Territorial Responses',dt:['Possessiveness','Monitoring behavior']}]},
   {id:'r3',label:'Need for Validation',desc:'Seeking external proof that you are wanted and enough.',
    subs:[{id:'r3a',label:'Approval Seeking',dt:['Reassurance fishing','Performing for approval']},
          {id:'r3b',label:'Affirmation Hunger',dt:['Collapsing without validation','Checking reactions']}]},
   {id:'r4',label:'Communication Avoidance',desc:'Going indirect when direct speech feels too dangerous.',
    subs:[{id:'r4a',label:'Indirect Expression',dt:['Hinting instead of asking','Subtext over directness']},
          {id:'r4b',label:'Conflict Shutdown',dt:['Freezing under pressure','Over-editing before speaking']}]}
  ]},
 {id:'sw',label:'Self-Worth',col:'#b07fe8',desc:'Your internal economy of value — fragile where you least expect it.',
  themes:[
   {id:'s1',label:'Impostor Syndrome',desc:'The conviction your success was luck and discovery is imminent.',
    subs:[{id:'s1a',label:'Fraud Feelings',dt:['Waiting to be found out','Attributing wins to luck']},
          {id:'s1b',label:'Compensatory Behavior',dt:['Overworking to compensate','Underplaying achievements']}]},
   {id:'s2',label:'The Inner Critic',desc:'A relentless internal voice finding the flaw before you can celebrate.',
    subs:[{id:'s2a',label:'Self-Attack Patterns',dt:['Pre-emptive self-attack','Punishing self-talk']},
          {id:'s2b',label:'Ruminative Loops',dt:['Never-good-enough spiral','Moving the goalposts']}]},
   {id:'s3',label:'Perfectionism',desc:'Standards set so high they guarantee chronic disappointment.',
    subs:[{id:'s3a',label:'Standards Distortion',dt:['All-or-nothing thinking','Impossible bar-setting']},
          {id:'s3b',label:'Execution Paralysis',dt:['Analysis paralysis','Finished-but-not-done']}]},
   {id:'s4',label:'Comparison Trap',desc:'Measuring yourself against curated versions of others.',
    subs:[{id:'s4a',label:'Social Benchmarking',dt:['Social media spiraling','Benchmark anxiety']},
          {id:'s4b',label:'Relative Deprivation',dt:['Feeling perpetually behind','Others\' wins as losses']}]},
   {id:'s5',label:'Shame Spirals',desc:'Not I did wrong — I am wrong. Shame that collapses inward.',
    subs:[{id:'s5a',label:'Core Shame',dt:['Defectiveness beliefs','I-am-wrong not I-did-wrong']},
          {id:'s5b',label:'Shame Hiding',dt:['Disappearing after mistakes','Concealing failures']}]}
  ]},
 {id:'ax',label:'Anxiety',col:'#5ecfc4',desc:'The nervous system\'s ancient alarm — too often left switched on.',
  themes:[
   {id:'a1',label:'Hypervigilance',desc:'Constant scanning for threat signals others don\'t notice.',
    subs:[{id:'a1a',label:'Environmental Scanning',dt:['Reading emotional weather','Threat detection in calm']},
          {id:'a1b',label:'Exhausting Preparation',dt:['Preparing for bad news','Pre-emptive damage control']}]},
   {id:'a2',label:'Anticipatory Dread',desc:'Suffering the future before it arrives.',
    subs:[{id:'a2a',label:'Future Suffering',dt:['Pre-grieving outcomes','Mental time travel into harm']},
          {id:'a2b',label:'Catastrophic Forecasting',dt:['Worst-case defaulting','Spiral thinking']}]},
   {id:'a3',label:'Social Anxiety',desc:'Acute self-consciousness — every room feels like an audition.',
    subs:[{id:'a3a',label:'Performance Monitoring',dt:['Fear of negative evaluation','Audience self-consciousness']},
          {id:'a3b',label:'Post-Event Processing',dt:['Analysis loops after encounters','Moment replay']}]},
   {id:'a4',label:'Panic Patterns',desc:'The body\'s emergency response triggered by perceived danger.',
    subs:[{id:'a4a',label:'Somatic Escalation',dt:['Physical panic spirals','Body-as-threat']},
          {id:'a4b',label:'Avoidance Cycles',dt:['Safety behaviors','Reinforcing avoidance loops']}]}
  ]},
 {id:'fam',label:'Family',col:'#f0a860',desc:'The original operating system — still running in the background.',
  themes:[
   {id:'f1',label:'Parental Wounds',desc:'The emotional gaps left by what was given — and what wasn\'t.',
    subs:[{id:'f1a',label:'Emotional Gaps',dt:['Unavailability wounds','Unmet attachment needs']},
          {id:'f1b',label:'Criticism Inheritance',dt:['Internalized critical voice','Conditional approval']}]},
   {id:'f2',label:'Inherited Patterns',desc:'Emotional scripts passed down before you could question them.',
    subs:[{id:'f2a',label:'Generational Scripts',dt:['Family silence rules','Loyalty binds']},
          {id:'f2b',label:'Emotional Templates',dt:['Defaulting to family patterns','Unconscious repetition']}]},
   {id:'f3',label:'Role Assignment',desc:'The fixed identity your family gave you before you could choose.',
    subs:[{id:'f3a',label:'Assigned Identity',dt:['The responsible one','The achiever label']},
          {id:'f3b',label:'Role Exhaustion',dt:['Performing for family','Resenting the role']}]},
   {id:'f4',label:'Sibling Dynamics',desc:'Rivalries and alliances from the original group.',
    subs:[{id:'f4a',label:'Competition Templates',dt:['Favoritism wounds','Sibling rivalry loops']},
          {id:'f4b',label:'Alliance Patterns',dt:['Excluding coalitions','Mediating roles']}]}
  ]},
 {id:'wk',label:'Work',col:'#72ca76',desc:'Where achievement anxiety and identity collapse into one arena.',
  themes:[
   {id:'w1',label:'Burnout Cycles',desc:'Overcommitment, depletion, collapse, recovery — then repeat.',
    subs:[{id:'w1a',label:'Depletion Patterns',dt:['Sunday dread','Crashing after peaks']},
          {id:'w1b',label:'Recovery Sabotage',dt:['Rebuilding to repeat','Rest as failure']}]},
   {id:'w2',label:'Authority Tension',desc:'The complicated charge around people who hold power over you.',
    subs:[{id:'w2a',label:'Parental Projection',dt:['Family dynamics on managers','History in authority']},
          {id:'w2b',label:'Power Response',dt:['Defiance-compliance oscillation','Submission under threat']}]},
   {id:'w3',label:'Recognition Hunger',desc:'A deep need for work to be seen and explicitly acknowledged.',
    subs:[{id:'w3a',label:'Visibility Needs',dt:['Invisible effort resentment','Credit sensitivity']},
          {id:'w3b',label:'Validation Seeking',dt:['Performing for acknowledgment','Recognition as safety']}]},
   {id:'w4',label:'Boundary Collapse',desc:'Difficulty saying no — self eroded by accumulating obligations.',
    subs:[{id:'w4a',label:'Over-Extension',dt:['Can\'t say no reflex','Others\' urgency as own']},
          {id:'w4b',label:'Resentment Buildup',dt:['Unspoken anger','Boundary erosion over time']}]}
  ]},
 {id:'id',label:'Identity',col:'#e8807a',desc:'The ongoing project of figuring out who you are beneath the performance.',
  themes:[
   {id:'i1',label:'Authentic vs. Performed',desc:'The version of you that exists without an audience.',
    subs:[{id:'i1a',label:'True Self Access',dt:['When the mask comes off','Private vs. public self']},
          {id:'i1b',label:'Performance Exhaustion',dt:['Social performance drain','Authenticity hunger']}]},
   {id:'i2',label:'Masks & Personas',desc:'Different faces in different contexts — and their maintenance cost.',
    subs:[{id:'i2a',label:'Context Switching',dt:['Code-switching exhaustion','Chameleon behavior']},
          {id:'i2b',label:'Persona Maintenance',dt:['Performing competence','Managing impressions']}]},
   {id:'i3',label:'Values Confusion',desc:'Uncertain what you stand for when stripped of expectation.',
    subs:[{id:'i3a',label:'Borrowed Values',dt:['Following others\' definitions','Hollow achievement']},
          {id:'i3b',label:'Core Uncertainty',dt:['Unclear personal truth','Externally-sourced morality']}]},
   {id:'i4',label:'Life Purpose',desc:'The ache of not knowing what you\'re here for.',
    subs:[{id:'i4a',label:'Meaning Hunger',dt:['Direction anxiety','What-am-I-for questioning']},
          {id:'i4b',label:'Envy as Signal',dt:['Others\' lives as maps','Comparison as yearning']}]}
  ]},
 {id:'fu',label:'Future',col:'#7aaee0',desc:'The territory ahead — where hope and dread compete for space.',
  themes:[
   {id:'u1',label:'Decision Paralysis',desc:'Frozen by the fear of choosing wrong.',
    subs:[{id:'u1a',label:'Option Overwhelm',dt:['Too many paths','Fear of foreclosing options']},
          {id:'u1b',label:'Commitment Avoidance',dt:['Keeping escape routes open','Anti-commitment patterns']}]},
   {id:'u2',label:'Fear of Success',desc:'The strange terror beneath ambition.',
    subs:[{id:'u2a',label:'Sabotage Patterns',dt:['Self-sabotage before finish','Undermining progress']},
          {id:'u2b',label:'Success Threat',dt:['Identity disruption from growth','Envy anticipation']}]},
   {id:'u3',label:'Time Pressure',desc:'The urgent hum that you\'re running late against an invisible schedule.',
    subs:[{id:'u3a',label:'Timeline Anxiety',dt:['Comparing timelines','Behind-the-curve feeling']},
          {id:'u3b',label:'Age Milestone Pressure',dt:['Societal schedule obsession','Late-to-the-party anxiety']}]},
   {id:'u4',label:'Legacy Anxiety',desc:'The worry about what you will have meant and left behind.',
    subs:[{id:'u4a',label:'Mattering Questions',dt:['Will I have mattered','Impact obsession']},
          {id:'u4b',label:'Mortality Awareness',dt:['Death awareness creeping in','Contribution urgency']}]}
  ]},
 {id:'cr',label:'Creativity',col:'#e8d868',desc:'The channel between inner life and outer expression — and what blocks it.',
  themes:[
   {id:'c1',label:'Creative Blocks',desc:'Paralysis that arrives when you sit down to make something real.',
    subs:[{id:'c1a',label:'Initiation Paralysis',dt:['Blank page dread','Starting resistance']},
          {id:'c1b',label:'Completion Fear',dt:['Unfinished pile','Too-exposing-to-finish']}]},
   {id:'c2',label:'Expression Fear',desc:'The vulnerability of putting something you made into the world.',
    subs:[{id:'c2a',label:'Sharing Exposure',dt:['Post-sharing vulnerability hangover','Hiding behind irony']},
          {id:'c2b',label:'Withholding Patterns',dt:['Indefinite delaying','Creating for the drawer']}]},
   {id:'c3',label:'Originality Anxiety',desc:'Fear that everything you make has already been done better.',
    subs:[{id:'c3a',label:'Derivative Shame',dt:['Has-it-been-done feeling','Comparison to heroes']},
          {id:'c3b',label:'Inspiration as Threat',dt:['Greatness as intimidation','Paralysis before masters']}]}
  ]},
 {id:'bd',label:'Body / Image',col:'#e87cb2',desc:'Your relationship with the physical self — the one others see.',
  themes:[
   {id:'b1',label:'Body Shame',desc:'Chronic dissatisfaction with the physical container you inhabit.',
    subs:[{id:'b1a',label:'Appearance Dissatisfaction',dt:['Mirror avoidance','Photo rejection']},
          {id:'b1b',label:'Concealment Patterns',dt:['Clothing as armor','Hiding strategies']}]},
   {id:'b2',label:'Physical Disconnection',desc:'Living from the neck up — the body as a stranger.',
    subs:[{id:'b2a',label:'Somatic Numbness',dt:['Ignoring body signals','Sensory disconnection']},
          {id:'b2b',label:'Body as Machine',dt:['Instrumentalizing the body','Ignoring physical needs']}]},
   {id:'b3',label:'Appearance Anxiety',desc:'Acute self-consciousness about how you physically present.',
    subs:[{id:'b3a',label:'Social Visibility',dt:['Visibility discomfort','Being-looked-at anxiety']},
          {id:'b3b',label:'Post-Event Rumination',dt:['Replaying appearance moments','Image replay loops']}]}
  ]},
 {id:'ct',label:'Control',col:'#9ab2c2',desc:'The grip you keep on outcomes — and what you risk to maintain it.',
  themes:[
   {id:'k1',label:'Need for Certainty',desc:'Discomfort with ambiguity driving exhausting preparation.',
    subs:[{id:'k1a',label:'Ambiguity Intolerance',dt:['Discomfort with not-knowing','Premature closure']},
          {id:'k1b',label:'Scenario Planning',dt:['Exhaustive preparation','Worst-case rehearsal']}]},
   {id:'k2',label:'Delegation Difficulty',desc:'The impossibility of trusting outcomes to another\'s hands.',
    subs:[{id:'k2a',label:'Redoing Behavior',dt:['Redoing others\' work','Trusting resistance']},
          {id:'k2b',label:'Letting Go Fear',dt:['Outcome attachment','Relinquishing as threat']}]},
   {id:'k3',label:'Catastrophizing',desc:'Running every situation to its worst possible conclusion.',
    subs:[{id:'k3a',label:'Threat Amplification',dt:['Probability distortion','Disaster defaulting']},
          {id:'k3b',label:'Doom Forecasting',dt:['Worst-case orientation','Exit-scanning everything']}]}
  ]}
];

// Theme-level cross-domain links
const CROSS=[
  ['s5','b1'],['s5','r1'],['s5','a3'],['s3','w1'],['s3','c1'],['s3','u1'],
  ['s2','c1'],['s2','c2'],['s1','w3'],['s1','a3'],['s1','c2'],
  ['s4','b3'],['s4','a3'],['a1','k1'],['a1','k3'],['a2','u1'],['a2','k3'],
  ['a3','r4'],['a3','c2'],['a4','k3'],['f1','r1'],['f2','r4'],
  ['f3','i2'],['f3','i1'],['f2','s5'],['f4','s4'],['w3','r3'],['w4','r4'],
  ['w2','f1'],['w1','k2'],['w1','u3'],['i4','u4'],['i3','u1'],['i1','c2'],
  ['i2','r4'],['u2','s1'],['u2','c1'],['c2','b3'],['b2','a4'],['k1','u1'],['k2','w4'],
];
// Sub-topic cross links
const SUBCROSS=[
  ['r1a','s5a'],['s1a','w3a'],['s2a','c1a'],['a1a','k1a'],['f1a','r1a'],
  ['i1a','c2a'],['u1a','k1b'],['b1a','s5b'],['w4a','r4a'],['i2a','r4b'],
  ['s3b','c1a'],['a2b','k3a'],['f2a','i3a'],['w1b','s3b'],['u2a','s1b'],
  ['b2a','a4a'],['c3a','s4a'],['k3b','a2b'],['r3a','w3b'],['i4b','u4a'],
];

// ─── BUILD GRAPH ─────────────────────────────────────────────
const nodes=[],edges=[],NM={};
function addN(o){nodes.push(o);NM[o.id]=o;return o;}
function addE(s,t,type){if(NM[s]&&NM[t])edges.push({s,t,type});}

// lv: 0=YOU, 1=Domain, 2=Theme, 3=SubTopic, 4=Detail, 5=Filler
addN({id:'YOU',label:'YOU',lv:0,col:'#ffffff',desc:'The center of everything you carry.',badge:''});

DOMS.forEach(dom=>{
  addN({id:dom.id,label:dom.label,lv:1,col:dom.col,did:dom.id,desc:dom.desc,badge:'Domain'});
  addE('YOU',dom.id,'spine');
  dom.themes.forEach((th,ti)=>{
    addN({id:th.id,label:th.label,lv:2,col:dom.col,did:dom.id,desc:th.desc,badge:'Pattern'});
    addE(dom.id,th.id,'primary');
    if(ti>0) addE(dom.themes[ti-1].id,th.id,'secondary');
    th.subs.forEach((sub,si)=>{
      addN({id:sub.id,label:sub.label,lv:3,col:dom.col,did:dom.id,tid:th.id,desc:'',badge:'Cluster'});
      addE(th.id,sub.id,'secondary');
      if(si>0) addE(th.subs[si-1].id,sub.id,'tertiary');
      sub.dt.forEach((det,di)=>{
        const did=`${sub.id}d${di}`;
        addN({id:did,label:det,lv:4,col:dom.col,did:dom.id,tid:th.id,sid:sub.id,desc:'',badge:'Detail'});
        addE(sub.id,did,'tertiary');
      });
    });
  });
  // Close theme ring
  if(dom.themes.length>2) addE(dom.themes[dom.themes.length-1].id,dom.themes[0].id,'secondary');
  // Filler micro-nodes
  for(let i=0;i<15;i++){
    const fid=`fl_${dom.id}_${i}`;
    addN({id:fid,lv:5,col:dom.col,did:dom.id,desc:'',label:'',badge:''});
    const th=dom.themes[i%dom.themes.length];
    const sub=th.subs[i%th.subs.length];
    addE(i<5?dom.id:i<10?th.id:sub.id, fid,'filler');
    if(i%3===0&&dom.themes.length>1) addE(dom.themes[(i+1)%dom.themes.length].id,fid,'filler');
  }
});

// Bridge nodes
[['rel','sw'],['sw','ax'],['ax','ct'],['fam','rel'],['wk','sw'],
 ['cr','id'],['fu','id'],['bd','sw'],['wk','cr'],['fam','id'],
 ['ax','fam'],['fu','cr'],['bd','ax']
].forEach(([a,b],i)=>{
  const bid=`br${i}`;
  addN({id:bid,lv:5,col:'#7788bb',did:null,desc:'',label:'',badge:''});
  addE(a,bid,'filler'); addE(b,bid,'filler');
});

CROSS.forEach(([s,t])=>addE(s,t,'cross'));
SUBCROSS.forEach(([s,t])=>addE(s,t,'cross'));

// ─── PLACEMENT (pure math, no NaN) ───────────────────────────
const DOM_R=105;
NM['YOU'].x=0; NM['YOU'].y=0;

DOMS.forEach((dom,i)=>{
  const domAngle=(i/DOMS.length)*TAU-TAU*0.25;
  const dn=NM[dom.id];
  dn.x=Math.cos(domAngle)*DOM_R+rnd(-8,8);
  dn.y=Math.sin(domAngle)*DOM_R*0.67+rnd(-5,5);
  const dirAngle=Math.atan2(dn.y,dn.x);
  const thCount=dom.themes.length;
  const fanHalf=Math.min(Math.PI*0.62,0.30*thCount);

  dom.themes.forEach((th,ti)=>{
    const frac=thCount>1?ti/(thCount-1)-0.5:0;
    const thAngle=dirAngle+frac*fanHalf*2;
    const thR=52+rnd(-5,5);
    const tn=NM[th.id];
    tn.x=dn.x+Math.cos(thAngle)*thR;
    tn.y=dn.y+Math.sin(thAngle)*thR;

    th.subs.forEach((sub,si)=>{
      const sf=th.subs.length>1?si/(th.subs.length-1)-0.5:0;
      const subAngle=thAngle+sf*0.55;
      const subR=34+rnd(-4,4);
      const sn=NM[sub.id];
      sn.x=tn.x+Math.cos(subAngle)*subR;
      sn.y=tn.y+Math.sin(subAngle)*subR;

      sub.dt.forEach((det,di)=>{
        const dn2=NM[`${sub.id}d${di}`];
        if(!dn2) return;
        const df=sub.dt.length>1?di/(sub.dt.length-1)-0.5:0;
        const detAngle=subAngle+df*0.42;
        const detR=18+rnd(-2,2);
        dn2.x=sn.x+Math.cos(detAngle)*detR;
        dn2.y=sn.y+Math.sin(detAngle)*detR;
      });
    });
  });

  for(let i=0;i<15;i++){
    const fn=NM[`fl_${dom.id}_${i}`];
    if(!fn) continue;
    const th=dom.themes[i%dom.themes.length];
    const sub=th.subs[i%th.subs.length];
    const tn=NM[th.id], sn=NM[sub.id];
    const t2=rnd(0.2,0.8);
    const base=i<5?dn:i<10?tn:sn;
    const next=i<5?tn:i<10?sn:NM[`${sub.id}d0`]||sn;
    fn.x=(base.x*(1-t2)+next.x*t2)+rnd(-12,12);
    fn.y=(base.y*(1-t2)+next.y*t2)+rnd(-9,9);
  }
});

// Bridge node positions
[['rel','sw'],['sw','ax'],['ax','ct'],['fam','rel'],['wk','sw'],
 ['cr','id'],['fu','id'],['bd','sw'],['wk','cr'],['fam','id'],
 ['ax','fam'],['fu','cr'],['bd','ax']
].forEach(([a,b],i)=>{
  const bn=NM[`br${i}`],na=NM[a],nb=NM[b];
  if(bn&&na&&nb){bn.x=(na.x+nb.x)/2+rnd(-14,14);bn.y=(na.y+nb.y)/2+rnd(-10,10);}
});

// Pre-compute bezier control points
edges.forEach(e=>{
  const a=NM[e.s],b=NM[e.t];
  if(!a||!b||!isFinite(a.x)||!isFinite(b.x)){e._ok=false;return;}
  e._ok=true;
  const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy)||1;
  const curl=(Math.random()-0.5)*Math.min(len*0.16,10);
  e._cx=mx+(-dy/len)*curl; e._cy=my+(dx/len)*curl;
});

// Adjacency
const ADJ={};
nodes.forEach(n=>ADJ[n.id]=[]);
edges.forEach((e,ei)=>{
  if(ADJ[e.s]) ADJ[e.s].push({nid:e.t,ei});
  if(ADJ[e.t]) ADJ[e.t].push({nid:e.s,ei});
});

const PARTICLES=Array.from({length:800},()=>({
  x:rnd(-750,750),y:rnd(-560,560),r:.2+Math.random()*.85,a:.012+Math.random()*.038
}));

// ─── INTERACTION STATE ────────────────────────────────────────
const nAlpha={},tNA={},eAlpha={},tEA={};
nodes.forEach(n=>{nAlpha[n.id]=1;tNA[n.id]=1;});
edges.forEach((_,i)=>{eAlpha[i]=1;tEA[i]=1;});
let hovId=null;

function setHov(id){
  if(id===hovId) return; hovId=id;
  if(!id){nodes.forEach(n=>tNA[n.id]=1);edges.forEach((_,i)=>tEA[i]=1);return;}
  const conn=new Set([id]);const cE=new Set();
  (ADJ[id]||[]).forEach(({nid,ei})=>{conn.add(nid);cE.add(ei);});
  nodes.forEach(n=>tNA[n.id]=conn.has(n.id)?1:0.07);
  edges.forEach((_,i)=>tEA[i]=cE.has(i)?1:0.025);
}

// ─── HELPERS ─────────────────────────────────────────────────
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function ca(hex,a){const[r,g,b]=hex2rgb(hex);return`rgba(${r},${g},${b},${a.toFixed(3)})`;}
function lh(hex,f=1.22){const[r,g,b]=hex2rgb(hex);return`rgb(${Math.min(255,r*f)|0},${Math.min(255,g*f)|0},${Math.min(255,b*f)|0})`;}
const NR=[11,7.5,5.0,3.5,2.2,1.2];
const sc=()=>Math.min(Math.min(W,H)/900,1.6);
function nr(n){return NR[n.lv]*sc();}

// ─── DRAWING ─────────────────────────────────────────────────
function drawBg(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
  g.addColorStop(0,'#100e28');g.addColorStop(0.3,'#0c0b1e');
  g.addColorStop(0.65,'#08071a');g.addColorStop(1,'#050412');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawParticles(){
  ctx.save();
  PARTICLES.forEach(p=>{ctx.globalAlpha=p.a;ctx.fillStyle='#6677aa';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();});
  ctx.restore();
}

const EA={spine:0.32,primary:0.18,secondary:0.12,tertiary:0.08,cross:0.07,filler:0.04};
const EW={spine:0.9,primary:0.7,secondary:0.55,tertiary:0.42,cross:0.5,filler:0.3};

function drawEdges(){
  ctx.save();
  edges.forEach((e,ei)=>{
    if(!e._ok) return;
    const a=NM[e.s],b=NM[e.t];
    const mult=eAlpha[ei]||0;
    const alpha=(EA[e.type]||0.04)*mult;
    if(alpha<0.003) return;
    const col=(e.type==='cross'||e.type==='filler')?'#7788cc':(a.col||'#fff');
    ctx.globalAlpha=alpha;ctx.strokeStyle=col;ctx.lineWidth=EW[e.type]||0.4;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(e._cx,e._cy,b.x,b.y);ctx.stroke();
    if(mult>0.55){
      ctx.globalAlpha=alpha*0.22;ctx.lineWidth=(EW[e.type]||0.4)*3;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(e._cx,e._cy,b.x,b.y);ctx.stroke();
    }
  });
  ctx.restore();
}

function drawNodeGlow(n,t){
  if(!isFinite(n.x)||!isFinite(n.y)||n.lv>3) return;
  const r=nr(n),a=nAlpha[n.id];if(a<0.04) return;
  const pulse=n.lv===0?1+Math.sin(t*.75)*.05:1;
  const glR=r*(n.lv===0?4.8:n.lv===1?4.2:n.lv===2?3.0:2.2);
  const bA=n.lv===0?0.22:n.lv===1?0.15:n.lv===2?0.09:0.06;
  const g=ctx.createRadialGradient(n.x,n.y,r*.3,n.x,n.y,glR*pulse);
  g.addColorStop(0,ca(n.col,bA*a));g.addColorStop(.25,ca(n.col,bA*a*.5));
  g.addColorStop(.6,ca(n.col,bA*a*.1));g.addColorStop(1,ca(n.col,0));
  ctx.save();ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,glR*pulse,0,TAU);ctx.fill();ctx.restore();
}

function drawNodeCore(n){
  if(!isFinite(n.x)||!isFinite(n.y)) return;
  const r=nr(n),a=nAlpha[n.id];if(a<0.01) return;
  const baseA=n.lv<=1?1:n.lv===2?0.9:n.lv===3?0.82:n.lv===4?0.72:0.5;
  ctx.save();
  ctx.globalAlpha=a*baseA;
  ctx.fillStyle=n.lv===0?'#ffffff':n.lv<=2?lh(n.col,1.15):ca(n.col,.9);
  ctx.beginPath();ctx.arc(n.x,n.y,r,0,TAU);ctx.fill();
  if(n.lv<=1){
    ctx.globalAlpha=a*.6;ctx.fillStyle=n.lv===0?'rgba(255,255,255,.9)':lh(n.col,1.5);
    ctx.beginPath();ctx.arc(n.x,n.y,r*.44,0,TAU);ctx.fill();
  }
  ctx.restore();
}

const FONT=`-apple-system,'SF Pro Display','Helvetica Neue',sans-serif`;

function drawLabels(ox,oy,z){
  const s=sc();
  nodes.forEach(n=>{
    if(!n.label||!isFinite(n.x)||!isFinite(n.y)) return;
    const sx=ox+n.x*z, sy=oy+n.y*z;
    const r=nr(n)*z, a=nAlpha[n.id];

    if(n.lv===0){
      ctx.save();ctx.globalAlpha=a*.82;
      ctx.font=`700 ${(6.5*s).toFixed(1)}px ${FONT}`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#07060f';
      ctx.fillText('YOU',sx,sy);ctx.restore();return;
    }
    if(n.lv===1){
      const dlen=Math.sqrt(n.x*n.x+n.y*n.y)||1;
      const lx=sx+(n.x/dlen)*(r+9),ly=sy+(n.y/dlen)*(r+9);
      const fs=Math.min(13,Math.max(9,11*s)).toFixed(1);
      ctx.save();ctx.font=`500 ${fs}px ${FONT}`;ctx.textAlign='center';ctx.textBaseline='middle';
      const tw=ctx.measureText(n.label).width,ph=15,pw=tw+16,rr=ph/2;
      const rx=lx-pw/2,ry=ly-ph/2;
      ctx.globalAlpha=a*.5;ctx.fillStyle=ca(n.col,.15);
      ctx.beginPath();ctx.moveTo(rx+rr,ry);ctx.lineTo(rx+pw-rr,ry);
      ctx.arcTo(rx+pw,ry,rx+pw,ry+ph,rr);ctx.lineTo(rx+pw,ry+ph-rr);
      ctx.arcTo(rx+pw,ry+ph,rx+pw-rr,ry+ph,rr);ctx.lineTo(rx+rr,ry+ph);
      ctx.arcTo(rx,ry+ph,rx,ry+ph-rr,rr);ctx.lineTo(rx,ry+rr);
      ctx.arcTo(rx,ry,rx+rr,ry,rr);ctx.closePath();ctx.fill();
      ctx.globalAlpha=a*.9;ctx.fillStyle=lh(n.col,1.08);ctx.fillText(n.label,lx,ly);
      ctx.restore();return;
    }
    if(n.lv===2){
      const nearHov=hovId&&((ADJ[n.id]||[]).some(x=>x.nid===hovId)||hovId===n.did||hovId===n.id);
      const lblA=nearHov?a*.88:a*.38;if(lblA<0.04) return;
      const dlen=Math.sqrt(n.x*n.x+n.y*n.y)||1;
      const lx=sx+(n.x/dlen)*(r+6),ly=sy+(n.y/dlen)*(r+6);
      const fs=Math.min(11,Math.max(8,9.5*s)).toFixed(1);
      ctx.save();ctx.globalAlpha=lblA;ctx.font=`400 ${fs}px ${FONT}`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=ca(n.col,.95);
      ctx.fillText(n.label,lx,ly);ctx.restore();return;
    }
    if(n.lv===3){
      const nearHov=hovId&&((ADJ[n.id]||[]).some(x=>x.nid===hovId)||hovId===n.tid||hovId===n.id);
      const lblA=nearHov?a*.78:a*.22;if(lblA<0.04) return;
      const dlen=Math.sqrt(n.x*n.x+n.y*n.y)||1;
      const lx=sx+(n.x/dlen)*(r+5),ly=sy+(n.y/dlen)*(r+5);
      const fs=Math.min(9.5,Math.max(7,8.5*s)).toFixed(1);
      ctx.save();ctx.globalAlpha=lblA;ctx.font=`300 ${fs}px ${FONT}`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=ca(n.col,.88);
      ctx.fillText(n.label,lx,ly);ctx.restore();return;
    }
    if(n.lv===4&&(hovId===n.id||(hovId&&(ADJ[n.id]||[]).some(x=>x.nid===hovId)))){
      const fs=Math.min(9,Math.max(7,8.5*s)).toFixed(1);
      ctx.save();ctx.globalAlpha=a*.82;ctx.font=`300 ${fs}px ${FONT}`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=ca(n.col,.88);
      ctx.fillText(n.label,sx,sy-r-5);ctx.restore();
    }
  });
}

// ─── VIEWPORT ────────────────────────────────────────────────
let panX=0,panY=0,zoom=1,targetZoom=1,targetPanX=0,targetPanY=0;
const MIN_Z=0.06,MAX_Z=8;

// ─── ANIMATE ─────────────────────────────────────────────────
let dX=0,dY=0,tdX=0,tdY=0,mX=0,mY=0,tmX=0,tmY=0;

function animate(ts){
  requestAnimationFrame(animate);
  const t=ts*.001;
  const dr=Math.max(0,1-Math.abs(zoom-1)*.8-Math.sqrt(panX*panX+panY*panY)/800);
  tdX=Math.sin(t*.038)*7*dr;tdY=Math.cos(t*.051)*5*dr;
  dX+=(tdX-dX)*.03;dY+=(tdY-dY)*.03;
  const ps=Math.max(0,1-(zoom-1)*.6)*7;
  mX+=(tmX*ps-mX)*.05;mY+=(tmY*ps-mY)*.05;
  zoom+=(targetZoom-zoom)*.12;panX+=(targetPanX-panX)*.1;panY+=(targetPanY-panY)*.1;
  const LR=.06;
  nodes.forEach(n=>{const d=tNA[n.id]-nAlpha[n.id];if(Math.abs(d)>.002)nAlpha[n.id]+=d*LR;});
  edges.forEach((_,i)=>{const d=tEA[i]-eAlpha[i];if(Math.abs(d)>.002)eAlpha[i]+=d*LR;});
  const ox=W/2+panX+dX+mX,oy=H/2+panY+dY+mY;

  drawBg();
  ctx.save();ctx.translate(ox,oy);ctx.scale(zoom,zoom);
  drawParticles();
  drawEdges();
  for(let lv=3;lv>=0;lv--) nodes.filter(n=>n.lv===lv).forEach(n=>drawNodeGlow(n,t));
  for(let lv=5;lv>=0;lv--) nodes.filter(n=>n.lv===lv).forEach(n=>drawNodeCore(n));
  ctx.restore();
  drawLabels(ox,oy,zoom);
}

// ─── TOOLTIP ─────────────────────────────────────────────────
const tip=document.getElementById('tooltip');
function showTip(n){
  if(!n||!n.desc)return;
  document.getElementById('tt-bar').style.background=n.col||'#fff';
  document.getElementById('tt-badge').textContent=n.badge||'';
  document.getElementById('tt-title').textContent=n.label||'';
  document.getElementById('tt-title').style.color=lh(n.col||'#fff',1.1);
  document.getElementById('tt-desc').textContent=n.desc||'';
  tip.classList.add('on');
}
function hideTip(){tip.classList.remove('on');}
document.getElementById('tt-x').addEventListener('click',hideTip);

// ─── INTERACTION ─────────────────────────────────────────────
function toGraph(cx,cy){
  const ox=W/2+panX+dX+mX,oy=H/2+panY+dY+mY;
  return{gx:(cx-ox)/zoom,gy:(cy-oy)/zoom};
}
let dragging=false,dragSX=0,dragSY=0,dragPX=0,dragPY=0,dragDist=0;

cv.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  dragging=true;dragDist=0;dragSX=e.clientX;dragSY=e.clientY;
  dragPX=targetPanX;dragPY=targetPanY;cv.classList.add('dragging');
});
addEventListener('mousemove',e=>{
  if(!dragging)return;
  const dx=e.clientX-dragSX,dy=e.clientY-dragSY;
  dragDist=Math.sqrt(dx*dx+dy*dy);targetPanX=dragPX+dx;targetPanY=dragPY+dy;
});
addEventListener('mouseup',()=>{dragging=false;cv.classList.remove('dragging');});

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:1/1.12;
  const nz=Math.max(MIN_Z,Math.min(MAX_Z,targetZoom*f));
  const ox=W/2+targetPanX,oy=H/2+targetPanY;
  const gx=(e.clientX-ox)/targetZoom,gy=(e.clientY-oy)/targetZoom;
  targetPanX=e.clientX-W/2-gx*nz;targetPanY=e.clientY-H/2-gy*nz;targetZoom=nz;
},{passive:false});

cv.addEventListener('mousemove',e=>{
  if(dragging)return;
  tmX=(e.clientX/W-.5);tmY=(e.clientY/H-.5);
  const{gx,gy}=toGraph(e.clientX,e.clientY);
  let best=null,bestD=Infinity;
  nodes.forEach(n=>{
    if(n.lv>4)return;
    const dx=n.x-gx,dy=n.y-gy,d=Math.sqrt(dx*dx+dy*dy);
    const hit=nr(n)*(n.lv<=1?2.8:2.5)/zoom;
    if(d<hit&&d<bestD){bestD=d;best=n;}
  });
  setHov(best?.id||null);
});

cv.addEventListener('click',e=>{
  if(dragDist>6)return;
  const{gx,gy}=toGraph(e.clientX,e.clientY);
  let best=null,bestD=Infinity;
  nodes.forEach(n=>{
    if(n.lv>3||!n.desc&&n.lv>1)return;
    const dx=n.x-gx,dy=n.y-gy,d=Math.sqrt(dx*dx+dy*dy);
    const hit=nr(n)*3.5/zoom;
    if(d<hit&&d<bestD){bestD=d;best=n;}
  });
  best?showTip(best):hideTip();
});

cv.addEventListener('dblclick',()=>{targetZoom=1;targetPanX=0;targetPanY=0;});
cv.addEventListener('mouseleave',()=>{setHov(null);dragging=false;cv.classList.remove('dragging');});

// Touch
let lastTD=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];dragging=true;dragDist=0;
    dragSX=t.clientX;dragSY=t.clientY;dragPX=targetPanX;dragPY=targetPanY;
  } else if(e.touches.length===2){
    dragging=false;
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    lastTD=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    const t=e.touches[0];
    const dx=t.clientX-dragSX,dy=t.clientY-dragSY;
    dragDist=Math.sqrt(dx*dx+dy*dy);targetPanX=dragPX+dx;targetPanY=dragPY+dy;
  } else if(e.touches.length===2){
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    const d=Math.sqrt(dx*dx+dy*dy),f=d/lastTD;
    const nz=Math.max(MIN_Z,Math.min(MAX_Z,targetZoom*f));
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const ox=W/2+targetPanX,oy=H/2+targetPanY;
    const gx=(mx-ox)/targetZoom,gy=(my-oy)/targetZoom;
    targetPanX=mx-W/2-gx*nz;targetPanY=my-H/2-gy*nz;targetZoom=nz;lastTD=d;
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(dragDist<8&&e.changedTouches.length===1){
    const t=e.changedTouches[0];
    const{gx,gy}=toGraph(t.clientX,t.clientY);
    let best=null,bestD=Infinity;
    nodes.forEach(n=>{
      if(n.lv>3||(!n.desc&&n.lv>1))return;
      const dx=n.x-gx,dy=n.y-gy,d=Math.sqrt(dx*dx+dy*dy);
      if(d<nr(n)*3.5/zoom&&d<bestD){bestD=d;best=n;}
    });
    best?showTip(best):hideTip();
  }
  dragging=false;
},{passive:false});

// Zoom buttons
document.getElementById('zbtn-').onclick=()=>targetZoom=Math.max(MIN_Z,targetZoom/1.18);
document.getElementById('zbtn+').onclick=()=>targetZoom=Math.min(MAX_Z,targetZoom*1.18);
document.getElementById('zbtn0').onclick=()=>{targetZoom=1;targetPanX=0;targetPanY=0;};

requestAnimationFrame(animate);
setTimeout(()=>document.getElementById('hint').style.opacity='0',8000);
</script>
</body>
</html>
