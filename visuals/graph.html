function pickOne(arr, seed) {
    return arr[seed % arr.length];
}
function pickMany(arr, n, seed) {
    const out = [];
    const used = new Set();
    for (let i = 0; i < n && out.length < arr.length; i++) {
        let s = (seed + i * 37) % arr.length;
        while (used.has(s)) s = (s + 1) % arr.length;
        used.add(s);
        out.push(arr[s]);
    }
    return out;
}
// deterministic-ish seed from a string
function strSeed(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

function getCardContent(node) {
    const sem = node.semantic;
    const key = sem.id;

    // 1) Hand-authored takes priority
    if (AUTHORED_CARDS[key]) {
        return { title: sem.name, tone: sem.tone, ...AUTHORED_CARDS[key] };
    }

    // 2) Template-generated — use the principal category's voice pool
    const categoryId = sem.principalId || sem.id;
    const tpl = CARD_TEMPLATES[categoryId] || CARD_TEMPLATES.emotions;
    const seed = strSeed(key);

    // Tertiary cards are more personal: use the specific name in insights where possible
    let insight = pickOne(tpl.insights, seed);
    if (sem.kind === 'tertiary' && sem.secondaryName) {
        // Prepend a contextualizing line so tertiary cards feel about THAT thing
        insight = `"${sem.name}" lives inside ${sem.secondaryName.toLowerCase()}. ` + insight;
    }

    const kind = (sem.kind === 'principal')
        ? tpl.kindPrefix + ' · core'
        : (sem.kind === 'secondary')
            ? tpl.kindPrefix + ' · theme'
            : tpl.kindPrefix + ' · instance';

    return {
        title: sem.name,
        tone: sem.tone,
        kind,
        insight,
        triggers: pickMany(tpl.triggers, 3, seed),
        origin: pickOne(tpl.origins, seed + 7),
        related: pickMany(tpl.related, 3, seed + 13),
        note: pickOne(tpl.notes, seed + 23)
    };
}

/* =========================================================================
   CARD SYSTEM
   - FLIP-style morph: clone pill in place, then animate to card rect
   - Only one card open at a time
   - Opening a new one smoothly closes the current
   - If clicked pill is a principal at root, focus first, THEN morph
   ========================================================================= */
const cardBackdrop = document.getElementById('card-backdrop');
let activeCard = null;          // { el, rec, isMobile }
let pendingOpenNodeIdx = -1;    // if we needed to focus first, what to open after

function isMobileViewport() {
    return window.innerWidth <= 640;
}

function handlePillClick(rec) {
    const node = nodes[rec.nodeIdx];
    if (!node || !node.semantic) return;

    // If a card is already open for this same node, close it
    if (activeCard && activeCard.rec.nodeIdx === rec.nodeIdx) {
        closeCard();
        return;
    }

    const f = currentFocus();

    // If it's a principal hub at root → focus first, then open card
    // We know the pill will reposition during focus transition, so we
    // schedule opening the card AFTER the camera settles (~500ms).
    if (node.semantic.kind === 'principal' && f.type === FOCUS.ROOT) {
        // Close any open card first
        if (activeCard) closeCard();
        pendingOpenNodeIdx = rec.nodeIdx;
        focusOnNode(rec.nodeIdx);
        // Wait for the camera + label positions to settle
        setTimeout(() => {
            if (pendingOpenNodeIdx === rec.nodeIdx) {
                openCardFromPill(rec);
                pendingOpenNodeIdx = -1;
            }
        }, 520);
        return;
    }

    // If clicking a secondary when at root, do the same treatment
    if (node.semantic.kind === 'secondary' && f.type === FOCUS.ROOT) {
        if (activeCard) closeCard();
        pendingOpenNodeIdx = rec.nodeIdx;
        focusOnNode(rec.nodeIdx);
        setTimeout(() => {
            if (pendingOpenNodeIdx === rec.nodeIdx) {
                openCardFromPill(rec);
                pendingOpenNodeIdx = -1;
            }
        }, 520);
        return;
    }

    // Otherwise pill is already in the active cluster — open in place
    // Still refresh focus if clicking a deeper-level item
    if ((node.semantic.kind === 'secondary' && f.type !== FOCUS.SECONDARY) ||
        (node.semantic.kind === 'tertiary' && f.type !== FOCUS.TERTIARY)) {
        // Update focus but without the 520ms delay — the pill is already visible
        focusOnNode(rec.nodeIdx);
        // Brief wait for any small label repositioning
        setTimeout(() => openCardFromPill(rec), 180);
    } else {
        openCardFromPill(rec);
    }
}

function openCardFromPill(rec) {
    // If another card is open, close it smoothly first and chain the open
    if (activeCard) {
        const prev = activeCard;
        closeCard(() => {
            // Wait a beat so the previous close doesn't collide visually
            setTimeout(() => openCardFromPill(rec), 80);
        });
        return;
    }

    const node = nodes[rec.nodeIdx];
    const content = getCardContent(node);

    // Force label to be visible for the capture (it may be hidden based on tier
    // rules, but we've already asserted the user clicked it, so it was rendered
    // at click time — still, we sample its rect NOW)
    const pillRect = rec.el.getBoundingClientRect();

    // Build card DOM
    const card = document.createElement('div');
    card.className = 'card as-pill';
    if (isMobileViewport()) card.classList.add('mobile', 'sheet-closed');

    const dotColor = TONE[content.tone] || TONE.neutral;

    // Start: pill rect
    card.innerHTML = `
        <div class="card-header">
            <span class="dot" style="background: ${dotColor};"></span>
            <span class="title">${escapeHTML(content.title)}</span>
            <button class="close" aria-label="Close">×</button>
        </div>
        <div class="card-kind">${escapeHTML(content.kind)}</div>
        <div class="card-body">
            <div class="card-insight">${escapeHTML(content.insight)}</div>
            ${content.triggers && content.triggers.length ? `
            <div class="card-section">
                <div class="label-caption">Triggers</div>
                <div class="card-chips">
                    ${content.triggers.map(t => `<span class="card-chip">${escapeHTML(t)}</span>`).join('')}
                </div>
            </div>` : ''}
            ${content.origin ? `
            <div class="card-section">
                <div class="label-caption">Origin / context</div>
                <div class="content">${escapeHTML(content.origin)}</div>
            </div>` : ''}
            ${content.related && content.related.length ? `
            <div class="card-section">
                <div class="label-caption">Related themes</div>
                <div class="card-chips">
                    ${content.related.map(r => `<span class="card-chip">${escapeHTML(r)}</span>`).join('')}
                </div>
            </div>` : ''}
            ${content.note ? `<div class="card-note">${escapeHTML(content.note)}</div>` : ''}
        </div>
    `;

    document.body.appendChild(card);

    // Hide the original pill so the illusion holds
    rec.el.style.visibility = 'hidden';

    // Place card EXACTLY over the pill to start
    if (!isMobileViewport()) {
        card.style.left  = pillRect.left + 'px';
        card.style.top   = pillRect.top  + 'px';
        card.style.width = pillRect.width + 'px';
        card.style.height = pillRect.height + 'px';
    }

    // Force a reflow so the starting rect is committed before we trigger transition
    void card.offsetWidth;

    // Compute target rect
    if (isMobileViewport()) {
        // Mobile: slide up as bottom sheet
        card.classList.remove('as-pill');
        // trigger slide
        requestAnimationFrame(() => {
            card.classList.remove('sheet-closed');
        });
    } else {
        // Desktop: morph to card size, placed near the pill but kept in viewport
        const cardW = 340;
        // We don't know the final card height until content renders. Approximate:
        // header (~50) + kind (~30) + insight (~80) + sections (~200) + padding (~20)
        const approxH = estimateCardHeight(content);
        const margin = 16;

        // Prefer opening below-right of the pill, flip if insufficient space
        let targetLeft = pillRect.left + pillRect.width / 2 - cardW / 2;
        let targetTop  = pillRect.top  + pillRect.height + 10;

        // Keep inside viewport horizontally
        if (targetLeft + cardW + margin > window.innerWidth) {
            targetLeft = window.innerWidth - cardW - margin;
        }
        if (targetLeft < margin) targetLeft = margin;

        // Vertically: if overflowing below, open above the pill
        if (targetTop + approxH + margin > window.innerHeight) {
            targetTop = pillRect.top - approxH - 10;
            if (targetTop < margin) targetTop = margin;
        }

        // Use double rAF to make sure the starting state (as-pill rect) is
        // painted before we remove the class and set target dimensions
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                card.classList.remove('as-pill');
                card.style.left   = targetLeft + 'px';
                card.style.top    = targetTop  + 'px';
                card.style.width  = cardW + 'px';
                card.style.height = 'auto';
            });
        });
    }

    // Wire interactions
    card.querySelector('.close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeCard();
    });
    // Clicks INSIDE card shouldn't bubble to the outside-click handler
    card.addEventListener('click', (e) => e.stopPropagation());
    // Related-chip click: find node by related name and route to it
    card.querySelectorAll('.card-chip').forEach(chip => {
        chip.addEventListener('click', (e) => {
            e.stopPropagation();
            const name = chip.textContent.trim();
            // Try to find a node whose semantic name matches
            const matchIdx = findNodeBySemanticName(name);
            if (matchIdx >= 0) {
                const matchRec = labelRecords.find(r => r.nodeIdx === matchIdx);
                if (matchRec) handlePillClick(matchRec);
            }
        });
    });

    cardBackdrop.classList.add('visible');
    activeCard = { el: card, rec, isMobile: isMobileViewport() };
}

function closeCard(onDone) {
    if (!activeCard) { if (onDone) onDone(); return; }
    const card = activeCard.el;
    const rec  = activeCard.rec;
    card.classList.add('closing');

    if (activeCard.isMobile) {
        card.classList.add('sheet-closed');
        cardBackdrop.classList.remove('visible');
        setTimeout(() => {
            if (card.parentNode) card.parentNode.removeChild(card);
            rec.el.style.visibility = '';
            if (onDone) onDone();
        }, 400);
    } else {
        // Morph back to pill rect
        const pillRect = rec.el.getBoundingClientRect();
        card.classList.add('as-pill');
        card.style.left  = pillRect.left + 'px';
        card.style.top   = pillRect.top  + 'px';
        card.style.width = pillRect.width + 'px';
        card.style.height = pillRect.height + 'px';
        cardBackdrop.classList.remove('visible');
        setTimeout(() => {
            if (card.parentNode) card.parentNode.removeChild(card);
            rec.el.style.visibility = '';
            if (onDone) onDone();
        }, 440);
    }
    activeCard = null;
}

function estimateCardHeight(content) {
    let h = 0;
    h += 56;  // header
    h += 30;  // kind strip
    h += 16;  // body top padding
    // insight
    h += Math.max(60, Math.ceil(content.insight.length / 40) * 22) + 16;
    if (content.triggers && content.triggers.length) h += 56;
    if (content.origin) h += Math.max(50, Math.ceil(content.origin.length / 40) * 22) + 22;
    if (content.related && content.related.length) h += 56;
    if (content.note) h += 60;
    h += 20;  // body bottom padding
    return h;
}

function findNodeBySemanticName(name) {
    const lower = name.toLowerCase();
    for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].semantic && nodes[i].semantic.name.toLowerCase() === lower) return i;
    }
    return -1;
}

function escapeHTML(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// Click outside (on backdrop) closes the card
cardBackdrop.addEventListener('click', () => closeCard());

// Escape closes the card
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && activeCard) closeCard();
});

// Boot — set initial focus + start the render loop
applyFocus();
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    pmat.uniforms.pixelRatio.value = renderer.getPixelRatio();
});
</script>
