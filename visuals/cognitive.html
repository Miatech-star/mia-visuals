<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Field · Mia 3</title>
<style>
  :root {
    --ink: #e9edf5;
    --ink-dim: rgba(233, 237, 245, 0.55);
    --ink-faint: rgba(233, 237, 245, 0.22);
    --panel: rgba(8, 10, 18, 0.55);
    --edge: rgba(255, 255, 255, 0.09);
    --edge-hot: rgba(255, 255, 255, 0.32);
    --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden;
    background: #04050a;
    color: var(--ink);
    font-family: var(--sans);
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }
  body.live { cursor: grab; }
  body.live.grabbing { cursor: grabbing; }
  body.live.hover { cursor: pointer; }
  canvas { display: block; position: fixed; inset: 0; z-index: 1; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 3;
    background:
      radial-gradient(ellipse 120% 80% at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%),
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(40,40,80,0.06) 0%, transparent 70%);
  }

  /* ============== HUD ============== */
  .brand {
    position: fixed; top: 20px; left: 22px; z-index: 12;
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.24em; color: var(--ink-dim);
    text-transform: uppercase; pointer-events: none;
    user-select: none; line-height: 1.4;
  }
  .brand .mark { color: var(--ink); font-weight: 500; }
  .brand .sub {
    opacity: 0.55; font-size: 8.5px;
    letter-spacing: 0.3em; margin-top: 4px; font-weight: 400;
  }

  .status {
    position: fixed; bottom: 18px; right: 22px; z-index: 12;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.2em; color: var(--ink-faint);
    text-transform: uppercase; text-align: right;
    pointer-events: none; user-select: none; line-height: 1.7;
  }
  .status .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #7fe070; box-shadow: 0 0 10px #7fe070;
    margin-right: 8px; vertical-align: middle;
    animation: pulse 2.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }

  .hints {
    position: fixed; bottom: 20px; left: 22px; z-index: 12;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 0.2em; color: var(--ink-faint);
    text-transform: uppercase; pointer-events: none;
    user-select: none; line-height: 1.8;
  }
  .hints span { color: var(--ink-dim); }

  /* fade-in HUD elements after intro */
  .hud-fade {
    opacity: 0;
    transition: opacity 1600ms var(--ease);
  }
  .hud-fade.show { opacity: 1; }

  /* brand fades in early but stays subtle */
  .brand { opacity: 0; transition: opacity 2400ms var(--ease); }
  .brand.show { opacity: 1; }

  /* ============== LABELS ============== */
  #labels, #sublabels {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 10;
  }
  .label {
    position: absolute; left: 0; top: 0;
    padding: 5px 9px;
    font-family: var(--mono); font-size: 9.5px;
    line-height: 1.15; letter-spacing: 0.13em;
    color: var(--ink);
    background: var(--panel);
    border: 1px solid var(--edge);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    transition: border-color 280ms ease, background 280ms ease;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    user-select: none;
    will-change: transform, opacity;
    opacity: 0;
  }
  .label::before, .label::after {
    content: ''; position: absolute;
    width: 5px; height: 5px;
    border: 1px solid currentColor;
    opacity: 0.55; pointer-events: none;
  }
  .label::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .label::after  { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .label .name { display: block; font-weight: 500; color: var(--ink); }
  .label .stat {
    display: block; margin-top: 3px;
    font-size: 8px; opacity: 0.5;
    letter-spacing: 0.16em; font-weight: 400; color: var(--ink);
  }
  .label.hot {
    border-color: var(--edge-hot);
    background: rgba(12, 14, 24, 0.7);
  }
  .label.hot .stat { opacity: 0.85; }

  .sub-label {
    position: absolute; left: 0; top: 0;
    padding: 2px 7px;
    font-family: var(--mono); font-size: 8.5px;
    letter-spacing: 0.16em;
    background: rgba(4,5,10,0.5);
    border: 1px solid var(--edge);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    user-select: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .sub-label::before {
    content: ''; display: inline-block;
    width: 4px; height: 4px;
    background: currentColor;
    margin-right: 6px; vertical-align: middle;
    opacity: 0.9;
  }
  .sub-label.show { opacity: 0.9; }

  /* ============== FOCUS PANEL ============== */
  .focus-panel {
    position: fixed; top: 50%; left: 22px;
    transform: translateY(-50%) translateX(-12px);
    width: 230px; padding: 16px 16px 14px;
    z-index: 12;
    font-family: var(--mono);
    background: var(--panel);
    border: 1px solid var(--edge);
    border-left: 2px solid #fff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0; pointer-events: none;
    transition: opacity 450ms ease, transform 450ms var(--ease);
  }
  .focus-panel.show {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
    pointer-events: auto;
  }
  .focus-panel .tag {
    font-size: 8px; letter-spacing: 0.28em;
    color: var(--ink-faint); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .focus-panel .name {
    font-size: 13px; letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--ink); font-weight: 500;
  }
  .focus-panel .metrics {
    font-size: 9px; letter-spacing: 0.14em;
    color: var(--ink-dim); line-height: 1.9;
    text-transform: uppercase;
  }
  .focus-panel .metrics .row { display: flex; justify-content: space-between; }
  .focus-panel .metrics span { color: var(--ink); font-weight: 500; }
  .focus-panel .release {
    margin-top: 14px; padding-top: 11px;
    border-top: 1px solid var(--edge);
    font-size: 8.5px; letter-spacing: 0.24em;
    color: var(--ink-faint); text-transform: uppercase;
    cursor: pointer; pointer-events: auto;
    transition: color 220ms ease;
  }
  .focus-panel .release:hover { color: var(--ink); }

  /* ============== INTRO OVERLAY ============== */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center,
      rgba(4,5,10,0.0) 0%, rgba(4,5,10,0.55) 80%);
    pointer-events: auto;
    opacity: 1;
    transition: opacity 600ms var(--ease);
  }
  .intro-overlay.gone {
    opacity: 0;
    pointer-events: none;
  }
  .intro-mark {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--ink);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .intro-sub {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 44px;
  }
  .intro-begin {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ink);
    background: rgba(8, 10, 18, 0.65);
    border: 1px solid var(--edge-hot);
    padding: 14px 28px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    transition: background 280ms ease, transform 280ms ease, border-color 280ms ease;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative;
  }
  .intro-begin::before, .intro-begin::after {
    content: ''; position: absolute;
    width: 6px; height: 6px;
    border: 1px solid var(--edge-hot);
  }
  .intro-begin::before {
    top: -1px; left: -1px;
    border-right: none; border-bottom: none;
  }
  .intro-begin::after {
    bottom: -1px; right: -1px;
    border-left: none; border-top: none;
  }
  .intro-begin:hover {
    background: rgba(20, 22, 38, 0.85);
    border-color: rgba(255, 255, 255, 0.5);
  }
  .intro-begin .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7fe070;
    box-shadow: 0 0 10px #7fe070;
    animation: pulse 2.8s ease-in-out infinite;
  }
  .intro-hint {
    margin-top: 32px;
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.36em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* ============== SUBTITLES ============== */
  .subtitle {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 11;
    max-width: min(820px, 88vw);
    padding: 0 24px;
    text-align: center;
    font-family: 'Utopia Std Subhead', 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.005em;
    line-height: 1.4;
    color: var(--ink);
    pointer-events: none;
    opacity: 1;
    transition: opacity 500ms var(--ease);
    text-shadow: 0 1px 14px rgba(0, 0, 0, 0.6);
  }
  .subtitle.fade-out { opacity: 0; }
  .subtitle .word {
    display: inline-block;
    opacity: 0;
    filter: blur(6px);
    transform: translateY(4px);
    transition: opacity 700ms var(--ease),
                filter 700ms var(--ease),
                transform 700ms var(--ease);
    will-change: opacity, filter, transform;
  }
  .subtitle .word.show {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0);
  }
  .subtitle .space {
    display: inline-block;
    width: 0.3em;
  }

  /* ============== ERROR OVERLAY ============== */
  #err {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    max-width: 640px; width: calc(100% - 60px);
    padding: 22px 24px;
    font-family: var(--mono);
    font-size: 11px; line-height: 1.6;
    letter-spacing: 0.06em;
    color: #ff8e8b;
    background: rgba(20, 8, 10, 0.85);
    border: 1px solid rgba(255, 100, 100, 0.25);
    border-left: 2px solid #ff5e5b;
    z-index: 9999;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }
  #err .tag {
    color: #ff5e5b;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <!-- HUD: starts hidden, fades in after intro -->
  <div class="brand" id="hud-brand">
    <div class="mark">MIA 3</div>
    <div class="sub">cognitive field · semantic activation</div>
  </div>

  <div class="status hud-fade" id="hud-status">
    <div><span class="pulse"></span>BASELINE · <span id="globalAct">0.00</span></div>
    <div style="opacity: 0.6; margin-top: 4px;">DRAG · ZOOM · CLICK REGION</div>
  </div>

  <div class="hints hud-fade" id="hud-hints"><span>ESC</span> RELEASE FOCUS</div>

  <div id="labels"></div>
  <div id="sublabels"></div>

  <div class="focus-panel" id="focusPanel">
    <div class="tag">FOCUSED REGION</div>
    <div class="name" id="focusName">—</div>
    <div class="metrics" id="focusMetrics"></div>
    <div class="release" id="focusRelease">↵ RELEASE · ESC</div>
  </div>

  <!-- Subtitle line -->
  <div class="subtitle" id="subtitle"></div>

  <!-- Intro overlay -->
  <div class="intro-overlay" id="introOverlay">
    <div class="intro-mark">MIA 3</div>
    <div class="intro-sub">cognitive field</div>
    <button class="intro-begin" id="beginBtn">
      <span class="dot"></span>
      <span>BEGIN SESSION</span>
    </button>
    <div class="intro-hint">audio will begin</div>
  </div>

  <!-- Audio (no controls) -->
  <audio id="introAudio" preload="auto" src="audio/mia_intro.mp3"></audio>

  <!-- Error overlay -->
  <div id="err"><div class="tag">SYSTEM ERROR</div><div id="errMsg"></div></div>

  <script>
    var _errBox = document.getElementById('err');
    var _errMsg = document.getElementById('errMsg');
    function showError(msg) {
      if (_errMsg) _errMsg.textContent = msg;
      if (_errBox) _errBox.style.display = 'block';
      console.error(msg);
    }
    window.addEventListener('error', function (e) {
      showError((e.message || 'Unknown error') +
        (e.filename ? '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      showError('Module failed to load.\n' +
        (r && r.message ? r.message : String(r)) +
        '\n\nIf this is a CDN block, try opening over http(s), not file://.');
    });
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ======================================================================
  // SCENE
  // ======================================================================
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
    55, window.innerWidth / window.innerHeight, 0.1, 500
  );

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x04050a, 1);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.minDistance = 12;
  controls.maxDistance = 110;
  controls.rotateSpeed = 0.55;
  controls.panSpeed = 0.6;
  controls.zoomSpeed = 0.8;
  controls.enabled = false; // disabled until 'live' phase

  const clock = new THREE.Clock();

  // ======================================================================
  // PHASE STATE MACHINE
  // ======================================================================
  let phase = 'idle';            // 'idle' | 'intro' | 'live'
  let introStartT = 0;           // wall-clock time when intro began
  const INTRO_DURATION = 11.0;   // covers all subtitles + brief settle
  let smoothedAudioE = 0;        // smoothed audio amplitude 0..1 (drives reactivity)

  // ======================================================================
  // REGIONS
  // ======================================================================
  const REGIONS = [
    { name:'Emotional Core',    color:0xff5d5b, pos:[  0, -0.5,  0], r:6.2, n:2400,
      subs:['PRIMARY','SECONDARY','UNSPOKEN','RESIDUAL'] },
    { name:'Memory Center',     color:0xf5b84e, pos:[-15,  3,  7], r:4.9, n:1650,
      subs:['RECENT','FORMATIVE','RECURRING','SOMATIC'] },
    { name:'Concept Layer',     color:0x8bd4ff, pos:[ -5, 11,  3], r:4.6, n:1550,
      subs:['FRAMES','SCHEMAS','METAPHORS','BELIEFS'] },
    { name:'Narrative Engine',  color:0xe85ab8, pos:[ 12,  8, -3], r:4.6, n:1550,
      subs:['SELF-STORY','OTHERS','FUTURE-SELF','REVISIONS'] },
    { name:'Conflict Map',      color:0xff8b3d, pos:[  9, -6,  8], r:4.4, n:1450,
      subs:['INTERNAL','RELATIONAL','VALUE','UNRESOLVED'] },
    { name:'Pattern Detector',  color:0x4fd1b8, pos:[ -9, -6,-11], r:4.4, n:1450,
      subs:['CYCLES','TRIGGERS','ECHOES','LOOPS'] },
    { name:'Attachment Signal', color:0xff8fb6, pos:[-13, -3, -5], r:4.3, n:1400,
      subs:['SAFE','ANXIOUS','AVOIDANT','AMBIVALENT'] },
    { name:'Forecast Engine',   color:0x7b6fff, pos:[ 14,  2,  4], r:4.4, n:1450,
      subs:['FEAR','HOPE','REHEARSAL','CONTINGENCY'] },
    { name:'Identity Field',    color:0xb77aff, pos:[  2,  9,-10], r:4.7, n:1550,
      subs:['CORE-SELF','ADAPTED','PROJECTED','EMERGING'] },
    { name:'Body Signal',       color:0x7fe070, pos:[  3,-12,  3], r:4.7, n:1550,
      subs:['TENSION','BREATH','WARMTH','HEAVINESS'] },
  ];

  REGIONS.forEach((region, i) => {
    region.index = i;
    region.colorObj = new THREE.Color(region.color);
    region.position = new THREE.Vector3(...region.pos);
    region.activity = 0.5;
    region.targetActivity = 0.5;
    region.burstUntil = 0;
    // revealT is now a derived value driven by intro time + REGION_SCHEDULE.
    // It controls label opacity and HUD readouts. Particle visibility is
    // driven independently by per-particle aActivation in the shader.
    region.revealT = 0;
    const n = region.subs.length;
    region.subPositions = region.subs.map((name, k) => {
      const angle = (k / n) * Math.PI * 2 + 0.6;
      const elev = Math.sin(k * 2.3) * region.r * 0.35;
      const rad = region.r * 0.78;
      return {
        name,
        pos: new THREE.Vector3(
          region.position.x + Math.cos(angle) * rad,
          region.position.y + elev,
          region.position.z + Math.sin(angle) * rad,
        ),
      };
    });
  });

  const NUM_R = REGIONS.length;

  // Generative chain-reaction schedule. Each entry says "this cluster STARTS
  // activating at this time"; particles within a cluster then activate
  // inside-out over REGION_GROW_DURATION, with each particle taking
  // PARTICLE_BIRTH_DURATION to fully ramp in (size + intensity).
  // Core has a negative start time so a portion of it is already born at idle.
  const REGION_GROW_DURATION   = 1.0;   // within-cluster activation spread
  const PARTICLE_BIRTH_DURATION = 0.4;  // per-particle ramp-in
  const REGION_SCHEDULE = [
    { idx: 0, start: -0.5 }, // Emotional Core (partial at idle)
    { idx: 2, start:  0.6 }, // Concept Layer
    { idx: 9, start:  1.0 }, // Body Signal
    { idx: 4, start:  1.4 }, // Conflict Map
    { idx: 8, start:  1.8 }, // Identity Field
    { idx: 6, start:  2.2 }, // Attachment Signal
    { idx: 3, start:  2.6 }, // Narrative Engine
    { idx: 7, start:  3.0 }, // Forecast Engine
    { idx: 5, start:  3.4 }, // Pattern Detector
    { idx: 1, start:  3.8 }, // Memory Center (last)
  ];
  // Build a quick lookup: regionIdx -> startTime
  const REGION_START = new Array(REGIONS.length).fill(99);
  REGION_SCHEDULE.forEach(e => { REGION_START[e.idx] = e.start; });

  // ======================================================================
  // ACTIVITY DATA TEXTURE — R = activity (0..1.275), G = revealT (0..1)
  // ======================================================================
  const ATEX_W = 16;
  const activityBytes = new Uint8Array(ATEX_W * 4);
  const activityTex = new THREE.DataTexture(
    activityBytes, ATEX_W, 1, THREE.RGBAFormat
  );
  activityTex.magFilter = THREE.NearestFilter;
  activityTex.minFilter = THREE.NearestFilter;
  activityTex.wrapS = THREE.ClampToEdgeWrapping;
  activityTex.wrapT = THREE.ClampToEdgeWrapping;
  activityTex.needsUpdate = true;

  function writeActivityTex() {
    for (let i = 0; i < NUM_R; i++) {
      activityBytes[i * 4]     = Math.max(0, Math.min(255,
        Math.round(REGIONS[i].activity * 200)));
      activityBytes[i * 4 + 1] = Math.max(0, Math.min(255,
        Math.round(REGIONS[i].revealT * 255)));
    }
    activityTex.needsUpdate = true;
  }

  function makeCircleTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.35,'rgba(255,255,255,0.5)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 64, 64);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    return tex;
  }
  const circleTex = makeCircleTexture();

  // ======================================================================
  // PARTICLES
  // ======================================================================
  const TOTAL = REGIONS.reduce((s, r) => s + r.n, 0);
  const positions     = new Float32Array(TOTAL * 3);
  const colors        = new Float32Array(TOTAL * 3);
  const regionIdx     = new Float32Array(TOTAL);
  const phases        = new Float32Array(TOTAL);
  const sizes         = new Float32Array(TOTAL);
  const baseIntensity = new Float32Array(TOTAL);
  const driftSeeds    = new Float32Array(TOTAL);
  const activation    = new Float32Array(TOTAL); // when this particle is "born"

  let p = 0;
  REGIONS.forEach((region, rIdx) => {
    for (let i = 0; i < region.n; i++) {
      const rBase = Math.pow(Math.random(), 0.55);
      const rJit = (0.75 + Math.random() * 0.6);
      const r = region.r * rBase * rJit;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      positions[p*3    ] = region.position.x + r * Math.sin(phi) * Math.cos(theta);
      positions[p*3 + 1] = region.position.y + r * Math.sin(phi) * Math.sin(theta);
      positions[p*3 + 2] = region.position.z + r * Math.cos(phi);

      const c = region.colorObj.clone();
      const hsl = {};
      c.getHSL(hsl);
      c.setHSL(
        hsl.h + (Math.random() - 0.5) * 0.035,
        Math.max(0, Math.min(1, hsl.s * (0.85 + Math.random() * 0.3))),
        Math.max(0, Math.min(1, hsl.l * (0.6 + Math.random() * 0.75)))
      );
      colors[p*3    ] = c.r;
      colors[p*3 + 1] = c.g;
      colors[p*3 + 2] = c.b;

      regionIdx[p]     = rIdx;
      phases[p]        = Math.random() * Math.PI * 2;
      sizes[p]         = 0.9 + Math.random() * 1.9;
      baseIntensity[p] = 0.35 + Math.random() * 0.65;
      driftSeeds[p]    = Math.random() * 100;

      // Inside-out activation: particles closer to the cluster center
      // activate earliest within the cluster's growth window. localT in [0,1]
      // is the particle's normalized distance from cluster center, with a
      // small jitter so the front isn't a clean shell.
      const localT = Math.min(1, (rBase * rJit));
      const jitter = (Math.random() - 0.5) * 0.18;
      activation[p] = REGION_START[rIdx] + localT * REGION_GROW_DURATION + jitter;
      p++;
    }
  });

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('aColor',   new THREE.BufferAttribute(colors, 3));
  geom.setAttribute('aRegion',  new THREE.BufferAttribute(regionIdx, 1));
  geom.setAttribute('aPhase',   new THREE.BufferAttribute(phases, 1));
  geom.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geom.setAttribute('aBase',    new THREE.BufferAttribute(baseIntensity, 1));
  geom.setAttribute('aDrift',   new THREE.BufferAttribute(driftSeeds, 1));
  geom.setAttribute('aActivation', new THREE.BufferAttribute(activation, 1));

  const particleMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:           { value: 0 },
      uActivityTex:    { value: activityTex },
      uTexW:           { value: ATEX_W },
      uHover:          { value: -1 },
      uFocus:          { value: 0 },
      uFocusRegion:    { value: -1 },
      uPixelRatio:     { value: renderer.getPixelRatio() },
      uIntroT:         { value: 0 },          // intro elapsed (0 at idle, large in live)
      uBirthDuration:  { value: PARTICLE_BIRTH_DURATION },
      uAudioEnergy:    { value: 0 },          // smoothed mic-style level 0..1
    },
    vertexShader: `
      attribute vec3 aColor;
      attribute float aRegion;
      attribute float aPhase;
      attribute float aSize;
      attribute float aBase;
      attribute float aDrift;
      attribute float aActivation;

      uniform float uTime;
      uniform sampler2D uActivityTex;
      uniform float uTexW;
      uniform float uHover;
      uniform float uFocus;
      uniform float uFocusRegion;
      uniform float uPixelRatio;
      uniform float uIntroT;
      uniform float uBirthDuration;
      uniform float uAudioEnergy;

      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        // Per-region activity (R channel only — revealT is no longer needed
        // here since per-particle aActivation drives visibility)
        float u = (aRegion + 0.5) / uTexW;
        float activity = texture2D(uActivityTex, vec2(u, 0.5)).r * (255.0 / 200.0);

        // BORN factor: smooth ramp from 0 to 1 starting at this particle's
        // activation time and lasting uBirthDuration. This is what creates
        // the chain-reaction generative birth — particles literally come
        // into existence one by one as uIntroT crosses each aActivation.
        float born = smoothstep(aActivation, aActivation + uBirthDuration, uIntroT);

        vec3 pos = position;
        float t = uTime;
        pos.x += sin(t * 0.22 + aPhase + aDrift * 0.3) * 0.14;
        pos.y += cos(t * 0.19 + aPhase * 1.37) * 0.14;
        pos.z += sin(t * 0.17 + aPhase * 0.71 + aDrift * 0.2) * 0.14;

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;

        float slow   = 0.6 + 0.4 * sin(t * 0.9 + aPhase);
        float fast   = 0.7 + 0.3 * sin(t * 3.2 + aPhase * 4.0);
        float flicker = mix(0.65, 1.0, slow * fast);

        float hoverBoost = (uHover > -0.5 && abs(aRegion - uHover) < 0.5) ? 1.45 : 1.0;

        // Audio reactivity: subtle global brightness boost on voice peaks.
        // Kept restrained — max ~30% boost so it feels alive, not gimmicky.
        float audioBoost = 1.0 + uAudioEnergy * 0.30;

        float intensity = aBase * activity * flicker * hoverBoost * born * audioBoost;

        // Size also ramps with born so newly-activating particles "pop"
        // from a small seed into their full presence
        float bornSize = mix(0.35, 1.0, born);
        float sizePx = aSize * intensity * 2.4 * bornSize;
        gl_PointSize = sizePx * (230.0 / -mvPosition.z) * uPixelRatio;

        vColor = aColor * (0.5 + intensity * 0.9);

        float alpha = intensity;
        if (uFocus > 0.01) {
          bool isFocused = abs(aRegion - uFocusRegion) < 0.5;
          alpha *= isFocused ? mix(1.0, 1.25, uFocus) : mix(1.0, 0.08, uFocus);
        }
        vAlpha = clamp(alpha, 0.0, 1.6);
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;

      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;

        float halo = pow(1.0 - smoothstep(0.0, 0.5, d), 2.2);
        float core = pow(1.0 - smoothstep(0.0, 0.28, d), 6.0);

        vec3 col = vColor * halo + vec3(1.0) * core * 0.45;
        gl_FragColor = vec4(col, halo * vAlpha);
      }
    `,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false,
  });

  writeActivityTex();

  const particles = new THREE.Points(geom, particleMat);
  scene.add(particles);

  // Background dust
  {
    const N = 900;
    const pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      pos[i*3+0] = (Math.random() - 0.5) * 180;
      pos[i*3+1] = (Math.random() - 0.5) * 100;
      pos[i*3+2] = (Math.random() - 0.5) * 180;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const m = new THREE.PointsMaterial({
      color: 0x8aa0c5,
      size: 0.7,
      transparent: true,
      opacity: 0.32,
      map: circleTex,
      alphaTest: 0.02,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true,
    });
    scene.add(new THREE.Points(g, m));
  }

  // ======================================================================
  // SYNAPSES
  // ======================================================================
  const synapseGroup = new THREE.Group();
  scene.add(synapseGroup);
  const synapses = [];
  const MAX_SYNAPSES = 14;

  function createSynapse(fromIdx, toIdx, opts) {
    opts = opts || {};
    const from = REGIONS[fromIdx];
    const to   = REGIONS[toIdx];

    const mid = from.position.clone().add(to.position).multiplyScalar(0.5);
    const outward = mid.clone();
    if (outward.lengthSq() > 0.001) outward.normalize();
    else outward.set(0, 1, 0);
    mid.addScaledVector(outward, 2 + Math.random() * 3);
    mid.add(new THREE.Vector3(
      (Math.random() - 0.5) * 2.5,
      (Math.random() - 0.5) * 2.5,
      (Math.random() - 0.5) * 2.5
    ));

    const curve = new THREE.QuadraticBezierCurve3(
      from.position.clone(), mid, to.position.clone()
    );
    const pts = curve.getPoints(40);
    const g = new THREE.BufferGeometry().setFromPoints(pts);

    const mixColor = from.colorObj.clone().lerp(to.colorObj, 0.5);
    const lineMat = new THREE.LineBasicMaterial({
      color: mixColor,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const line = new THREE.Line(g, lineMat);
    line.frustumCulled = false;
    synapseGroup.add(line);

    const pulseGeom = new THREE.BufferGeometry();
    pulseGeom.setAttribute('position',
      new THREE.BufferAttribute(new Float32Array([0,0,0]), 3));
    pulseGeom.boundingSphere = new THREE.Sphere(new THREE.Vector3(), 50);
    const pulseMat = new THREE.PointsMaterial({
      color: mixColor,
      size: 0.55,
      transparent: true,
      opacity: 0,
      map: circleTex,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true,
    });
    const pulse = new THREE.Points(pulseGeom, pulseMat);
    pulse.frustumCulled = false;
    synapseGroup.add(pulse);

    return {
      from: fromIdx, to: toIdx,
      curve, line, lineMat, pulse, pulseGeom, pulseMat,
      created: clock.getElapsedTime(),
      duration: opts.duration != null ? opts.duration : (1.4 + Math.random() * 1.6),
      peak: opts.peak != null ? opts.peak : (0.45 + Math.random() * 0.3),
    };
  }

  function removeSynapse(s) {
    synapseGroup.remove(s.line);
    synapseGroup.remove(s.pulse);
    s.line.geometry.dispose();
    s.lineMat.dispose();
    s.pulseGeom.dispose();
    s.pulseMat.dispose();
  }

  function updateSynapses() {
    const t = clock.getElapsedTime();
    const isLive = phase === 'live';

    if (isLive && synapses.length < MAX_SYNAPSES && Math.random() < 0.09) {
      const ranked = REGIONS
        .map(r => ({ i: r.index, a: r.activity * r.revealT }))
        .sort((a, b) => b.a - a.a)
        .slice(0, 6);
      const A = ranked[Math.floor(Math.random() * ranked.length)];
      const B = ranked[Math.floor(Math.random() * ranked.length)];
      if (A && B && A.i !== B.i) {
        synapses.push(createSynapse(A.i, B.i));
      }
    }

    for (let i = synapses.length - 1; i >= 0; i--) {
      const s = synapses[i];
      const age = t - s.created;
      const prog = age / s.duration;
      if (prog >= 1) {
        removeSynapse(s);
        synapses.splice(i, 1);
        continue;
      }
      const env = Math.sin(prog * Math.PI);
      const focusDim = focusT > 0.1 ? (1 - focusT * 0.85) : 1;
      // Audio-reactive luminance: connections breathe with voice
      const audioBoost = 1.0 + smoothedAudioE * 0.45;
      s.lineMat.opacity = env * s.peak * focusDim * audioBoost;

      const pPos = s.curve.getPoint(prog);
      s.pulseGeom.attributes.position.setXYZ(0, pPos.x, pPos.y, pPos.z);
      s.pulseGeom.attributes.position.needsUpdate = true;
      s.pulseMat.opacity = env * 0.95 * focusDim * audioBoost;
    }
  }

  // ======================================================================
  // PICK MESHES
  // ======================================================================
  const pickMeshes = REGIONS.map((region) => {
    const g = new THREE.SphereGeometry(region.r * 1.2, 14, 10);
    const m = new THREE.MeshBasicMaterial({
      visible: false, transparent: true, opacity: 0
    });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.copy(region.position);
    mesh.userData.regionIdx = region.index;
    scene.add(mesh);
    return mesh;
  });

  // ======================================================================
  // LABELS
  // ======================================================================
  const labelContainer = document.getElementById('labels');
  const labels = REGIONS.map((region) => {
    const el = document.createElement('div');
    el.className = 'label';
    el.innerHTML =
      '<span class="name">' + region.name + '</span>' +
      '<span class="stat">' + region.n + ' SIGNALS · FIRING <span class="firing">0.00</span></span>';
    el.style.color = '#' + region.colorObj.getHexString();
    labelContainer.appendChild(el);

    const dir = region.position.clone();
    if (dir.lengthSq() < 0.1) dir.set(0, 1, 0);
    else dir.normalize();

    return {
      el,
      region,
      firingEl: el.querySelector('.firing'),
      offsetDir: new THREE.Vector3(dir.x * 0.4, 0.8, dir.z * 0.4).normalize(),
    };
  });

  function updateLabels() {
    const v = new THREE.Vector3();
    const width = window.innerWidth;
    const height = window.innerHeight;
    for (const L of labels) {
      const anchor = L.region.position.clone()
        .addScaledVector(L.offsetDir, L.region.r * 0.6 + 1.2);
      v.copy(anchor).project(camera);
      const behind = v.z > 1 || v.z < -1;

      // Reveal-driven opacity: label appears as its region materializes
      const revealAlpha = Math.min(1, Math.max(0, (L.region.revealT - 0.5) * 2.2));
      const dim = focusRegion !== -1 && focusRegion !== L.region.index;
      const dimMul = dim ? 0.22 : 1;
      L.el.style.opacity = behind ? 0 : (revealAlpha * dimMul);

      if (behind) continue;

      const x = (v.x * 0.5 + 0.5) * width;
      const y = (-v.y * 0.5 + 0.5) * height;
      L.el.style.transform =
        'translate3d(calc(' + x + 'px - 50%), calc(' + y + 'px - 50%), 0)';

      L.firingEl.textContent = (L.region.activity * L.region.revealT).toFixed(2);

      const isHot = hoveredRegion === L.region.index
                 || (L.region.activity * L.region.revealT) > 0.88
                 || focusRegion === L.region.index;
      L.el.classList.toggle('hot', isHot);
    }
  }

  // ======================================================================
  // SUB-LABELS + SUB-NODES (focus-mode)
  // ======================================================================
  const sublabelContainer = document.getElementById('sublabels');
  let activeSubLabels = [];

  function showSubLabels(idx) {
    clearSubLabels();
    const region = REGIONS[idx];
    region.subPositions.forEach((sub, i) => {
      const el = document.createElement('div');
      el.className = 'sub-label';
      el.textContent = sub.name;
      el.style.color = '#' + region.colorObj.getHexString();
      sublabelContainer.appendChild(el);
      setTimeout(() => el.classList.add('show'), 220 + i * 90);
      activeSubLabels.push({ el, pos: sub.pos });
    });
  }
  function clearSubLabels() {
    activeSubLabels.forEach(({ el }) => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 450);
    });
    activeSubLabels = [];
  }
  function updateSubLabels() {
    if (!activeSubLabels.length) return;
    const v = new THREE.Vector3();
    for (const S of activeSubLabels) {
      v.copy(S.pos).project(camera);
      if (v.z > 1) { S.el.style.opacity = '0'; continue; }
      const x = (v.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-v.y * 0.5 + 0.5) * window.innerHeight;
      S.el.style.transform =
        'translate3d(calc(' + x + 'px - 50%), calc(' + y + 'px - 50%), 0)';
    }
  }

  const SUB_MAX = 8;
  const subNodeGeom = new THREE.BufferGeometry();
  const subNodePos = new Float32Array(SUB_MAX * 3);
  subNodeGeom.setAttribute('position', new THREE.BufferAttribute(subNodePos, 3));
  subNodeGeom.setDrawRange(0, 0);
  subNodeGeom.boundingSphere = new THREE.Sphere(new THREE.Vector3(), 50);
  const subNodeMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.7,
    transparent: true,
    opacity: 0,
    map: circleTex,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const subNodes = new THREE.Points(subNodeGeom, subNodeMat);
  subNodes.frustumCulled = false;
  scene.add(subNodes);

  function updateSubNodes() {
    if (focusRegion < 0) {
      subNodeMat.opacity += (0 - subNodeMat.opacity) * 0.09;
      if (subNodeMat.opacity < 0.02) subNodeGeom.setDrawRange(0, 0);
      return;
    }
    const region = REGIONS[focusRegion];
    const t = clock.getElapsedTime();
    region.subPositions.forEach((sub, i) => {
      const jx = Math.sin(t * 0.9 + i * 1.7) * 0.15;
      const jy = Math.cos(t * 0.75 + i * 2.1) * 0.15;
      const jz = Math.sin(t * 0.6  + i * 1.3) * 0.15;
      subNodePos[i*3+0] = sub.pos.x + jx;
      subNodePos[i*3+1] = sub.pos.y + jy;
      subNodePos[i*3+2] = sub.pos.z + jz;
    });
    subNodeGeom.attributes.position.needsUpdate = true;
    subNodeGeom.setDrawRange(0, region.subs.length);
    subNodeMat.color.setHex(region.color);
    subNodeMat.opacity += (1.0 - subNodeMat.opacity) * 0.07;
  }

  // ======================================================================
  // CAMERA — intro path + focus path
  // ======================================================================
  const INTRO_CAM_POS    = new THREE.Vector3(2, 1, 14);
  const INTRO_CAM_TARGET = new THREE.Vector3(0, -0.5, 0);
  const DEFAULT_CAM_POS  = new THREE.Vector3(0, 2, 48);
  const DEFAULT_TARGET   = new THREE.Vector3(0, 0, 0);

  // Set initial position
  camera.position.copy(INTRO_CAM_POS);
  controls.target.copy(INTRO_CAM_TARGET);
  controls.update();

  const targetCamPos    = DEFAULT_CAM_POS.clone();
  const targetCamTarget = DEFAULT_TARGET.clone();
  let focusT = 0;
  let transitionUntil = 0;

  function updateIntroCamera(introT) {
    // Camera is mostly still for the first 0.8s, then eases out to the
    // default position over the remainder of the intro
    const totalDuration = 9.5;
    const startDelay = 0.8;
    let p = (introT - startDelay) / (totalDuration - startDelay);
    p = Math.max(0, Math.min(1, p));
    // ease-out cubic
    const e = 1 - Math.pow(1 - p, 3);
    camera.position.lerpVectors(INTRO_CAM_POS, DEFAULT_CAM_POS, e);
    controls.target.lerpVectors(INTRO_CAM_TARGET, DEFAULT_TARGET, e);
  }

  // ======================================================================
  // INTERACTION (gated on phase === 'live')
  // ======================================================================
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredRegion = -1;
  let focusRegion = -1;

  let downX = 0, downY = 0, isDown = false;

  renderer.domElement.addEventListener('pointerdown', (e) => {
    if (phase !== 'live') return;
    isDown = true;
    downX = e.clientX; downY = e.clientY;
    document.body.classList.add('grabbing');
  });
  window.addEventListener('pointerup', (e) => {
    document.body.classList.remove('grabbing');
    if (phase !== 'live' || !isDown) return;
    isDown = false;
    const dx = e.clientX - downX;
    const dy = e.clientY - downY;
    if (Math.hypot(dx, dy) < 5) handleClick(e);
  });
  window.addEventListener('pointermove', (e) => {
    if (phase !== 'live') return;
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(pickMeshes, false);
    const newHover = hits.length ? hits[0].object.userData.regionIdx : -1;
    if (newHover !== hoveredRegion) onHoverChange(newHover);
  });

  function onHoverChange(newIdx) {
    hoveredRegion = newIdx;
    particleMat.uniforms.uHover.value = newIdx;
    document.body.classList.toggle('hover', newIdx >= 0);

    if (newIdx >= 0 && focusRegion < 0) {
      const region = REGIONS[newIdx];
      const nearest = REGIONS
        .filter(r => r.index !== newIdx)
        .map(r => ({ i: r.index, d: region.position.distanceTo(r.position) }))
        .sort((a, b) => a.d - b.d)
        .slice(0, 2);
      nearest.forEach(n => {
        if (synapses.length < MAX_SYNAPSES) {
          synapses.push(createSynapse(newIdx, n.i,
            { duration: 1.6 + Math.random() * 0.6, peak: 0.55 }));
        }
      });
      region.burstUntil = clock.getElapsedTime() + 0.8;
    }
  }

  function handleClick(e) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(pickMeshes, false);
    if (hits.length) setFocus(hits[0].object.userData.regionIdx);
    else releaseFocus();
  }

  function setFocus(idx) {
    focusRegion = idx;
    particleMat.uniforms.uFocusRegion.value = idx;
    transitionUntil = clock.getElapsedTime() + 1.3;

    const region = REGIONS[idx];
    targetCamTarget.copy(region.position);
    const worldOffset = new THREE.Vector3(1, 0.45, 1.4).normalize()
      .multiplyScalar(region.r * 3.8 + 6);
    targetCamPos.copy(region.position).add(worldOffset);

    const panel = document.getElementById('focusPanel');
    panel.style.borderLeftColor = '#' + region.colorObj.getHexString();
    document.getElementById('focusName').textContent = region.name;
    document.getElementById('focusMetrics').innerHTML =
      '<div class="row"><span>SIGNALS</span><span>' + region.n + '</span></div>' +
      '<div class="row"><span>SUBLAYERS</span><span>' + region.subs.length + '</span></div>' +
      '<div class="row"><span>STATE</span><span>ACTIVE</span></div>';
    panel.classList.add('show');

    showSubLabels(idx);
  }

  function releaseFocus() {
    if (focusRegion === -1) return;
    focusRegion = -1;
    targetCamPos.copy(DEFAULT_CAM_POS);
    targetCamTarget.copy(DEFAULT_TARGET);
    transitionUntil = clock.getElapsedTime() + 1.3;
    document.getElementById('focusPanel').classList.remove('show');
    clearSubLabels();
  }

  document.getElementById('focusRelease').addEventListener('click', releaseFocus);
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') releaseFocus();
  });

  // ======================================================================
  // ACTIVITY DYNAMICS
  // ======================================================================
  let nextWave = 4 + Math.random() * 3;
  function triggerWaves(t) {
    if (t < nextWave) return;
    nextWave = t + 9 + Math.random() * 7;
    const startIdx = Math.floor(Math.random() * REGIONS.length);
    const origin = REGIONS[startIdx].position;
    REGIONS.forEach((r) => {
      const d = origin.distanceTo(r.position);
      const delayMs = d * 140;
      setTimeout(() => {
        r.burstUntil = Math.max(r.burstUntil, clock.getElapsedTime() + 0.9);
      }, delayMs);
    });
  }

  function updateRegionGrowth(introT) {
    // revealT is a *derived* per-region value used for label visibility and
    // HUD readouts. The actual particle visibility is per-particle, driven
    // by aActivation in the shader. We compute revealT as the fraction of
    // the cluster's activation window that has elapsed.
    const totalSpan = REGION_GROW_DURATION + PARTICLE_BIRTH_DURATION;
    for (const e of REGION_SCHEDULE) {
      const t = (introT - e.start) / totalSpan;
      REGIONS[e.idx].revealT = Math.max(0, Math.min(1, t));
    }
  }

  // Set initial revealT for idle state (before intro begins)
  updateRegionGrowth(0);

  function updateActivity(dt) {
    const t = clock.getElapsedTime();
    const isLive = phase === 'live';

    if (isLive) triggerWaves(t);

    let globalSum = 0;
    REGIONS.forEach((region, i) => {
      const a1 = 0.55 + 0.22 * Math.sin(t * 0.23 + i * 1.31);
      const a2 = 0.15 * Math.sin(t * 0.71 + i * 2.77) * Math.cos(t * 0.44 + i);
      let target = a1 + a2;

      if (isLive && Math.random() < 0.0015) {
        region.burstUntil = Math.max(region.burstUntil, t + 0.8 + Math.random() * 1.2);
      }
      if (t < region.burstUntil) {
        target = Math.max(target, 0.88 + Math.random() * 0.12);
      }
      if (isLive && hoveredRegion === i) target = Math.min(1.15, target + 0.25);
      if (focusRegion === i)             target = Math.min(1.2,  target + 0.15);

      target = Math.max(0.28, Math.min(1.15, target));
      region.targetActivity = target;
      region.activity += (target - region.activity) * Math.min(1, dt * 2.4);
      globalSum += region.activity * region.revealT;
    });

    writeActivityTex();

    const globalEl = document.getElementById('globalAct');
    if (globalEl) globalEl.textContent = (globalSum / REGIONS.length).toFixed(2);
  }

  // ======================================================================
  // SUBTITLE SYSTEM — word-by-word blur+focus reveal
  // ======================================================================
  const SUBTITLES = [
    { start: 0,    end: 1.0,   text: 'Hi Vito...' },
    { start: 1.5,  end: 2.5,   text: 'Welcome to Mia 3.' },
    { start: 3.0,  end: 6.5,   text: 'I have mapped 1 year of thoughts, beliefs, and feelings happening in your life.' },
    { start: 7.0,  end: 8.5,   text: 'There are many things we can talk about.' },
    { start: 9.0,  end: 10.25, text: 'Where would you like to start?' },
  ];

  const subtitleEl = document.getElementById('subtitle');
  const subtitleTimers = [];

  function showSubtitle(text, duration) {
    // Clear any pending word/fadeout timers from this line
    subtitleEl.innerHTML = '';
    subtitleEl.classList.remove('fade-out');

    // Split on whitespace — preserves punctuation, numbers, and tokens like "Vito" / "3."
    // (was previously fine, but the timing math below was clipping the last word
    //  off short lines because it fired at the same instant fade-out began)
    const words = text.split(/\s+/).filter(w => w.length > 0);
    if (words.length === 0) return;

    const fadeOutLead = 0.45;   // when fade-out begins, relative to line end
    const settleTime  = 0.35;   // last word must be visible-in-focus this long
    // Ensure the LAST word starts revealing this many seconds before line end:
    const lastWordBy  = Math.max(0.05, duration - fadeOutLead - settleTime);
    // Per-word stagger, capped so long lines don't drag
    const stagger = words.length > 1
      ? Math.min(0.32, lastWordBy / (words.length - 1))
      : 0;

    words.forEach((word, i) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = word;
      subtitleEl.appendChild(span);
      if (i < words.length - 1) {
        const sp = document.createElement('span');
        sp.className = 'space';
        sp.innerHTML = '&nbsp;';
        subtitleEl.appendChild(sp);
      }
      const t = setTimeout(() => {
        span.classList.add('show');
      }, stagger * i * 1000);
      subtitleTimers.push(t);
    });

    // Start the fade-out a bit before the line's end
    const fadeOutAt = Math.max(0, (duration - fadeOutLead) * 1000);
    const tFade = setTimeout(() => {
      subtitleEl.classList.add('fade-out');
    }, fadeOutAt);
    subtitleTimers.push(tFade);
  }

  function scheduleSubtitles() {
    SUBTITLES.forEach((s) => {
      const tShow = setTimeout(() => {
        showSubtitle(s.text, s.end - s.start);
      }, s.start * 1000);
      subtitleTimers.push(tShow);
    });
  }

  // ======================================================================
  // WEB AUDIO — analyser drives audio-reactive brightness
  // ======================================================================
  let audioCtx = null;
  let audioAnalyser = null;
  let audioData = null;

  function initAudioAnalyser() {
    try {
      const audio = document.getElementById('introAudio');
      if (!audio) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      const source = audioCtx.createMediaElementSource(audio);
      audioAnalyser = audioCtx.createAnalyser();
      audioAnalyser.fftSize = 256;
      audioAnalyser.smoothingTimeConstant = 0.4;
      audioData = new Uint8Array(audioAnalyser.frequencyBinCount);
      // Route source → analyser → speakers
      source.connect(audioAnalyser);
      audioAnalyser.connect(audioCtx.destination);
    } catch (err) {
      // CORS, unsupported codec, MediaElementSource already created on this
      // element, etc. — fall back silently. Visuals still work.
      audioAnalyser = null;
      console.warn('Audio analyser unavailable:', err && err.message);
    }
  }

  function readAudioEnergy() {
    if (!audioAnalyser || !audioData) return 0;
    audioAnalyser.getByteFrequencyData(audioData);
    // Weighted toward low/mid frequencies — voice lives there
    let sum = 0, weight = 0;
    const N = audioData.length;
    for (let i = 0; i < N; i++) {
      const w = (i < N * 0.4) ? 1.4 : 0.6;
      sum += audioData[i] * w;
      weight += w;
    }
    return (sum / weight) / 255;
  }

  // ======================================================================
  // INTRO CHAIN-REACTION SYNAPSES
  // As each new cluster reaches mid-growth, fire a connection from a
  // previously-active cluster to it — visual proof the network is propagating.
  // ======================================================================
  const introChainSpawned = new Set();

  function updateIntroChainReaction(introT) {
    for (let i = 0; i < REGION_SCHEDULE.length; i++) {
      const entry = REGION_SCHEDULE[i];
      if (introChainSpawned.has(entry.idx)) continue;
      // Trigger when this cluster has grown ~half way
      const triggerAt = entry.start + REGION_GROW_DURATION * 0.45;
      if (introT < triggerAt) continue;
      introChainSpawned.add(entry.idx);

      // Skip Core (no parent to connect from)
      if (i === 0) continue;

      // Find nearest already-active region to act as the "parent" node
      const here = REGIONS[entry.idx];
      let bestIdx = -1, bestD = Infinity;
      for (let k = 0; k < i; k++) {
        const candIdx = REGION_SCHEDULE[k].idx;
        const d = REGIONS[candIdx].position.distanceTo(here.position);
        if (d < bestD) { bestD = d; bestIdx = candIdx; }
      }
      if (bestIdx === -1) continue;

      // Primary connection from parent → new cluster
      synapses.push(createSynapse(bestIdx, entry.idx, {
        duration: 1.6,
        peak: 0.65,
      }));

      // ~60% of activations also fire a secondary local connection to a
      // different active region — gives the network a branching feel
      if (Math.random() < 0.6 && i > 1) {
        const altIdx = REGION_SCHEDULE[Math.floor(Math.random() * i)].idx;
        if (altIdx !== bestIdx && altIdx !== entry.idx) {
          synapses.push(createSynapse(altIdx, entry.idx, {
            duration: 1.3,
            peak: 0.4,
          }));
        }
      }
    }
  }

  // ======================================================================
  // INTRO → LIVE TRANSITION
  // ======================================================================
  function startIntro() {
    if (phase !== 'idle') return;
    phase = 'intro';
    introStartT = clock.getElapsedTime();
    smoothedAudioE = 0;
    introChainSpawned.clear();

    // Brand fades in early — system identifying itself
    document.getElementById('hud-brand').classList.add('show');

    // Schedule subtitles
    scheduleSubtitles();

    // Initialize Web Audio analyser BEFORE play() — must be done in the same
    // user-gesture stack for autoplay policy. Then play.
    const audio = document.getElementById('introAudio');
    initAudioAnalyser();
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
    if (audio) {
      const playPromise = audio.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch((err) => console.warn('Audio playback failed:', err));
      }
    }

    // Hand off to live phase after the intro completes
    setTimeout(() => {
      phase = 'live';
      controls.enabled = true;
      document.getElementById('hud-status').classList.add('show');
      document.getElementById('hud-hints').classList.add('show');
    }, INTRO_DURATION * 1000);
  }

  document.getElementById('beginBtn').addEventListener('click', () => {
    document.getElementById('introOverlay').classList.add('gone');
    document.body.classList.add('live'); // cursor changes
    // Wait for overlay fade to be mostly complete before starting voice
    setTimeout(() => startIntro(), 380);
  });

  // ======================================================================
  // ANIMATION LOOP
  // ======================================================================
  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(0.05, clock.getDelta());
    const t = clock.getElapsedTime();

    particleMat.uniforms.uTime.value = t;

    // Phase-driven uIntroT: 0 at idle, counts up during intro, locked high
    // in live so every particle stays born indefinitely.
    if (phase === 'idle') {
      particleMat.uniforms.uIntroT.value = 0;
    } else if (phase === 'intro') {
      const introT = t - introStartT;
      particleMat.uniforms.uIntroT.value = introT;
      updateRegionGrowth(introT);
      updateIntroCamera(introT);
      updateIntroChainReaction(introT);
    } else {
      // live: keep particles permanently born
      particleMat.uniforms.uIntroT.value = 999;
    }

    // Audio reactivity — smooth the energy reading so brightness pulses
    // breathe with the voice rather than flicker on every frame
    const rawE = readAudioEnergy();
    smoothedAudioE += (rawE - smoothedAudioE) * Math.min(1, dt * 9);
    particleMat.uniforms.uAudioEnergy.value = smoothedAudioE;

    updateActivity(dt);
    updateSynapses();
    updateSubNodes();

    // Focus camera transitions (only used in live phase)
    if (phase === 'live' && t < transitionUntil) {
      camera.position.lerp(targetCamPos, 0.08);
      controls.target.lerp(targetCamTarget, 0.08);
    }
    const fT = focusRegion >= 0 ? 1 : 0;
    focusT += (fT - focusT) * 0.05;
    particleMat.uniforms.uFocus.value = focusT;

    controls.update();

    // Scroll-out-while-focused → release focus
    if (phase === 'live' && focusRegion >= 0 && t > transitionUntil + 0.2) {
      const r = REGIONS[focusRegion];
      const d = camera.position.distanceTo(r.position);
      if (d > r.r * 9) releaseFocus();
    }

    renderer.render(scene, camera);

    updateLabels();
    updateSubLabels();
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    particleMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
  });
  </script>
</body>
</html>
