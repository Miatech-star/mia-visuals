  finalText: '',                      // committed transcript
  interimText: '',                    // live unconfirmed words
  patternCounts: Object.fromEntries(Object.keys(GROUPS).map(k => [k, 0])),
  patternFirstSeen: {},               // groupKey → timestamp (for ordering chips)
  subtopicCounts: {},                 // 'groupKey.subtopicId' → count
  matchedPhrases: {},                 // 'groupKey.subtopicId' → [unique phrases as they appeared]
  // We deliberately do NOT request a separate mic stream via
  // getUserMedia — that would prompt for microphone permission a
  // second time on top of SpeechRecognition's own request. Instead,
  // the ring's "voice reactivity" is driven by speech-event activity:
  // we boost `speechActivity` whenever new transcribed characters
  // arrive, then decay it each frame. Same visual feel, one prompt.
  speechActivity: 0,                  // 0..1, decays toward 0
  lastTotalLen: 0,                    // last seen transcript length (final + interim)
  amplitude: 0,                       // smoothed reactivity used by render
  // Loading state — driven by a real-seconds timer so the morph
  // and spin always proceed at predictable physical speeds, no
  // matter how variable the frame rate is.
  loadingElapsed: 0,                  // seconds since loading began
  loadingMorphT: 0,                   // 0..1 torsion progress
  loadingSpinAngle: 0,                // accumulated rigid-rotation angle (rad)
  // Initial appearance: instead of particles flying in from the
  // canvas origin (which used to cause a noticeable bounce), they
  // start at the ring's centre point and the ring radius gently
  // eases out from 0 to its normal value over INTRO_DURATION
  // seconds. Once introT reaches 1 it stays there for the rest of
  // the session — this only affects the very first appearance.
  introInit: false,                   // have we snapped particles to centre yet?
  introT: 0,                          // 0..1 grow-from-centre progress
  startedAt: 0
};

const INTRO_DURATION = 1.4;           // seconds for the initial grow

/* === Canvas sizing (HiDPI) ================================== */
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  stage.width  = Math.floor(W * DPR);
  stage.height = Math.floor(H * DPR);
  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // Keep the layout CSS variable in sync with the canvas's ring radius
  // so hint/patterns/transcript track the ring exactly. Function is
  // declared further down so guard the call.
  if (typeof updateLayoutVars === 'function') updateLayoutVars();
}
window.addEventListener('resize', resize);
resize();

/* === Glow sprite ============================================
   Pre-render a soft warm-white glow once. We then drawImage it
   for every particle — orders of magnitude faster than calling
   shadowBlur per draw. */
function makeGlowSprite(size, inner, outer) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const cx = c.getContext('2d');
  const r = size / 2;
  const g = cx.createRadialGradient(r, r, 0, r, r, r);
  g.addColorStop(0.00, inner);
  g.addColorStop(0.35, outer);
  g.addColorStop(1.00, 'rgba(255,255,255,0)');
  cx.fillStyle = g;
  cx.fillRect(0, 0, size, size);
  return c;
}
const GLOW = makeGlowSprite(48, 'rgba(255, 248, 235, 1.00)', 'rgba(255, 200, 170, 0.32)');
const GLOW_HOT = makeGlowSprite(64, 'rgba(255, 252, 244, 1.00)', 'rgba(255, 215, 180, 0.45)');

/* === Particles ===============================================
   We carry a single particle pool through the whole experience.
   Each particle has:
     - a "home" angle on the ring (0..2π) plus tiny jitter for
       organic feel, kept very small so the idle ring reads as
       a clean circle
     - a 3D target position inside the brain volume, sampled
       once when we enter the brain phase
   The same particles slide from ring → twist → trefoil → brain
   without ever being destroyed or replaced. */
const N = 2400;
const particles = [];

class Particle {
  constructor(i) {
    this.i = i;
    this.homeAngle = (i / N) * Math.PI * 2;
    // KEEP THIS SMALL — large jitter is what made the idle ring look
    // wobbly before. A clean circle wants near-zero per-particle
    // angular noise; the organic feel comes from the shape's own
    // breathing, not from the particles being in random places.
    this.jitterR   = (Math.random() - 0.5) * 1.2;
    this.jitterA   = (Math.random() - 0.5) * 0.003;
    this.phase     = Math.random() * Math.PI * 2;
    this.sizeBase  = 0.85 + Math.random() * 0.55;
    this.brightness= 0.55 + Math.random() * 0.45;

    // Current/target screen-space position
    this.x = 0; this.y = 0;
    this.tx = 0; this.ty = 0;
    this.vx = 0; this.vy = 0;

    // 3D brain target (in normalized brain space, ~[-1.7, 1.7])
    // Populated when the brain is generated.
    this.bx = 0; this.by = 0; this.bz = 0;
    // Cached projected screen position + depth for the current frame
    // (used for size/alpha modulation and depth sorting).
    this.depth = 0;
  }
}
for (let i = 0; i < N; i++) particles.push(new Particle(i));

/* === Shape parametric definitions =========================
   Every shape is a function (theta, R, t, ...) → (x, y) in
   ring-relative coordinates centered on (0,0). The ring radius
   adapts to viewport size. */

function ringRadius() {
  return Math.max(120, Math.min(W, H) * 0.20);
}

/* Pure circle. Pristine, no deformation. */
function shapeCircle(theta, R) {
  return { x: Math.cos(theta) * R, y: Math.sin(theta) * R };
}

/* IDLE — a near-perfect circle with the gentlest radial breath.
   The cleaner the silhouette here, the more the listening state
   feels like it's coming alive. */
function shapeIdle(theta, R, t) {
  const breath = 1 + 0.010 * Math.sin(t * 0.55);
  const r = R * breath;
  return { x: Math.cos(theta) * r, y: Math.sin(theta) * r };
}

/* LISTENING — multi-octave organic radial deformation. The amp
   parameter (0..1) opens up the deformation amplitude AND adds a
   broad radial pulse, so the ring is restful when quiet and
   visibly alive when the user speaks. */
function shapeListening(theta, R, t, amp) {
  // Three smooth harmonics at different spatial frequencies and
  // time speeds — together they produce flowing, never-repeating
  // deformation that reads as organic rather than mechanical.
  const o1 = Math.sin(theta * 2  + t * 0.55);
  const o2 = Math.sin(theta * 3  - t * 0.42 + 1.7) * 0.55;
  const o3 = Math.sin(theta * 5  + t * 0.31 + 3.1) * 0.30;
  const o4 = Math.sin(theta * 7  - t * 0.22 + 0.8) * 0.18;
  const flow = (o1 + o2 + o3 + o4) / 2.03;     // ~[-1, 1]

  // Quiet-state deformation: ±1.2% of R. Loud-state: up to ±9% of R.
  const deformAmt = 0.012 + amp * 0.075;
  // Radial pulse on top — the whole ring expands slightly with voice.
  const pulse     = 1 + amp * 0.20;
  const r         = R * (1 + flow * deformAmt) * pulse;

  return { x: Math.cos(theta) * r, y: Math.sin(theta) * r };
}

/* Smooth easing helpers — used across the whole app */
function smooth(a, b, k)  { return a + (b - a) * k; }
function lerp(a, b, k)    { return a + (b - a) * k; }
function easeInOut(x)     { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }
function easeOutCubic(x)  { return 1 - Math.pow(1 - x, 3); }
function easeInCubic(x)   { return x * x * x; }
function clamp(x, a, b)   { return Math.max(a, Math.min(b, x)); }

/* Returns 2D target (x,y) in ring-relative coordinates for the
   non-3D phases (idle, listening). The 3D loading and brain phases
   compute their target positions directly inside the render loop. */
function getRingTarget2D(theta, t, amp) {
  const R = ringRadius();
  if (APP.phase === 'idle')      return shapeIdle(theta, R, t);
  if (APP.phase === 'listening') return shapeListening(theta, R, t, amp);
  // Fallback: clean circle
  return shapeCircle(theta, R);
}

/* === Loading shape: a 3D twisted closed loop ==============
   The loop is one closed parametric curve. Each particle keeps
   its own home angle θ; the mapping θ → (x, y, z) evolves with
   a single deformation parameter u ∈ [0, 1]:

     r(θ, u) = R + a₂(u) cos(2θ) + a₃(u) cos(3θ)
     z(θ, u) =     b₂(u) sin(2θ) + b₃(u) sin(3θ)
     x(θ, u) = r(θ, u) cos(θ)
     y(θ, u) = r(θ, u) sin(θ)

   The 2-fold mode rises first, peaks (the first stable twisted
   state), then fades out as the 3-fold mode rises into the
   final twisted geometry. After u reaches 1 the coefficients
   are frozen — only rigid rotation runs.

   Because the radial AND z components use the SAME harmonic
   frequency at a 90° phase offset (cos vs sin), each mode is
   genuinely 3D — a twisted loop, not a flat in-plane flower
   silhouette. The b coefficients (z amplitudes) are kept large
   relative to the a coefficients so projection always shows the
   loop's depth. */
function smoothstep01(a, b, x) {
  if (x <= a) return 0;
  if (x >= b) return 1;
  const t = (x - a) / (b - a);
  return t * t * (3 - 2 * t);
}

/* The loader is two physical motions running side-by-side from
   t = 0:

   1. TORSION — an actual 3D twist of the ring, not a planar
      morph. Imagine grabbing the ring at θ = 0 and θ = π (the
      two horizontal "ends") and rotating each grab point about
      the line between them. The grab points stay pinned at
      (±1, 0, 0) for the entire animation. As u goes 0 → 1 the
      top half of the ring rolls forward (out of the page) and
      the bottom half rolls backward, and the ring gradually
      collapses through itself into a 3D figure-eight whose long
      axis is the twist axis (the x-axis).

   2. RIGID ROTATION — the entire 3D shape spins around the
      twist axis at a steady rate, starting from frame zero.
      Because both motions share the same axis, the rotation
      never adds to the torsion: it simply re-orients whatever
      shape the torsion has produced at any given moment.

   At u = 0 the formula degenerates exactly to a flat circle in
   the xy plane. At u = 1 it produces a clean 3D figure-eight
   whose xy projection is the lemniscate (sin θ cos θ scaled).
   Beyond u = 1 the coefficients are frozen — only the rigid
   rotation continues, until the brain transition begins. */
function loadingShape3D(theta, u) {
  // Easing on the morph: fast start, gentle settle into the final
  // figure-8. Keeps the twist looking deliberate rather than
  // mechanical. The rotation is unaffected by this easing.
  const e = easeOutCubic(u);

  const sinT = Math.sin(theta);
  const cosT = Math.cos(theta);

  // x stays at cos(θ) — this PINS the grab points at (±1, 0, 0)
  // for the entire animation. They are fixed by construction.
  const x = cosT;
  // y lerps from sin(θ) (circle) to -sin(θ)cos(θ) (lemniscate).
  // The factor (1 - e(1+cosθ)) interpolates between the two ends
  // continuously; at θ = 0 and θ = π the bracket is 1 - 0 = 1
  // (preserving the grab points at y = 0) and at θ = ±π/2 it
  // contracts the ring's vertical extent.
  const y = sinT * (1 - e * (1 + cosT));
  // z is what makes the morph a real 3D torsion rather than a flat
  // squash. The top half of the ring (sin θ > 0) lifts forward and
  // the bottom half (sin θ < 0) drops backward, exactly as a wire
  // ring would deform under opposite torsion at its two ends.
  const z = e * 0.5 * sinT;

  return { x, y, z };
}

/* === Loading timeline ===================================
   Two animations run in parallel from t = 0:
     • the torsion morph completes in TORSION_DURATION seconds;
     • the rigid axial rotation runs continuously through the
       full LOADING_SECONDS window.
   Beyond TORSION_DURATION the geometry is locked and only the
   rotation keeps going, until the brain transition begins. */
const TORSION_DURATION = 2.0;       // circle → 3D figure-eight
const LOADING_SECONDS  = 4.5;       // total loader window
const SPIN_RATE        = Math.PI * 2 / 2.0;  // one revolution every 2.0s

/* The view tilt applied during loading and brain phases. Without
   tilt, a flat ring projects as a flat 2D shape and the spin
   axis (x-axis) reads as flat-on; a moderate forward pitch makes
   the torsion and spin legible in 3D without disorienting the
   brain that follows. */
const VIEW_TILT_LOADING = 0.42;

/* === Brain volume (SDF approach) ==========================
   The brain is approximated as a union of overlapping ellipsoids,
   following the same blob model as the reference experience.
   We sample particle positions inside this volume by rejection
   sampling, then keep them stable forever — every particle
   maps to a fixed 3D point in brain space, and rendering just
   rotates and projects each frame.

   Coordinate system: the blobs live in a normalized space roughly
   bounded by [-1.7, 1.7] in x, [-1.4, 1.4] in y, [-1.35, 1.35] in z.
   We map this to screen pixels via BRAIN_SCREEN_SCALE. */
const BRAIN_BLOBS = [
  { cx:  0.00, cy:  0.20, cz: 0, rx: 1.18, ry: 0.72, rz: 1.08, w: 1.0 },
  { cx: -0.95, cy:  0.15, cz: 0, rx: 0.55, ry: 0.62, rz: 0.92, w: 1.0 },
  { cx: -0.55, cy:  0.62, cz: 0, rx: 0.50, ry: 0.32, rz: 0.85, w: 0.9 },
  { cx:  0.00, cy:  0.78, cz: 0, rx: 0.55, ry: 0.25, rz: 0.85, w: 0.9 },
  { cx:  0.50, cy:  0.65, cz: 0, rx: 0.45, ry: 0.30, rz: 0.85, w: 0.9 },
  { cx:  1.00, cy:  0.10, cz: 0, rx: 0.50, ry: 0.55, rz: 0.92, w: 1.0 },
  { cx: -0.55, cy: -0.42, cz: 0, rx: 0.50, ry: 0.40, rz: 0.92, w: 0.95 },
  { cx:  0.05, cy: -0.50, cz: 0, rx: 0.55, ry: 0.30, rz: 0.82, w: 0.9 },
  { cx:  0.85, cy: -0.55, cz: 0, rx: 0.42, ry: 0.35, rz: 0.72, w: 1.0 },
  { cx:  0.60, cy: -0.60, cz: 0, rx: 0.28, ry: 0.25, rz: 0.58, w: 0.9 },
  { cx:  0.48, cy: -0.85, cz: 0, rx: 0.17, ry: 0.20, rz: 0.22, w: 1.2 },
  { cx:  0.48, cy: -1.05, cz: 0, rx: 0.13, ry: 0.18, rz: 0.18, w: 1.2 }
];

function inBrain(x, y, z) {
  for (let i = 0; i < BRAIN_BLOBS.length; i++) {
    const b = BRAIN_BLOBS[i];
    const dx = (x - b.cx) / b.rx;
    const dy = (y - b.cy) / b.ry;
    const dz = (z - b.cz) / b.rz;
    if (dx*dx + dy*dy + dz*dz < 1) return true;
  }
  return false;
}

/* Brain rotation + interaction state. Drag updates target rotation;
   actual rotation lerps toward target each frame for smooth motion.
   Wheel/pinch updates the zoom. The same rotation is also used
   during loading so the 3D twisted ring is legible (otherwise a
   flat-circle projection hides the torsion). */
const BRAIN = {
  ready: false,           // brain targets have been generated
  formT: 0,               // 0..1 transition progress from loading shape → brain volume
  rotX: 0, rotY: 0,       // current rotation
  tRotX: 0, tRotY: 0,     // target rotation (drag updates this)
  zoom: 1.0, tZoom: 1.0,  // current/target zoom (wheel + pinch update target)
  dragging: false,
  lastDragX: 0, lastDragY: 0,
  pinchDist: 0, pinchActive: false,
  lastInteraction: 0,     // timestamp of last user interaction (gates auto-rotate)
  selectedLabel: null     // currently selected label key, or null
};

/* === Label anchors ============================================
   Each of the 10 life-area GROUPS has a fixed 3D anchor on the
   brain. Subtopic anchors are generated per session in a small
   ring on the tangent plane around their parent group's anchor,
   so the brain reads as primary nodes with smaller supporting
   pills clustered around each one. */
const GROUP_ANCHORS = {
  career:         { x:  0.65, y:  0.55, z:  0.50 },   // upper-right-front
  money:          { x:  0.95, y:  0.05, z:  0.30 },   // mid-right-front
  personalGrowth: { x:  0.20, y:  0.85, z:  0.45 },   // top-right-front
  spiritual:      { x: -0.20, y:  0.85, z:  0.45 },   // top-left-front
  health:         { x: -0.05, y:  0.45, z:  0.85 },   // top-mid-front
  fun:            { x:  0.45, y: -0.45, z:  0.65 },   // lower-right-front
  environment:    { x: -0.45, y: -0.40, z:  0.65 },   // lower-left-front
  social:         { x: -0.95, y:  0.10, z:  0.30 },   // mid-left
  romance:        { x: -0.65, y: -0.40, z:  0.40 },   // lower-left
  family:         { x:  0.75, y: -0.55, z:  0.20 }    // lower-right
};

/* Generate a ring of anchor positions in the tangent plane to the
   brain at the parent's location. Used twice: once to lay out a
   group's subtopics around its primary anchor, and again to lay out
   the matched-phrase tokens around each subtopic anchor. */
function generateRingAnchors(parent, count, radius, startAngle) {
  const out = [];
  if (count <= 0) return out;
  // Outward normal at the parent (away from origin)
  const len = Math.hypot(parent.x, parent.y, parent.z) || 1;
  const nx = parent.x / len, ny = parent.y / len, nz = parent.z / len;
  // Pick a reference vector not parallel to n, then build an
  // orthonormal basis (u, v) for the tangent plane.
  let upx = 0, upy = 1, upz = 0;
  if (Math.abs(ny) > 0.92) { upx = 1; upy = 0; upz = 0; }
  let ux = upy * nz - upz * ny;
  let uy = upz * nx - upx * nz;
  let uz = upx * ny - upy * nx;
  const ulen = Math.hypot(ux, uy, uz) || 1;
  ux /= ulen; uy /= ulen; uz /= ulen;
  const vx = ny * uz - nz * uy;
  const vy = nz * ux - nx * uz;
  const vz = nx * uy - ny * ux;
  for (let i = 0; i < count; i++) {
    const a = startAngle + (i / count) * Math.PI * 2;
    const ca = Math.cos(a), sa = Math.sin(a);
    out.push({
      x: parent.x + radius * (ca * ux + sa * vx),
      y: parent.y + radius * (ca * uy + sa * vy),
      z: parent.z + radius * (ca * uz + sa * vz)
    });
  }
  return out;
}

/* Convenience wrapper preserving the old call site for subtopic
   anchors. Radius scales gently with count so a group with seven
   subtopics doesn't crowd its ring. */
function generateSubtopicAnchors(parent, count) {
  const R = 0.30 + Math.max(0, count - 4) * 0.022;
  return generateRingAnchors(parent, count, R, -Math.PI / 2);
}

/* Generate the N brain target positions by rejection-sampling the
   ellipsoid union. Stamps each particle's bx/by/bz. Kept stable for
   the lifetime of the session — the brain doesn't shuffle once
   formed, just rotates and scales. */
function generateBrainTargets() {
  const positions = [];
  let attempts = 0;
  const cap = N * 120;
  while (positions.length < N && attempts < cap) {
    attempts++;
    const x = (Math.random() * 2 - 1) * 1.7;
    const y = (Math.random() * 2 - 1) * 1.4;
    const z = (Math.random() * 2 - 1) * 1.35;
    if (!inBrain(x, y, z)) continue;
    positions.push([x, y, z]);
  }

  // Shuffle so adjacent ring particles don't end up adjacent in the
  // brain — that gives a more dispersed, organic-feeling release.
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = positions[i]; positions[i] = positions[j]; positions[j] = tmp;
  }

  // Stamp onto particles. Note the y-flip: in our normalized brain
  // space, +y is up; on screen, +y is down. Doing the flip here once
  // keeps the rest of the projection math clean.
  for (let i = 0; i < N; i++) {
    const pos = positions[i % positions.length] || [0, 0, 0];
    particles[i].bx = pos[0];
    particles[i].by = -pos[1];
    particles[i].bz = pos[2];
  }

  BRAIN.ready = true;
}

/* Apply current view rotation (yaw then pitch) to a normalized
   3D point and return rotated coords. The same rotation matrix is
   used everywhere — particles, label anchors, connector lines —
   so they all transform together. */
function rotatePoint3D(x, y, z) {
  const cy = Math.cos(BRAIN.rotY), sy = Math.sin(BRAIN.rotY);
  const x1 =  x * cy + z * sy;
  const z1 = -x * sy + z * cy;
  const cx = Math.cos(BRAIN.rotX), sx = Math.sin(BRAIN.rotX);
  const y2 =  y * cx - z1 * sx;
  const z2 =  y * sx + z1 * cx;
  return { x: x1, y: y2, z: z2 };
}

/* Project a normalized 3D point to screen coordinates using the
   given pixel scale. Returns sx/sy (pixels) and sz (rotated z,
   normalized — used for depth shading and label fading). */
function project3D(x, y, z, scale) {
  const r = rotatePoint3D(x, y, z);
  return {
    sx: W / 2 + r.x * scale,
    sy: H / 2 + r.y * scale,
    sz: r.z
  };
}

/* Brain pixel scale at default zoom. Smaller than the viewport so
   the brain reads at a comfortable size. Multiplied by BRAIN.zoom
   for user-driven zooming. */
function brainScreenScaleBase() {
  return Math.min(W * 0.26, H * 0.32);
}
function brainScreenScale() {
  return brainScreenScaleBase() * BRAIN.zoom;
}

/* === Main render loop ====================================== */
let tStart = performance.now();
let lastT  = tStart;

function tick(now) {
  const t  = (now - tStart) / 1000;
  const dt = Math.max(0.001, Math.min(0.05, (now - lastT) / 1000));
  lastT = now;

  // --- Intro: gentle grow from the centre ------------------
  // The very first time we have a sized canvas, snap every
  // particle to the screen centre with zero velocity. This
  // replaces the old behaviour where particles started at
  // (0, 0) and got pulled in by the spring — that pull caused
  // the bounce on page load. From there the introT timer
  // advances smoothly, and the per-particle target computation
  // below scales the ring's radius by easeOutCubic(introT) so
  // the loop expands quietly outward instead of springing in.
  if (!APP.introInit && W > 0 && H > 0) {
    const ix = W / 2, iy = H / 2;
    for (let i = 0; i < N; i++) {
      const p = particles[i];
      p.x = ix; p.y = iy;
      p.tx = ix; p.ty = iy;
      p.vx = 0; p.vy = 0;
    }
    APP.introInit = true;
  }
  if (APP.introT < 1) {
    APP.introT = Math.min(1, APP.introT + dt / INTRO_DURATION);
  }

  // --- Reactivity ------------------------------------------
  // Speech-event-driven amplitude (no second mic permission).
  // Slightly slower decay than before, so each word "rings" longer
  // and the listening animation has more visible expression.
  const decay = Math.pow(0.5, dt * 3.0);  // ~230 ms half-life
  APP.speechActivity *= decay;
  let raw = 0;
  if (APP.phase === 'listening') {
    raw = 0.10 + 0.04 * Math.abs(Math.sin(t * 1.6)) + APP.speechActivity * 1.05;
  } else if (APP.phase === 'loading') {
    raw = 0.30 + 0.18 * Math.abs(Math.sin(t * 2.6));
  }
  APP.amplitude = smooth(APP.amplitude, Math.min(1, raw), 0.18);

  // --- Loading timeline ------------------------------------
  // The morph (circle → infinity) completes in TORSION_DURATION
  // seconds. The continuous axial rotation runs in parallel from
  // the very first frame and never stops — there is no ramp-in,
  // no gate on morph progress. After the morph completes the
  // shape is locked at its infinity geometry and only the
  // rotation keeps advancing. The full loader window is
  // LOADING_SECONDS; once it elapses we hand off to the brain.
  if (APP.phase === 'loading') {
    APP.loadingElapsed += dt;
    APP.loadingMorphT = Math.min(1, APP.loadingElapsed / TORSION_DURATION);
    APP.loadingSpinAngle += dt * SPIN_RATE;

    if (APP.loadingElapsed >= LOADING_SECONDS) enterBrain();
  }

  // --- Brain transition + global rotation/zoom lerp --------
  // Rotation and zoom always lerp toward target so they animate
  // smoothly whether driven by drag, click-to-focus, wheel zoom,
  // pinch zoom, or auto-rotation.
  BRAIN.rotX = smooth(BRAIN.rotX, BRAIN.tRotX, 0.12);
  BRAIN.rotY = smooth(BRAIN.rotY, BRAIN.tRotY, 0.12);
  BRAIN.zoom = smooth(BRAIN.zoom, BRAIN.tZoom, 0.15);

  if (APP.phase === 'brain') {
    BRAIN.formT = Math.min(1, BRAIN.formT + dt / 2.0);  // ~2s release+gather
    // Continue accumulating the loading-side rotation so the source
    // half of the lerp keeps spinning during the transition — no
    // visual freeze on the loop while particles peel off into the
    // brain volume.
    APP.loadingSpinAngle += dt * SPIN_RATE;

    // Subtle auto-rotation when the user isn't dragging or recently
    // interacting. Sits on top of the target rotation so any drag
    // immediately overrides it.
    const sinceInteract = (performance.now() - BRAIN.lastInteraction) / 1000;
    if (!BRAIN.dragging && !BRAIN.pinchActive && sinceInteract > 2.0
        && BRAIN.formT > 0.5 && !BRAIN.selectedLabel) {
      BRAIN.tRotY += dt * 0.04;
    }
  }

  // --- Compute screen positions and integrate motion --------
  const cx = W / 2, cy = H / 2;

  // Render scale: smoothly grows from ringRadius (loading) to
  // brainScreenScale (brain) during the transition. Both source
  // and target sides of the lerp use a single scale per frame so
  // there are no scale discontinuities.
  const ringR  = ringRadius();
  const brainS = brainScreenScale();
  const sceneScale = (APP.phase === 'brain')
    ? lerp(ringR, brainS, easeOutCubic(BRAIN.formT))
    : ringR;

  for (let i = 0; i < N; i++) {
    const p = particles[i];
    const angle = p.homeAngle + p.jitterA;
    let target;

    if (APP.phase === 'idle' || APP.phase === 'listening') {
      // 2D shapes — no projection needed. The intro scale eases
      // the radius out from 0 to its normal value on first load,
      // so particles appear to grow gently from the centre.
      const introScale = easeOutCubic(APP.introT);
      const r = getRingTarget2D(angle, t, APP.amplitude);
      target = {
        x: r.x * introScale + cx + p.jitterR * 0.5 * introScale,
        y: r.y * introScale + cy + p.jitterR * 0.5 * introScale
      };
      p.depth = 0;
    } else {
      // 3D shapes (loading and brain). Compute the loop's 3D point
      // from the torsion morph, then apply the continuous rigid
      // rotation around the twist axis (x-axis) — the same axis
      // the grab points sit on. Both halves of the loader animation
      // (torsion and rotation) share this axis by design, so the
      // rotation never adds to the twist; it only re-orients the
      // already-formed shape.
      const loop = loadingShape3D(angle, APP.loadingMorphT);
      const cs = Math.cos(APP.loadingSpinAngle), sn = Math.sin(APP.loadingSpinAngle);
      let nx = loop.x;                          // x is on the spin axis
      let ny = loop.y * cs - loop.z * sn;       // rotate yz around x
      let nz = loop.y * sn + loop.z * cs;

      if (APP.phase === 'brain') {
        const u = easeOutCubic(BRAIN.formT);
        // Brain target in normalized brain space (already y-flipped
        // for screen coords during generateBrainTargets). The loop
        // is in unit-ish coords (~[-1.4, 1.4]); the brain targets
        // are in similar range (~[-1.7, 1.7]). Same coordinate
        // system, so the lerp is meaningful.
        nx = lerp(nx, p.bx, u);
        // Loop's y is +up in math, but our brain targets are already
        // y-down (screen-space). Flip the loop side of the lerp so
        // both ends agree on screen orientation before mixing.
        ny = lerp(-ny, p.by, u);
        nz = lerp(nz, p.bz, u);
      } else {
        // Loading phase: flip y for screen orientation (math-y up → screen-y down).
        ny = -ny;
      }

      const proj = project3D(nx, ny, nz, sceneScale);
      target = {
        x: proj.sx + p.jitterR * 0.4,
        y: proj.sy + p.jitterR * 0.4
      };
      p.depth = proj.sz;
    }

    p.tx = target.x;
    p.ty = target.y;

    // Spring-damper integration. Stiffness varies by phase so the
    // ring is responsive but the brain release feels softer/longer.
    let stiffness, damping;
    if (APP.phase === 'loading')      { stiffness = 0.22; damping = 0.78; }
    else if (APP.phase === 'brain')   { stiffness = 0.10; damping = 0.82; }
    else                              { stiffness = 0.18; damping = 0.78; }
    const ax = (p.tx - p.x) * stiffness;
    const ay = (p.ty - p.y) * stiffness;
    p.vx = (p.vx + ax) * damping;
    p.vy = (p.vy + ay) * damping;
    p.x += p.vx;
    p.y += p.vy;
  }

  // --- Render ----------------------------------------------
  ctx.clearRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'lighter';

  if (APP.phase === 'brain') {
    drawBrainParticles(t);
    // Subtle interconnections between active groups, then label
    // pills positioned over the projected anchors. Both depend on
    // the labels' projected positions; updateBrainLabels writes
    // those positions onto BRAIN_LABELS, so we run it first.
    ctx.globalCompositeOperation = 'source-over';
    updateBrainLabels();
    drawGroupConnections();
  } else {
    drawRingParticles(t);
  }

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* === Ring/loading particle rendering ====================== */
function drawRingParticles(t) {
  // During the page-load intro the alpha eases up alongside the
  // radius, so the ring doesn't appear at full brightness from
  // a single bright dot at the centre — it materialises softly.
  const introAlpha = easeOutCubic(APP.introT);
  for (let i = 0; i < N; i++) {
    const p = particles[i];
    let bright = p.brightness;
    if (APP.phase === 'listening') bright += APP.amplitude * 0.55;
    if (APP.phase === 'loading')   bright += 0.20 + 0.20 * Math.sin(t * 4 + p.phase);
    bright = clamp(bright, 0.20, 1.4);

    const sizeMult = APP.phase === 'loading' ? 1.10
                   : 1.0 + APP.amplitude * 0.45;
    const sz = (7 + p.sizeBase * 11) * sizeMult;

    const sprite = (APP.phase === 'loading' || APP.amplitude > 0.55) ? GLOW_HOT : GLOW;
    ctx.globalAlpha = bright * 0.55 * introAlpha;
    ctx.drawImage(sprite, p.x - sz / 2, p.y - sz / 2, sz, sz);

    // Bright core dot
    ctx.globalAlpha = Math.min(1, bright) * introAlpha;
    ctx.fillStyle = 'rgba(255, 250, 240, 1)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 0.85 * p.sizeBase, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* === Focus dust ============================================
   When the user dives into a group, this pool of ambient
   particles fills the focused volume with extra "internal
   structure" — soft warm motes that orbit the focus anchor with
   gentle wobble and breathing. They give the focused cluster
   density and dimensionality so the area never reads as empty
   when the rest of the brain has receded off-screen. */
const FOCUS_DUST_COUNT = 110;
const FOCUS_DUST = (() => {
  const arr = [];
  // Box–Muller-ish sampling so the cloud is densest near the
  // anchor and tapers smoothly outward.
  const sample = (sigma) => {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };
  for (let i = 0; i < FOCUS_DUST_COUNT; i++) {
    arr.push({
      rx:    sample(0.18),
      ry:    sample(0.18),
      rz:    sample(0.16),
      phase: Math.random() * Math.PI * 2,
      speed: 0.20 + Math.random() * 0.45,
      size:  0.45 + Math.random() * 0.95,
      bright: 0.55 + Math.random() * 0.45,
      // Inner motes hold steady; outer motes drift more visibly.
      drift: 0.01 + Math.random() * 0.025
    });
  }
  return arr;
})();

/* === Brain particle rendering ==============================
   Volumetric look from a flat 2D canvas: depth (z) modulates
   per-particle size, alpha, and warm color saturation. Particles
   in front render brighter/larger; those behind soften and dim,
   which is what gives the silhouette its volume. */
function drawBrainParticles(t) {
  const u = easeOutCubic(BRAIN.formT);
  // Crossfade from "ring-style" rendering to "depth-style" rendering
  // as the brain forms. Before u=0.4 we render with the ring style
  // (uniform brightness) so the release phase feels luminous; after
  // u=0.4 we ramp depth shading in for the volumetric look.
  const depthBlend = clamp((u - 0.35) / 0.65, 0, 1);

  // Particle size scales with zoom so when the user dives into a
  // group the cluster reads as DENSE rather than dispersed.
  const zoomBoost = Math.pow(BRAIN.zoom, 0.55);

  // Focus spotlight: when a group is selected, particles within
  // FOCUS_RADIUS of its anchor brighten and grow strongly; particles
  // far from the anchor dim hard. Stronger contrast than the overview
  // gives the "stepping inside" feel.
  let fa = null;
  if (BRAIN.selectedLabel && GROUP_ANCHORS[BRAIN.selectedLabel]) {
    fa = GROUP_ANCHORS[BRAIN.selectedLabel];
  }
  // How "in" the focus we are (lerps with BRAIN.zoom 1.0 → 3.0).
  const focusT = clamp((BRAIN.zoom - 1.0) / (3.0 - 1.0), 0, 1);
  // Anchors store y in the same screen-down convention as
  // particle.by (set in generateBrainTargets), so distance can be
  // computed directly without flipping y.
  const FOCUS_RADIUS_SQ = 0.55 * 0.55;
  // Spotlight strength ramps in with focusT so the change feels
  // continuous with the camera move rather than a hard cut.
  const FAR_DIM_BASE     = 1.0;
  const FAR_DIM_DEEP     = 0.32;            // far particles dim deeper at full focus
  const NEAR_BRIGHT_GAIN = 1.40 * focusT;   // additional brightness gain at the centre
  const NEAR_GROW_GAIN   = 0.75 * focusT;   // additional size gain at the centre
  const farDim = lerp(FAR_DIM_BASE, FAR_DIM_DEEP, focusT);

  for (let i = 0; i < N; i++) {
    const p = particles[i];

    // Depth-shaped brightness/size (only fully active once formed)
    const dn = clamp((p.depth + 1.4) / 2.8, 0, 1);  // 0=back, 1=front
    const depthBright = 0.30 + dn * 0.95;
    const depthSize   = 0.55 + dn * 0.65;

    const flatBright = clamp(p.brightness + 0.15 * Math.sin(t * 0.8 + p.phase), 0.4, 1.2);
    const flatSize   = 1.0;

    let bright = lerp(flatBright, depthBright, depthBlend);
    let sizeM  = lerp(flatSize,   depthSize,   depthBlend);

    if (fa) {
      const dx = p.bx - fa.x;
      const dy = p.by - fa.y;
      const dz = p.bz - fa.z;
      const d2 = dx * dx + dy * dy + dz * dz;
      const focus = Math.exp(-d2 / FOCUS_RADIUS_SQ);  // 1 at centre → 0 far
      bright = bright * (farDim + focus * NEAR_BRIGHT_GAIN);
      sizeM  = sizeM  * (1 + focus * NEAR_GROW_GAIN);
    }

    const sz = (6 + p.sizeBase * 10) * sizeM * zoomBoost;

    // Glow halo
    ctx.globalAlpha = bright * 0.45;
    ctx.drawImage(GLOW, p.x - sz / 2, p.y - sz / 2, sz, sz);

    // Core dot — very small, slightly warm-tinted for the depth shading
    ctx.globalAlpha = Math.min(1, bright);
    // Front particles read warmer (cream); back particles cooler/dimmer
    const r = 255;
    const g = Math.round(245 - (1 - dn) * 18);
    const b = Math.round(225 - (1 - dn) * 30);
    ctx.fillStyle = `rgba(${r},${g},${b},1)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 0.9 * p.sizeBase * sizeM * zoomBoost, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- Focused-state extras: dust + multi-layer aura ----------
  // Drawn AFTER the main particles so they sit on top, with the
  // additive 'lighter' composite already active from tick.
  if (fa && BRAIN.formT > 0.7 && focusT > 0.05) {
    const scale = brainScreenScale();

    // 1) Focus dust — fixed seeded pool of soft warm motes drifting
    // around the anchor in 3D. Each mote wobbles gently for a
    // sense of life. Together they thicken the focused cluster.
    for (let i = 0; i < FOCUS_DUST_COUNT; i++) {
      const fp = FOCUS_DUST[i];
      const wobX = Math.sin(t * fp.speed + fp.phase) * fp.drift;
      const wobY = Math.cos(t * fp.speed * 0.9 + fp.phase * 1.3) * fp.drift;
      const wobZ = Math.sin(t * fp.speed * 1.1 + fp.phase * 0.7) * fp.drift;
      const dustX = fa.x + fp.rx + wobX;
      const dustY = fa.y + fp.ry + wobY;
      const dustZ = fa.z + fp.rz + wobZ;
      const proj = project3D(dustX, dustY, dustZ, scale);
      // Distance-based density falloff (denser near anchor)
      const dxa = fp.rx, dya = fp.ry, dza = fp.rz;
      const dust2 = dxa * dxa + dya * dya + dza * dza;
      const density = Math.exp(-dust2 / 0.18);
      const breathe = 0.85 + 0.15 * Math.sin(t * 0.5 + fp.phase);
      const op = focusT * density * fp.bright * breathe;
      if (op < 0.02) continue;
      // Subtle depth fade — back-side motes recede
      const depthN = clamp((proj.sz + 0.6) / 1.2, 0, 1);
      const dustSize = (4 + fp.size * 7) * zoomBoost * (0.65 + depthN * 0.55);
      ctx.globalAlpha = op * 0.55 * (0.6 + depthN * 0.4);
      ctx.drawImage(GLOW, proj.sx - dustSize / 2, proj.sy - dustSize / 2, dustSize, dustSize);
      ctx.globalAlpha = op * (0.6 + depthN * 0.35);
      ctx.fillStyle = 'rgba(255, 246, 230, 1)';
      ctx.beginPath();
      ctx.arc(proj.sx, proj.sy, 0.9 * fp.size * zoomBoost * (0.55 + depthN * 0.45), 0, Math.PI * 2);
      ctx.fill();
    }

    // 2) Multi-layer aura — a slow breathing warm glow that gives
    // the focused area a sense of inner light. Three concentric
    // gradients: a wide outer halo, a mid-range bloom, and an
    // intense core. The pulse modulates intensity gently.
    const proj = project3D(fa.x, fa.y, fa.z, scale);
    const pulse = 0.85 + 0.15 * Math.sin(t * 0.7);
    const aFocus = focusT * pulse;

    // Outer wide halo
    const outerR = 220 * zoomBoost;
    let grad = ctx.createRadialGradient(proj.sx, proj.sy, 0, proj.sx, proj.sy, outerR);
    grad.addColorStop(0.0, 'rgba(255, 215, 185, 0.16)');
    grad.addColorStop(0.55, 'rgba(255, 195, 165, 0.05)');
    grad.addColorStop(1.0, 'rgba(255, 195, 165, 0)');
    ctx.globalAlpha = aFocus;
    ctx.fillStyle = grad;
    ctx.fillRect(proj.sx - outerR, proj.sy - outerR, outerR * 2, outerR * 2);

    // Mid bloom
    const midR = 110 * zoomBoost;
    grad = ctx.createRadialGradient(proj.sx, proj.sy, 0, proj.sx, proj.sy, midR);
    grad.addColorStop(0.0, 'rgba(255, 230, 200, 0.30)');
    grad.addColorStop(1.0, 'rgba(255, 230, 200, 0)');
    ctx.globalAlpha = aFocus * 0.85;
    ctx.fillStyle = grad;
    ctx.fillRect(proj.sx - midR, proj.sy - midR, midR * 2, midR * 2);

    // Tight inner core
    const coreR = 38 * zoomBoost;
    grad = ctx.createRadialGradient(proj.sx, proj.sy, 0, proj.sx, proj.sy, coreR);
    grad.addColorStop(0.0, 'rgba(255, 245, 225, 0.55)');
    grad.addColorStop(1.0, 'rgba(255, 245, 225, 0)');
    ctx.globalAlpha = aFocus;
    ctx.fillStyle = grad;
    ctx.fillRect(proj.sx - coreR, proj.sy - coreR, coreR * 2, coreR * 2);
  }
}

/* === Brain labels: anchored DOM elements with canvas connectors ====
   For every detected pattern category we create a tappable pill
   with the category name and count. Each frame we project its 3D
   anchor through the current view rotation and write the resulting
   screen position into the element's transform — so labels follow
   the brain when the user rotates it. A short connector line is
   drawn on canvas from each anchor's projected dot to its label's
   pill, anchoring the label visually to the brain.

   Visibility: anchors with z > 0 (front) are fully visible; anchors
   with z < 0 (back) fade out. Labels also fade with BRAIN.formT so
   they materialise as the brain forms rather than popping in. */

// Active labels for the current brain session. Each entry tracks
// either a primary (group) or secondary (subtopic) pill.
const BRAIN_LABELS = [];

function buildBrainLabels(orderedGroupKeys) {
  // Tear down any previous labels.
  brainLabelsEl.innerHTML = '';
  BRAIN_LABELS.length = 0;
  document.body.removeAttribute('data-focus');

  for (const groupKey of orderedGroupKeys) {
    const anchor = GROUP_ANCHORS[groupKey];
    const group  = GROUPS[groupKey];
    if (!anchor || !group) continue;
    const groupCount = APP.patternCounts[groupKey] || 0;

    // ---- Primary label: the life-area group --------------------
    const primaryEl = document.createElement('button');
    primaryEl.type = 'button';
    primaryEl.className = 'brain-label primary';
    primaryEl.dataset.key = groupKey;
    primaryEl.dataset.kind = 'primary';
    primaryEl.innerHTML =
      '<span class="dot" style="background:' + group.color + ';box-shadow:0 0 8px ' + group.color + '99;"></span>' +
      '<span class="label-text">' + group.label + '</span>' +
      '<span class="label-count">' + groupCount + '</span>';
    primaryEl.style.opacity = '0';
    primaryEl.addEventListener('click', () => onLabelClick(groupKey));
    brainLabelsEl.appendChild(primaryEl);
    BRAIN_LABELS.push({
      kind: 'primary',
      groupKey, anchor, el: primaryEl,
      sx: 0, sy: 0, sz: 0, lx: 0, ly: 0, opacity: 0
    });

    // ---- Secondary labels: triggered subtopics in this group ----
    const triggeredSubs = group.subtopics
      .map(sub => ({
        sub,
        count: APP.subtopicCounts[`${groupKey}.${sub.id}`] || 0
      }))
      .filter(x => x.count > 0)
      .sort((a, b) => b.count - a.count);

    const subAnchors = generateSubtopicAnchors(anchor, triggeredSubs.length);
    for (let i = 0; i < triggeredSubs.length; i++) {
      const { sub, count } = triggeredSubs[i];
      const sa = subAnchors[i];

      const subEl = document.createElement('div');
      subEl.className = 'brain-label secondary';
      subEl.dataset.key = `${groupKey}.${sub.id}`;
      subEl.dataset.kind = 'secondary';
      subEl.dataset.parent = groupKey;
      subEl.innerHTML =
        '<span class="dot" style="background:' + group.color + ';opacity:0.55;"></span>' +
        '<span class="label-text">' + sub.label + '</span>' +
        '<span class="label-count">' + count + '</span>';
      subEl.style.opacity = '0';
      brainLabelsEl.appendChild(subEl);
      BRAIN_LABELS.push({
        kind: 'secondary',
        groupKey,
        subId: sub.id,
        anchor: sa,
        el: subEl,
        sx: 0, sy: 0, sz: 0, lx: 0, ly: 0, opacity: 0
      });

      // ---- Tertiary labels: the actual matched phrases -----------
      // These are the literal words the user said that triggered
      // this subtopic. Hidden in the overview, fade in around
      // their subtopic when the parent group is focused. We cap
      // them at six per subtopic so the focused state stays
      // readable rather than cluttered.
      const phrases = (APP.matchedPhrases[`${groupKey}.${sub.id}`] || []).slice(0, 6);
      if (phrases.length > 0) {
        const tokenAnchors = generateRingAnchors(sa, phrases.length, 0.15, Math.PI / 2);
        for (let j = 0; j < phrases.length; j++) {
          const phrase = phrases[j];
          const safe = phrase
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const tokEl = document.createElement('div');
          tokEl.className = 'brain-label tertiary';
          tokEl.dataset.kind = 'tertiary';
          tokEl.dataset.parent = groupKey;
          tokEl.innerHTML =
            '<span class="label-text">"' + safe + '"</span>';
          tokEl.style.opacity = '0';
          brainLabelsEl.appendChild(tokEl);
          BRAIN_LABELS.push({
            kind: 'tertiary',
            groupKey,
            subId: sub.id,
            phrase: phrase,
            anchor: tokenAnchors[j],
            parentSubAnchor: sa,
            el: tokEl,
            sx: 0, sy: 0, sz: 0, lx: 0, ly: 0, opacity: 0
          });
        }
      }
    }
  }
}

/* Project all anchors and update DOM transforms each frame. We
   also offset each label OFF the brain along the (anchor → screen
   centre) direction so labels visibly hang outside the silhouette
   instead of overlapping particles. Primary labels push out
   slightly farther than secondary ones so the hierarchy reads. */
function updateBrainLabels() {
  if (!BRAIN_LABELS.length) return;
  const scale = brainScreenScale();
  const cx = W / 2, cy = H / 2;

  // Focus state lerp [0..1] — soft transition so offsets and
  // sizes don't snap when entering/leaving focus.
  const focused = BRAIN.selectedLabel;  // null = overview, else groupKey
  const focusT = clamp((BRAIN.zoom - 1.0) / (3.0 - 1.0), 0, 1);

  // Pill offsets grow when focused so the bigger focused pills
  // don't overlap their 3D anchors at the deep zoom.
  const PRIMARY_OFFSET   = 90  + 32 * focusT;
  const SECONDARY_OFFSET = 38  + 18 * focusT;
  const TERTIARY_OFFSET  = 14  + 12 * focusT;

  // Form-fade: labels materialise as the brain finishes forming.
  const formFade = clamp((BRAIN.formT - 0.55) / 0.40, 0, 1);

  for (const lab of BRAIN_LABELS) {
    const proj = project3D(lab.anchor.x, lab.anchor.y, lab.anchor.z, scale);
    lab.sx = proj.sx;
    lab.sy = proj.sy;
    lab.sz = proj.sz;

    // Push the label outward from the projected anchor along the
    // direction from screen centre to anchor.
    let dx = proj.sx - cx;
    let dy = proj.sy - cy;
    const len = Math.hypot(dx, dy);
    if (len < 1) { dx = 0; dy = -1; } else { dx /= len; dy /= len; }
    const offset =
      lab.kind === 'primary'   ? PRIMARY_OFFSET   :
      lab.kind === 'secondary' ? SECONDARY_OFFSET :
                                  TERTIARY_OFFSET;
    lab.lx = proj.sx + dx * offset;
    lab.ly = proj.sy + dy * offset;

    // Depth fade: anchors on the back of the brain fade out.
    let depthFade = clamp((proj.sz + 0.6) / 0.8, 0, 1);

    // Focus shaping. Tertiary labels are bound to their parent
    // group: they're hidden in the overview and only appear when
    // their group is focused. Secondary labels are quiet by default
    // and brighten when their group is focused.
    let focusMult = 1;
    if (focused) {
      if (lab.kind === 'tertiary') {
        focusMult = (lab.groupKey === focused) ? 1.0 : 0;
      } else if (lab.groupKey === focused) {
        focusMult = 1.0;
        lab.el.classList.remove('dimmed');
      } else {
        focusMult = 0.40;
        lab.el.classList.add('dimmed');
      }
    } else {
      lab.el.classList.remove('dimmed');
      if (lab.kind === 'tertiary')      focusMult = 0;     // hidden in overview
      else if (lab.kind === 'secondary') focusMult = 0.65;  // quiet by default
    }

    const op = formFade * depthFade * focusMult;
    lab.opacity = op;

    lab.el.style.transform =
      'translate3d(' + lab.lx.toFixed(1) + 'px, ' + lab.ly.toFixed(1) + 'px, 0) translate(-50%, -50%)';
    lab.el.style.opacity = op.toFixed(3);
    lab.el.style.pointerEvents = op > 0.18 ? 'auto' : 'none';
  }
}

/* Subtle interconnections between active group anchors — drawn on
   the canvas during the brain phase between updateBrainLabels and
   the next frame. Lines fade with depth and overall form progress
   so they materialise alongside the labels. */
function drawGroupConnections() {
  // Collect labels by kind. updateBrainLabels just wrote each
  // label's projected position into the BRAIN_LABELS entries this
  // frame, so we can read sx/sy/sz directly here.
  const primaries   = BRAIN_LABELS.filter(l => l.kind === 'primary');
  const secondaries = BRAIN_LABELS.filter(l => l.kind === 'secondary');
  const tertiaries  = BRAIN_LABELS.filter(l => l.kind === 'tertiary');
  const formFade = clamp((BRAIN.formT - 0.65) / 0.35, 0, 1);
  if (formFade <= 0) return;

  const focused = BRAIN.selectedLabel;
  ctx.save();

  // ---- Group-to-group lattice (overview & background) ----------
  // Subtle interconnections between every pair of active group
  // anchors, so the user sees that their detected areas of life
  // form one connected map rather than disconnected dots. When a
  // group is focused, lines that don't touch it fade further so
  // the focused cluster stands out.
  if (primaries.length >= 2) {
    ctx.lineWidth = 0.7;
    ctx.strokeStyle = 'rgba(255, 230, 205, 1)';
    for (let i = 0; i < primaries.length; i++) {
      for (let j = i + 1; j < primaries.length; j++) {
        const a = primaries[i], b = primaries[j];
        const avgDepth = (a.sz + b.sz) / 2;
        const depthFade = clamp((avgDepth + 0.4) / 0.9, 0, 1);
        let focusFade = 1;
        if (focused) {
          focusFade = (a.groupKey === focused || b.groupKey === focused) ? 0.55 : 0.10;
        }
        const alpha = formFade * depthFade * focusFade * 0.18;
        if (alpha < 0.02) continue;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.stroke();
      }
    }
  }

  // ---- Focus connections: group → its subtopics → its tokens ---
  // Only drawn when a group is focused. They give the focused
  // cluster a clear hierarchy: a heavier line from the primary
  // out to each subtopic, and softer hairlines from each subtopic
  // out to its keyword tokens. Both are noticeably bolder than the
  // background lattice so the structure reads at a glance.
  if (focused) {
    const primary = primaries.find(p => p.groupKey === focused);
    if (primary) {
      // primary → secondaries
      ctx.lineWidth = 1.3;
      for (const s of secondaries) {
        if (s.groupKey !== focused) continue;
        const depthFade = clamp((Math.min(primary.sz, s.sz) + 0.5) / 0.9, 0, 1);
        ctx.globalAlpha = formFade * depthFade * 0.78;
        ctx.strokeStyle = 'rgba(255, 232, 208, 1)';
        ctx.beginPath();
        ctx.moveTo(primary.sx, primary.sy);
        ctx.lineTo(s.sx, s.sy);
        ctx.stroke();
      }
      // secondary → tertiaries (its matched phrases)
      ctx.lineWidth = 0.75;
      for (const t of tertiaries) {
        if (t.groupKey !== focused) continue;
        // Find the parent secondary's projected position
        const parentSec = secondaries.find(s => s.groupKey === t.groupKey && s.subId === t.subId);
        if (!parentSec) continue;
        const depthFade = clamp((Math.min(parentSec.sz, t.sz) + 0.4) / 0.9, 0, 1);
        ctx.globalAlpha = formFade * depthFade * 0.55;
        ctx.strokeStyle = 'rgba(255, 240, 220, 1)';
        ctx.beginPath();
        ctx.moveTo(parentSec.sx, parentSec.sy);
        ctx.lineTo(t.sx, t.sy);
        ctx.stroke();
      }
    }
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

/* Click on a primary group label: focus it, dim other groups,
   rotate the brain to bring its anchor to the front, and zoom
   DEEPLY in so the user feels they've stepped inside that area's
   internal world. Click again (or click empty canvas) to return
   to the overview. */
function onLabelClick(groupKey) {
  BRAIN.lastInteraction = performance.now();
  if (BRAIN.selectedLabel === groupKey) {
    // Deselect → return to overview
    BRAIN.selectedLabel = null;
    BRAIN.tZoom = 1.0;
    document.body.removeAttribute('data-focus');
    for (const lab of BRAIN_LABELS) lab.el.classList.remove('selected');
    return;
  }
  BRAIN.selectedLabel = groupKey;
  document.body.dataset.focus = groupKey;
  for (const lab of BRAIN_LABELS) {
    const isFocusedPrimary = (lab.kind === 'primary' && lab.groupKey === groupKey);
    lab.el.classList.toggle('selected', isFocusedPrimary);
  }
  // Deep dive-in zoom: the user is "stepping inside" the group's
  // interior, so the selected cluster fills the viewport and the
  // rest of the brain recedes off-screen entirely. The spotlight
  // effect in drawBrainParticles + the focus-dust pool + the
  // multi-layer aura together give the cluster a sense of being
  // populated, dimensional, and meaningful rather than empty.
  BRAIN.tZoom = 3.0;
  // Rotate brain so the anchor faces front-centre.
  const a = GROUP_ANCHORS[groupKey];
  if (!a) return;
  const len = Math.hypot(a.x, a.y, a.z) || 1;
  BRAIN.tRotY = -Math.atan2(a.x, a.z);
  BRAIN.tRotX = Math.asin(clamp(a.y / len, -1, 1));
  BRAIN.tRotX = clamp(BRAIN.tRotX, -1.0, 1.0);
}

/* ============================================================
   SPEECH RECOGNITION
   ============================================================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function buildRecognition() {
  if (!SR) return null;
  const r = new SR();
  r.continuous     = true;
  r.interimResults = true;
  r.lang           = (navigator.language && /^en/i.test(navigator.language))
                     ? navigator.language : 'en-US';
  r.onresult = onSpeechResult;
  r.onerror  = (e) => {
    // CRITICAL: if permission was denied or the mic isn't available,
    // mark recognition dead and revert to idle. Without this flag, the
    // onend handler below would call start() again, the browser would
    // re-prompt for permission, and we'd be stuck in a permission loop
    // that the user can't escape from. (This is what was causing the
    // "it never closes" behavior.)
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      APP.recognitionDead = true;
      showNotice('Microphone access was blocked. Allow it in your browser settings, then refresh to try again.');
      setPhase('idle');
    } else if (e.error === 'audio-capture') {
      APP.recognitionDead = true;
      showNotice('No microphone was detected on this device.');
      setPhase('idle');
    }
    // 'no-speech' and 'aborted' are normal lifecycle events — ignore them.
  };
  r.onend = () => {
    // Auto-resume if we're still in listening phase AND recognition is healthy.
    // The dead-flag guard prevents the permission-prompt loop on denial.
    // The setTimeout gives the browser room to settle between sessions
    // (some Chrome versions throw 'InvalidStateError' on immediate restart).
    if (APP.phase !== 'listening' || APP.recognitionDead) return;
    setTimeout(() => {
      if (APP.phase !== 'listening' || APP.recognitionDead) return;
      try { r.start(); } catch (_) { /* already started or transitioning */ }
    }, 250);
  };
  return r;
}

function onSpeechResult(ev) {
  let interim = '';
  let newFinal = '';
  for (let i = ev.resultIndex; i < ev.results.length; i++) {
    const res = ev.results[i];
    if (res.isFinal) newFinal += res[0].transcript + ' ';
    else interim += res[0].transcript + ' ';
  }
  if (newFinal) {
    APP.finalText = (APP.finalText + ' ' + newFinal).replace(/\s+/g, ' ').trim();
  }
  APP.interimText = interim.replace(/\s+/g, ' ').trim();

  // Drive the ring's reactivity from how much new text just arrived.
  // This replaces what would otherwise need a separate mic stream.
  const totalNow = APP.finalText.length + APP.interimText.length;
  const delta = Math.max(0, totalNow - APP.lastTotalLen);
  APP.lastTotalLen = totalNow;
  if (delta > 0) {
    APP.speechActivity = Math.min(1, APP.speechActivity + delta * 0.06 + 0.08);
  }

  detectPatterns(APP.finalText);
  renderTranscript();
}

/* ============================================================
   PATTERN DETECTION
   ============================================================ */
function detectPatterns(text) {
  if (!text) return;

  // Re-scan the entire text each time. Reset counts so deletions
  // (interim → revised final) decrement properly. We track THREE
  // levels: per-subtopic for the brain's secondary pills, the
  // unique matched phrases per subtopic (for the keyword tokens
  // shown when a group is focused), and a group-level total
  // (sum of its subtopic hits) for the chips.
  for (const k of Object.keys(APP.patternCounts)) APP.patternCounts[k] = 0;
  APP.subtopicCounts = {};
  APP.matchedPhrases = {};

  for (const [groupKey, group] of Object.entries(GROUPS)) {
    let groupTotal = 0;
    for (const sub of group.subtopics) {
      const rx = SUBTOPIC_PATTERNS[`${groupKey}.${sub.id}`];
      rx.lastIndex = 0;
      let count = 0;
      let m;
      const seen = new Set();   // de-dupe by lowercase form
      const phrases = [];
      while ((m = rx.exec(text)) !== null) {
        count++;
        const phrase = m[0];
        const key = phrase.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          phrases.push(phrase);
        }
      }
      if (count > 0) {
        APP.subtopicCounts[`${groupKey}.${sub.id}`] = count;
        APP.matchedPhrases[`${groupKey}.${sub.id}`] = phrases;
        groupTotal += count;
      }
    }
    const prev = APP.patternCounts[groupKey] || 0;
    if (groupTotal !== prev) {
      APP.patternCounts[groupKey] = groupTotal;
      if (groupTotal > 0 && !APP.patternFirstSeen[groupKey]) {
        APP.patternFirstSeen[groupKey] = performance.now();
      }
      renderChip(groupKey, groupTotal, groupTotal > prev && prev > 0);
    }
  }

  // Show CTA once we have signal: 2+ different groups OR 4+ total hits
  const distinct = Object.values(APP.patternCounts).filter(v => v > 0).length;
  const total    = Object.values(APP.patternCounts).reduce((s, v) => s + v, 0);
  if ((distinct >= 2 || total >= 4) && APP.phase === 'listening') {
    ctaEl.classList.add('show');
  }
}

/* ============================================================
   UI RENDERING
   ============================================================ */
function renderChip(key, count, bump) {
  const id = 'chip-' + key;
  let el = document.getElementById(id);
  if (count <= 0) {
    if (el) el.remove();
    return;
  }
  const group = GROUPS[key];
  if (!group) return;
  if (!el) {
    el = document.createElement('div');
    el.className = 'chip';
    el.id = id;
    el.innerHTML = `
      <span class="dot" style="width:6px;height:6px;border-radius:50%;background:${group.color};box-shadow:0 0 8px ${group.color}99;"></span>
      <span class="label">${group.short}</span>
      <span class="count">${count}</span>`;
    patternsEl.appendChild(el);
  } else {
    el.querySelector('.count').textContent = count;
    if (bump) {
      el.classList.remove('bumped');
      // force reflow
      void el.offsetWidth;
      el.classList.add('bumped');
    }
  }
}

/* Single-line transcript render. We keep only the tail of the
   text — older words simply scroll out under the left mask. */
function renderTranscript() {
  const fullText = (APP.finalText + ' ' + APP.interimText).trim();
  if (!fullText) {
    transcriptEl.innerHTML = '';
    transcriptEl.style.transform = 'translate(-50%, -50%)';
    return;
  }
  // Highlight matches inline (escape HTML first)
  const safe = fullText
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  HIGHLIGHT_REGEX.lastIndex = 0;
  const html = safe.replace(HIGHLIGHT_REGEX, m => `<span class="hi">${m}</span>`);
  // Mark interim portion (style it lighter)
  let finalHtml = html;
  if (APP.interimText) {
    // Re-escape interim for safety
    const safeInterim = APP.interimText
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    HIGHLIGHT_REGEX.lastIndex = 0;
    const interimHtml = safeInterim.replace(HIGHLIGHT_REGEX, m => `<span class="hi">${m}</span>`);
    const safeFinal = APP.finalText
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    HIGHLIGHT_REGEX.lastIndex = 0;
    const finalOnly = safeFinal.replace(HIGHLIGHT_REGEX, m => `<span class="hi">${m}</span>`);
    finalHtml = `<span class="word">${finalOnly}</span> <span class="interim">${interimHtml}</span>`;
  } else {
    finalHtml = `<span class="word">${html}</span>`;
  }
  transcriptEl.innerHTML = finalHtml;

  // Re-anchor the line so the latest word is always visible. When the
  // rendered text fits inside the wrap, it stays centred; once it
  // overflows the wrap's width, it slides left so the trailing word
  // sits at a fixed inset from the right edge (just inside the right
  // fade) and older words scroll off behind the left fade. CSS
  // transitions the transform, so the slide is smooth.
  // Use rAF so we measure AFTER the browser has laid out the new HTML.
  requestAnimationFrame(() => {
    const wrapW = transcriptWrap.clientWidth;
    const textW = transcriptEl.scrollWidth;
    const RIGHT_INSET = 22;     // matches the right fade band
    let tx;
    if (textW + RIGHT_INSET * 2 > wrapW) {
      // Right-aligned: text's right edge sits at (wrapW - RIGHT_INSET).
      // transcriptEl is anchored at left: 50% (= wrapW/2 in absolute),
      // so we translate by (right edge - text width - wrapW/2).
      tx = (wrapW - RIGHT_INSET) - textW - (wrapW / 2);
    } else {
      // Centred: shift back by half its own width.
      tx = -textW / 2;
    }
    transcriptEl.style.transform = `translate(${tx.toFixed(1)}px, -50%)`;
  });
}

/* === Notice helper === */
let noticeTimer = null;
function showNotice(msg) {
  noticeEl.textContent = msg;
  noticeEl.classList.add('show');
  clearTimeout(noticeTimer);
  noticeTimer = setTimeout(() => noticeEl.classList.remove('show'), 4500);
}

/* ============================================================
   PHASE TRANSITIONS
   ============================================================ */
function setPhase(next) {
  APP.phase = next;
  document.body.dataset.phase = next;
  if (next === 'listening') {
    statusEl.dataset.state = 'listening';
    statusLabel.textContent = 'Listening';
    hintEl.classList.add('hidden');
  } else if (next === 'idle') {
    statusEl.dataset.state = 'idle';
    statusLabel.textContent = 'Ready';
    hintEl.classList.remove('hidden');
  } else if (next === 'loading') {
    statusEl.dataset.state = 'idle';
    statusLabel.textContent = 'Forming';
    hintEl.classList.add('hidden');
  } else if (next === 'brain') {
    statusEl.dataset.state = 'idle';
    statusLabel.textContent = 'Inner Map';
  }
}

/* Tap on canvas (or anywhere outside controls) toggles listening */
function startListening() {
  if (APP.phase !== 'idle') return;

  // Reset per-session state
  APP.recognitionDead = false;
  APP.lastTotalLen   = APP.finalText.length + APP.interimText.length;

  setPhase('listening');
  APP.startedAt = performance.now();

  // ONE permission request: the SpeechRecognition API. We do NOT also
  // call getUserMedia — that would prompt for the mic a second time
  // (browsers treat the two APIs as distinct permissions even though
  // physically it's the same microphone). The ring's voice reactivity
  // is driven from speech-event activity instead.
  if (!APP.recognition) APP.recognition = buildRecognition();
  if (APP.recognition) {
    try { APP.recognition.start(); }
    catch (e) { /* already started, ignore */ }
  } else {
    showNotice('Voice recognition isn\'t supported in this browser. Try Chrome or Edge on desktop.');
    setPhase('idle');
  }
}

function stopListening() {
  if (APP.recognition) {
    // Detach onend before stopping so the auto-restart doesn't fight us.
    try { APP.recognition.onend = null; APP.recognition.stop(); } catch (_) {}
    // Drop the recognition instance entirely; we'll build a fresh one on
    // the next session. This is safer than reusing across phase changes.
    APP.recognition = null;
  }
}

function enterLoading() {
  if (APP.phase !== 'listening') return;
  stopListening();
  APP.loadingElapsed = 0;
  APP.loadingMorphT = 0;
  APP.loadingSpinAngle = 0;
  // Tilt the view so the 3D torsion is legible. From idle/listening
  // (rotX = 0) the camera tilts forward to ~24° during loading. Both
  // the loading shape and the brain that follows share this view, so
  // there is no rotation jump between the two phases.
  BRAIN.tRotX = VIEW_TILT_LOADING;
  BRAIN.tRotY = 0;
  setPhase('loading');
  ctaEl.classList.remove('show');
}

function enterBrain() {
  generateBrainTargets();
  BRAIN.formT = 0;
  BRAIN.zoom = 1.0;
  BRAIN.tZoom = 1.0;
  BRAIN.selectedLabel = null;
  // The view inherited from loading already faces the brain — we
  // keep the same orientation so particles arrive with no rotation
  // discontinuity. The user can drag from here.
  BRAIN.lastInteraction = performance.now();

  // Build label DOM elements for every category that was actually
  // detected, ordered by count (most frequent first) so visually
  // dominant labels render last (on top of their connectors).
  const ordered = Object.entries(APP.patternCounts)
    .filter(([, v]) => v > 0)
    .sort((a, b) => b[1] - a[1])
    .map(([k]) => k);
  buildBrainLabels(ordered);

  setPhase('brain');
  brainTitleEl.classList.add('show');
  brainHintEl.classList.add('show');
  resetEl.classList.add('show');
}

function reset() {
  brainTitleEl.classList.remove('show');
  brainHintEl.classList.remove('show');
  resetEl.classList.remove('show');
  brainLabelsEl.innerHTML = '';
  BRAIN_LABELS.length = 0;
  patternsEl.innerHTML = '';
  transcriptEl.innerHTML = '';
  APP.finalText = '';
  APP.interimText = '';
  APP.lastTotalLen = 0;
  APP.speechActivity = 0;
  APP.recognitionDead = false;
  APP.loadingElapsed = 0;
  APP.loadingMorphT = 0;
  APP.loadingSpinAngle = 0;
  APP.patternCounts = Object.fromEntries(Object.keys(GROUPS).map(k => [k, 0]));
  APP.patternFirstSeen = {};
  APP.subtopicCounts = {};
  APP.matchedPhrases = {};
  document.body.removeAttribute('data-focus');
  // Reset brain transition state. We keep brain target positions on
  // particles so the pool itself stays continuous, but the next time
  // we enter the brain phase we'll regenerate fresh ones anyway.
  BRAIN.ready = false;
  BRAIN.formT = 0;
  BRAIN.rotX = 0; BRAIN.rotY = 0;
  BRAIN.tRotX = 0; BRAIN.tRotY = 0;
  BRAIN.zoom = 1.0; BRAIN.tZoom = 1.0;
  BRAIN.dragging = false;
  BRAIN.pinchActive = false;
  BRAIN.selectedLabel = null;
  setPhase('idle');
}

/* ============================================================
   INPUT
   ============================================================ */

/* Tap behavior depends on phase:
     - idle:  begin listening
     - brain: nothing on plain click; drag rotates (handled below)
   We avoid attaching click handlers that would steal the drag start. */
stage.addEventListener('click', (e) => {
  if (APP.phase === 'idle') {
    startListening();
  }
});

ctaEl.addEventListener('click', () => {
  enterLoading();
});

resetEl.addEventListener('click', () => {
  reset();
});

/* === Brain rotation: pointer drag on canvas =================
   Active only in brain phase. We track pointer down/move/up/cancel
   on the canvas itself; capturing the pointer means we receive
   events even if the cursor leaves the window. Rotation is updated
   incrementally based on movement deltas. */
stage.addEventListener('pointerdown', (e) => {
  if (APP.phase !== 'brain') return;
  BRAIN.dragging = true;
  BRAIN.lastDragX = e.clientX;
  BRAIN.lastDragY = e.clientY;
  BRAIN.lastInteraction = performance.now();
  stage.classList.add('dragging');
  if (stage.setPointerCapture) {
    try { stage.setPointerCapture(e.pointerId); } catch (_) {}
  }
});
stage.addEventListener('pointermove', (e) => {
  if (!BRAIN.dragging || APP.phase !== 'brain') return;
  const dx = e.clientX - BRAIN.lastDragX;
  const dy = e.clientY - BRAIN.lastDragY;
  BRAIN.lastDragX = e.clientX;
  BRAIN.lastDragY = e.clientY;
  BRAIN.lastInteraction = performance.now();
  // Sensitivity tuned so a full screen-width drag is roughly one full revolution.
  BRAIN.tRotY += dx * 0.005;
  BRAIN.tRotX += dy * 0.005;
  // Clamp pitch so the brain never flips upside down — keeps the
  // silhouette readable.
  BRAIN.tRotX = clamp(BRAIN.tRotX, -1.0, 1.0);
});
function endDrag(e) {
  if (!BRAIN.dragging) return;
  BRAIN.dragging = false;
  stage.classList.remove('dragging');
  if (e && stage.releasePointerCapture && e.pointerId !== undefined) {
    try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
  }
}
stage.addEventListener('pointerup',     endDrag);
stage.addEventListener('pointercancel', endDrag);
stage.addEventListener('pointerleave',  endDrag);

/* Wheel / trackpad zoom. ctrlKey is set for pinch gestures on
   Mac trackpads (the browser synthesises ctrl+wheel events for
   pinch-to-zoom), so the same handler covers both. We update the
   zoom TARGET — the per-frame lerp toward target gives smooth
   easing without spring overshoot. */
stage.addEventListener('wheel', (e) => {
  if (APP.phase !== 'brain') return;
  e.preventDefault();
  BRAIN.lastInteraction = performance.now();
  // Normalize delta across mice (large lines) and trackpads (tiny pixels).
  const d = e.deltaY * (e.deltaMode === 1 ? 18 : 1);
  // Multiplicative zoom feels more natural than additive.
  const factor = Math.exp(-d * 0.0018);
  BRAIN.tZoom = clamp(BRAIN.tZoom * factor, 0.5, 2.5);
}, { passive: false });

/* Touch pinch zoom for mobile. Uses the native Touch API rather
   than gestures so it works on Android too. */
stage.addEventListener('touchstart', (e) => {
  if (APP.phase !== 'brain') return;
  if (e.touches.length === 2) {
    BRAIN.pinchActive = true;
    BRAIN.dragging = false;          // pinch overrides any in-flight drag
    const t1 = e.touches[0], t2 = e.touches[1];
    BRAIN.pinchDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1;
    BRAIN.lastInteraction = performance.now();
  }
}, { passive: true });
stage.addEventListener('touchmove', (e) => {
  if (APP.phase !== 'brain') return;
  if (BRAIN.pinchActive && e.touches.length === 2) {
    e.preventDefault();
    const t1 = e.touches[0], t2 = e.touches[1];
    const d = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1;
    const factor = d / BRAIN.pinchDist;
    BRAIN.tZoom = clamp(BRAIN.tZoom * factor, 0.5, 2.5);
    BRAIN.pinchDist = d;
    BRAIN.lastInteraction = performance.now();
  }
}, { passive: false });
function endPinch() {
  if (BRAIN.pinchActive) BRAIN.pinchActive = false;
}
stage.addEventListener('touchend',    endPinch);
stage.addEventListener('touchcancel', endPinch);

/* Clicking the empty canvas in brain phase deselects any selected
   label. Pointer-down → up with negligible movement counts as a
   click; bigger movement is a drag and shouldn't deselect. */
let downX = 0, downY = 0;
stage.addEventListener('pointerdown', (e) => {
  downX = e.clientX; downY = e.clientY;
}, true);
stage.addEventListener('click', (e) => {
  if (APP.phase !== 'brain') return;
  const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
  if (moved < 4 && BRAIN.selectedLabel) {
    BRAIN.selectedLabel = null;
    BRAIN.tZoom = 1.0;
    document.body.removeAttribute('data-focus');
    for (const lab of BRAIN_LABELS) lab.el.classList.remove('selected');
  }
});

/* Keyboard nicety: space toggles, esc resets */
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (APP.phase === 'idle') startListening();
    else if (APP.phase === 'listening') enterLoading();
  } else if (e.code === 'Escape') {
    if (APP.phase === 'brain' || APP.phase === 'loading') reset();
  }
});

/* Keep the --ring-r CSS variable in sync with the canvas's ring
   radius so layout (hint, patterns, transcript) tracks the ring
   exactly across viewport sizes. Called on resize. */
function updateLayoutVars() {
  document.documentElement.style.setProperty('--ring-r', `${ringRadius()}px`);
}
window.addEventListener('resize', updateLayoutVars);
updateLayoutVars();

/* Initial state */
setPhase('idle');

</script>
</body>
</html>
