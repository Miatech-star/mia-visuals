<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neural Predictive Clone — Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #f9f7f4;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
}

#c {
  position: fixed; inset: 0;
  display: block;
  cursor: grab;
  touch-action: none;
}
#c:active { cursor: grabbing; }

/* ── Label overlay ── */
#labels-root {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 8;
  overflow: hidden;
}

.lbl {
  position: absolute;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px 5px 8px;
  background: rgba(252, 250, 247, 0.78);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 0.75px solid rgba(160, 100, 200, 0.18);
  border-radius: 100px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.028em;
  color: #2a1048;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  box-shadow:
    0 2px 18px rgba(120, 40, 180, 0.07),
    0 0 0 0.5px rgba(255,255,255,0.92) inset;
  will-change: left, top, opacity;
  transition: opacity 0.45s ease;
}

.lbl-pip {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #E07010, #CC1060, #8800CC, #E07010);
  box-shadow: 0 0 6px rgba(200, 80, 20, 0.55);
  flex-shrink: 0;
}

/* ── Nav ── */
#nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 15;
  padding: 22px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
}

.nav-brand { display: flex; align-items: center; gap: 9px; }

.nav-orb {
  width: 7px; height: 7px; border-radius: 50%;
  background: conic-gradient(#E07010, #CC1060, #8800CC, #E07010);
  box-shadow: 0 0 9px rgba(180, 60, 20, 0.45);
  animation: orb-pulse 3.2s ease-in-out infinite;
}
@keyframes orb-pulse {
  0%,100% { box-shadow: 0 0 7px rgba(180,60,20,0.35); }
  50%      { box-shadow: 0 0 14px rgba(130,0,180,0.45); }
}

.nav-name {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(100, 40, 160, 0.55);
}

.nav-sub {
  font-size: 9.5px; font-weight: 400;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(140, 110, 160, 0.45);
}

/* ── Hint ── */
#hint {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%);
  font-size: 9.5px; font-weight: 400;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(140, 110, 160, 0.40);
  pointer-events: none; z-index: 15;
  transition: opacity 2s ease;
}
#hint.gone { opacity: 0; }

/* ── Loading ── */
#loading {
  position: fixed; inset: 0;
  background: #f9f7f4;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  z-index: 100; transition: opacity 0.9s ease;
}
#loading.done { opacity: 0; pointer-events: none; }

.ld-ring {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid rgba(160, 80, 200, 0.12);
  border-top-color: #CC6010;
  border-right-color: #8800CC;
  animation: spin 1.1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ld-txt {
  font-size: 9.5px; font-weight: 500;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: rgba(140, 100, 180, 0.45);
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="labels-root"></div>

<div id="nav">
  <div class="nav-brand">
    <div class="nav-orb"></div>
    <span class="nav-name">Neural Clone</span>
  </div>
  <span class="nav-sub">Predictive Life Mapping</span>
</div>

<div id="hint">Drag to rotate &nbsp;·&nbsp; Scroll or pinch to enter</div>

<div id="loading">
  <div class="ld-ring"></div>
  <span class="ld-txt">Weaving neural threads</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
'use strict';

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONFIG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CFG = {
  B:       0.19,
  DT:      0.035,
  WARMUP:  900,
  STEPS:   720,
  SKIP:    2,
  N:       580,
  SCALE:   2.1,
  CMAX:    9.2,
  // Sphere geometry
  R_SPHERE:   6.2,  // base sphere radius

  // ── Two-phase zoom ────────────────────────────────────────────
  // zoomProgress is a single [0, 2] scalar driven by scroll/pinch.
  // It never directly equals camera distance.
  //
  //  Phase 1  zoomProgress ∈ [0, 1]
  //    morph  : 0 → 1  (sphere collapses into Thomas attractor)
  //    camera : 22 → 19  (barely approaches — structure reveals first)
  //
  //  Phase 2  zoomProgress ∈ [1, 2]
  //    morph  : stays at 1  (Thomas form is already locked in)
  //    camera : 19 → 3.8   (deep immersion begins)
  //
  PHASE1_DIST_FAR:   22,   // camera distance at zoomProgress = 0
  PHASE1_DIST_NEAR:  19,   // camera distance at zoomProgress = 1
  PHASE2_DIST_NEAR:   3.8, // camera distance at zoomProgress = 2
};

// 30 labels ordered by spatial zone:
// [0–5]   inner / nucleus
// [6–15]  intermediate branching
// [16–21] outer pole A  (+z hemisphere, internal-state signals)
// [22–29] outer pole B  (-z hemisphere, life-facing manifestations)
const LABELS = [
  'Conditional Worth',   'Borrowed Pressure',    // 0-1  inner
  'Fragile Belonging',   'Quiet Resilience',     // 2-3  inner
  'Deep Empathy',        'Protective Loyalty',   // 4-5  inner

  'Dad Echo',            'Mom Weight',           // 6-7  mid
  'Catherine Pull',      'Approval Scan',        // 8-9  mid
  'Conflict Delay',      'Overthinking Spiral',  // 10-11 mid
  'Repair Instinct',     'Meaning Chase',        // 12-13 mid
  'Work Refuge',         'Recovery Ritual',      // 14-15 mid

  'Mental Static',       'Trust Alarm',          // 16-17 pole A
  'Heavy Chest',         'Inner Warmth',         // 18-19 pole A
  'Clear Relief',        'Focus Return',         // 20-21 pole A

  'Future Split',        'Family Anchor',        // 22-23 pole B
  'Friendship Drift',    'Career Fog',           // 24-25 pole B
  'Money Freeze',        'Boundary Growth',      // 26-27 pole B
  'Sleep Debt',          'Play Spark',           // 28-29 pole B
];

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COLOUR GRADIENT — light mode
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const GRAD = [
  { t: 0.00, c: new THREE.Color(0.96, 0.82, 0.05) },
  { t: 0.10, c: new THREE.Color(0.92, 0.58, 0.04) },
  { t: 0.22, c: new THREE.Color(0.90, 0.30, 0.07) },
  { t: 0.34, c: new THREE.Color(0.85, 0.07, 0.38) },
  { t: 0.48, c: new THREE.Color(0.70, 0.03, 0.72) },
  { t: 0.62, c: new THREE.Color(0.54, 0.22, 0.88) },
  { t: 0.76, c: new THREE.Color(0.62, 0.40, 0.90) },
  { t: 0.88, c: new THREE.Color(0.70, 0.55, 0.92) },
  { t: 1.00, c: new THREE.Color(0.76, 0.65, 0.94) },
];

function threadColor(dist) {
  const t = Math.min(1, dist / CFG.CMAX);
  for (let i = 0; i < GRAD.length - 1; i++) {
    if (t <= GRAD[i + 1].t) {
      const f = (t - GRAD[i].t) / (GRAD[i + 1].t - GRAD[i].t);
      return GRAD[i].c.clone().lerp(GRAD[i + 1].c, f);
    }
  }
  return GRAD[GRAD.length - 1].c.clone();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JS HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
// Smooth hash: deterministic pseudo-random per integer
function fhash(n) {
  const s = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return s - Math.floor(s);
}

// Smoothstep
function sStep(e0, e1, x) {
  const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
  return t * t * (3 - 2 * t);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAP ATTRACTOR POINT → SPHERE SURFACE
   Each thread sits at a unique radius so
   the sphere has genuine filament volume
   (not just a hollow shell).
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function toSphere(x, y, z, threadRadius) {
  const len = Math.sqrt(x*x + y*y + z*z);
  if (len < 1e-6) {
    // Shouldn't happen on-attractor, but fallback to pole
    return [0, threadRadius, 0];
  }
  return [
    (x / len) * threadRadius,
    (y / len) * threadRadius,
    (z / len) * threadRadius,
  ];
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDERER / SCENE / CAMERA
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xf9f7f4, 1);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0xf9f7f4);

// Default camera far back → sees sphere state (morph = 0)
const camera = new THREE.PerspectiveCamera(
  58, window.innerWidth / window.innerHeight, 0.05, 300
);
camera.position.set(2, 3, 22);
camera.lookAt(0, 0, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.055;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.30;
controls.enableZoom       = false;  // zoom is handled manually below
controls.minDistance      = 0.5;    // kept as safety guard only
controls.maxDistance      = 80;
controls.rotateSpeed      = 0.70;
controls.target.set(0, 0, 0);

let interacted = false;
renderer.domElement.addEventListener('pointerdown', () => {
  if (!interacted) {
    interacted = true;
    controls.autoRotate = false;
    setTimeout(() => document.getElementById('hint').classList.add('gone'), 200);
  }
}, { once: true });

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TWO-PHASE ZOOM STATE
   zoomProgress ∈ [0, 2]:
     [0, 1] → Phase 1: morph opens, camera barely moves
     [1, 2] → Phase 2: morph locked at 1, camera enters
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let zoomProgressTarget   = 0;  // raw target (what scroll sets)
let zoomProgressSmoothed = 0;  // lagged value driving rendering

// Map zoomProgress [0,2] → camera distance
function zoomToDistance(p) {
  if (p <= 1) {
    // Phase 1: tiny drift, structure reveals while camera barely moves
    const t = p * p * (3 - 2 * p);               // smoothstep within phase
    return CFG.PHASE1_DIST_FAR +
           (CFG.PHASE1_DIST_NEAR - CFG.PHASE1_DIST_FAR) * t;
  } else {
    // Phase 2: eased deep entry
    const t = p - 1;                              // 0 → 1
    const e = t * t * (3 - 2 * t);               // smoothstep
    return CFG.PHASE1_DIST_NEAR +
           (CFG.PHASE2_DIST_NEAR - CFG.PHASE1_DIST_NEAR) * e;
  }
}

// Map zoomProgress [0,2] → morph value [0,1]
// Morph completes during Phase 1; Phase 2 holds it at 1.
function zoomToMorph(p) {
  const t = Math.min(1, p);
  return t * t * (3 - 2 * t);  // smoothstep
}

// ── Wheel ──────────────────────────────────────────────────────
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  // Normalise across pixel/line/page deltaMode
  const raw = e.deltaMode === 1 ? e.deltaY * 18 :
              e.deltaMode === 2 ? e.deltaY * 400 :
              e.deltaY;
  // Cap per-event step so fast scrolls don't jump phases in one tick
  const step = Math.sign(raw) * Math.min(Math.abs(raw) * 0.0012, 0.09);
  zoomProgressTarget = Math.max(0, Math.min(2, zoomProgressTarget - step));
}, { passive: false });

// ── Pinch (touch) ──────────────────────────────────────────────
let lastPinchDist = null;
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (lastPinchDist !== null) {
      const delta = (d - lastPinchDist) * 0.006;  // pinch out = zoom in
      zoomProgressTarget = Math.max(0, Math.min(2, zoomProgressTarget - delta));
    }
    lastPinchDist = d;
  }
}, { passive: true });
canvas.addEventListener('touchend',   () => { lastPinchDist = null; });
canvas.addEventListener('touchcancel',() => { lastPinchDist = null; });

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   THOMAS ATTRACTOR  —  RK4
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function thomasF(x, y, z) {
  const b = CFG.B;
  return [Math.sin(y)-b*x, Math.sin(z)-b*y, Math.sin(x)-b*z];
}

function rk4(x, y, z) {
  const h = CFG.DT;
  const [a1,b1,c1] = thomasF(x,y,z);
  const [a2,b2,c2] = thomasF(x+h*.5*a1, y+h*.5*b1, z+h*.5*c1);
  const [a3,b3,c3] = thomasF(x+h*.5*a2, y+h*.5*b2, z+h*.5*c2);
  const [a4,b4,c4] = thomasF(x+h*a3,    y+h*b3,    z+h*c3);
  return [
    x + h/6*(a1+2*a2+2*a3+a4),
    y + h/6*(b1+2*b2+2*b3+b4),
    z + h/6*(c1+2*c2+2*c3+c4),
  ];
}

function trajectory(x0, y0, z0) {
  let [x,y,z] = [x0,y0,z0];
  for (let i = 0; i < CFG.WARMUP; i++) [x,y,z] = rk4(x,y,z);
  const pts = [];
  for (let i = 0; i < CFG.STEPS; i++) {
    [x,y,z] = rk4(x,y,z);
    if (i % CFG.SKIP === 0)
      pts.push([x*CFG.SCALE, y*CFG.SCALE, z*CFG.SCALE]);
  }
  return pts;
}

function makeSeed(i) {
  const theta = (i / CFG.N) * Math.PI * 2;
  const phi   = ((i * 7) % CFG.N) / CFG.N * Math.PI;
  const r     = 0.03 + (i % 8) * 0.055;
  const j     = 0.008;
  return [
    r * Math.sin(phi) * Math.cos(theta) + (Math.random()-.5)*j,
    r * Math.sin(phi) * Math.sin(theta) + (Math.random()-.5)*j,
    r * Math.cos(phi)                   + (Math.random()-.5)*j,
  ];
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SHARED LINE MATERIAL
   Two position states per vertex:
     aSpherePos  — sphere surface (default/far view)
     position    — Thomas attractor  (close/zoomed view)
   uMorph drives the blend: 0 = sphere, 1 = attractor

   Organic twist: during mid-morph each vertex
   arcs through a position-dependent perpendicular
   offset so the unfolding feels like strands
   being coaxed apart rather than simply scaled.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const lineMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite:  false,
  blending:    THREE.NormalBlending,
  uniforms: {
    uTime:  { value: 0 },
    uMorph: { value: 0 },  // 0 = sphere, 1 = attractor
  },
  vertexShader: `
    attribute vec3  aSpherePos;   // sphere-mapped position
    attribute vec3  color;
    attribute float lineT;
    attribute float threadPhase;

    uniform float uMorph;

    varying vec3  vColor;
    varying float vLineT;
    varying float vPhase;

    void main() {
      vColor = color;
      vLineT = lineT;
      vPhase = threadPhase;

      // Extra cubic smoothing on top of the already-smooth uMorph value
      float m = uMorph * uMorph * (3.0 - 2.0 * uMorph);

      // Arc displacement: peaks at mid-morph, zero at both ends
      // — gives each strand an organic 3D arc path as it unfolds
      float arc = sin(m * 3.14159265);

      // Per-strand perpendicular direction seeded by sphere position
      // (consistent along the thread → smooth curve, unique per strand)
      vec3 seed = aSpherePos * vec3(1.31, 0.79, 2.17);
      vec3 perp = normalize(vec3(
        sin(seed.y + seed.z * 0.8),
        sin(seed.z + seed.x * 1.2),
        sin(seed.x + seed.y * 0.6)
      ));

      // Scale arc by travel distance: far-moving strands arc more
      float travelDist = length(position - aSpherePos);
      vec3 arcOffset   = perp * arc * travelDist * 0.55;

      vec3 p = mix(aSpherePos, position, m) + arcOffset;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec3  vColor;
    varying float vLineT;
    varying float vPhase;

    vec3 gradColor(float t) {
      t = clamp(t, 0.0, 1.0);
      if (t < 0.10) return mix(vec3(0.96,0.82,0.05), vec3(0.92,0.58,0.04), t/0.10);
      if (t < 0.22) return mix(vec3(0.92,0.58,0.04), vec3(0.90,0.30,0.07), (t-0.10)/0.12);
      if (t < 0.34) return mix(vec3(0.90,0.30,0.07), vec3(0.85,0.07,0.38), (t-0.22)/0.12);
      if (t < 0.48) return mix(vec3(0.85,0.07,0.38), vec3(0.70,0.03,0.72), (t-0.34)/0.14);
      if (t < 0.62) return mix(vec3(0.70,0.03,0.72), vec3(0.54,0.22,0.88), (t-0.48)/0.14);
      if (t < 0.76) return mix(vec3(0.54,0.22,0.88), vec3(0.62,0.40,0.90), (t-0.62)/0.14);
      if (t < 0.88) return mix(vec3(0.62,0.40,0.90), vec3(0.70,0.55,0.92), (t-0.76)/0.12);
                    return mix(vec3(0.70,0.55,0.92), vec3(0.76,0.65,0.94), (t-0.88)/0.12);
    }

    void main() {
      float speed  = 0.168 + vPhase * 0.196;
      float offset = vPhase * 6.28318;

      float t1 = fract(vLineT * 1.6 - uTime * speed + offset);
      float p1 = smoothstep(0.0, 0.06, t1) * smoothstep(0.18, 0.06, t1);

      float t2 = fract(vLineT * 1.6 - uTime * speed + offset + 0.22);
      float p2 = smoothstep(0.0, 0.05, t2) * smoothstep(0.13, 0.05, t2) * 0.50;

      float t3 = fract(vLineT * 1.2 + uTime * speed * 0.42 + offset * 1.73);
      float p3 = smoothstep(0.0, 0.04, t3) * smoothstep(0.10, 0.04, t3) * 0.22;

      float pulse = clamp(p1 + p2 + p3, 0.0, 1.0);

      float baseT    = vLineT;
      float shiftedT = clamp(baseT - pulse * 0.30, 0.0, 1.0);
      vec3  pulsCol  = gradColor(shiftedT);

      vec3  col   = mix(vColor, pulsCol, pulse * 0.80);
      float alpha = 0.13 + pulse * 0.38;

      gl_FragColor = vec4(col, alpha);
    }
  `,
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GROUPS & LABEL STATE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const group    = new THREE.Group();
scene.add(group);

// Two anchor arrays so labels morph with the structure
const anchorsB  = [];  // attractor positions (open state)
const anchorsA  = [];  // sphere positions    (closed state)
const labelEls  = [];

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUILD SCENE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function buildScene() {
  const labRoot = document.getElementById('labels-root');

  for (let ti = 0; ti < CFG.N; ti++) {
    const pts = trajectory(...makeSeed(ti));
    if (pts.length < 4) continue;

    // Per-thread sphere radius: varies between 0.72 and 1.0 of R_SPHERE
    // so threads stack at different depths → volumetric, not shell-like
    const threadR = CFG.R_SPHERE * (0.72 + 0.28 * fhash(ti));

    // Label anchor — zone-aware spatial search
    // Each zone scores every sampled point; the best-scoring point wins.
    // A small per-label bias in x/y breaks ties, ensuring spread across
    // the zone rather than all 6 (or 8) labels collapsing to the same spot.
    if (ti < LABELS.length) {
      const stride = Math.max(1, Math.floor(pts.length / 80));
      let bestScore = -Infinity, bestK = 0;

      // Spread bias: varies continuously across labels within the zone
      const spreadX = Math.sin(ti * 1.37) * 1.4;
      const spreadY = Math.cos(ti * 2.09) * 1.2;

      for (let k = 0; k < pts.length; k += stride) {
        const [x, y, z] = pts[k];
        const r = Math.sqrt(x*x + y*y + z*z);
        let score;

        if (ti < 6) {
          // Inner nucleus: minimise radius; bias by y to separate labels
          score = -r - 0.18 * Math.abs(y - spreadY);
        } else if (ti < 16) {
          // Intermediate: target r ≈ 2.8; spread across x-y plane
          score = -Math.abs(r - 2.8) - 0.08 * Math.abs(x - spreadX)
                                      - 0.06 * Math.abs(y - spreadY);
        } else if (ti < 22) {
          // Pole A (+z hemisphere): maximise z; spread by x
          score = z - 0.18 * Math.abs(x - spreadX);
        } else {
          // Pole B (-z hemisphere): minimise z; spread by x
          score = -z - 0.16 * Math.abs(x - spreadX);
        }

        if (score > bestScore) { bestScore = score; bestK = k; }
      }

      const [ax, ay, az] = pts[bestK];
      anchorsB.push(new THREE.Vector3(ax, ay, az));
      const [sx, sy, sz] = toSphere(ax, ay, az, threadR);
      anchorsA.push(new THREE.Vector3(sx, sy, sz));
    }

    const n         = pts.length;
    const posArr    = new Float32Array(n * 3);  // attractor positions
    const sphArr    = new Float32Array(n * 3);  // sphere positions
    const colArr    = new Float32Array(n * 3);
    const linTArr   = new Float32Array(n);
    const phsArr    = new Float32Array(n);
    const phase     = Math.random();

    for (let vi = 0; vi < n; vi++) {
      const [vx, vy, vz] = pts[vi];

      // Attractor position (open state → position attribute)
      posArr[vi*3]   = vx;
      posArr[vi*3+1] = vy;
      posArr[vi*3+2] = vz;

      // Sphere position (closed state → aSpherePos attribute)
      const [sx, sy, sz] = toSphere(vx, vy, vz, threadR);
      sphArr[vi*3]   = sx;
      sphArr[vi*3+1] = sy;
      sphArr[vi*3+2] = sz;

      // Color from attractor distance — preserved regardless of morph state
      const c = threadColor(Math.sqrt(vx*vx + vy*vy + vz*vz));
      colArr[vi*3]   = c.r;
      colArr[vi*3+1] = c.g;
      colArr[vi*3+2] = c.b;

      linTArr[vi] = vi / (n - 1);
      phsArr[vi]  = phase;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position',    new THREE.BufferAttribute(posArr,  3));
    geo.setAttribute('aSpherePos',  new THREE.BufferAttribute(sphArr,  3));
    geo.setAttribute('color',       new THREE.BufferAttribute(colArr,  3));
    geo.setAttribute('lineT',       new THREE.BufferAttribute(linTArr, 1));
    geo.setAttribute('threadPhase', new THREE.BufferAttribute(phsArr,  1));
    group.add(new THREE.Line(geo, lineMat));
  }

  // HTML labels
  LABELS.forEach((text, i) => {
    if (i >= anchorsB.length) return;
    const el  = document.createElement('div');
    el.className = 'lbl';
    const pip = document.createElement('div');
    pip.className = 'lbl-pip';
    const sp  = document.createElement('span');
    sp.textContent = text;
    el.appendChild(pip); el.appendChild(sp);
    labRoot.appendChild(el);
    labelEls.push({ el, phase: i * 0.44 });
  });

  document.getElementById('loading').classList.add('done');
  setTimeout(() => {
    const ld = document.getElementById('loading');
    if (ld) ld.remove();
  }, 1100);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LABEL PROJECTION
   Labels lerp between sphere anchors and
   attractor anchors using the same morphCurrent
   value that drives the vertex shader — so
   labels stay perfectly attached throughout.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const _v   = new THREE.Vector3();
const _tmp = new THREE.Vector3();

function updateLabels(t, morphVal) {
  const W = window.innerWidth, H = window.innerHeight;
  labelEls.forEach(({ el, phase }, i) => {
    if (i >= anchorsA.length) return;

    // Lerp label anchor between sphere (0) and attractor (1)
    _v.lerpVectors(anchorsA[i], anchorsB[i], morphVal);

    // Gentle float on top
    _v.y += Math.sin(t * 0.37 + phase) * 0.06;

    _v.project(camera);
    if (_v.z >= 1) { el.style.opacity = '0'; return; }

    const sx = (_v.x * 0.5 + 0.5) * W;
    const sy = (-_v.y * 0.5 + 0.5) * H;

    // Use the lerped world position to get distance for fade
    _tmp.lerpVectors(anchorsA[i], anchorsB[i], morphVal);
    const dist = camera.position.distanceTo(_tmp);

    let op = 1;
    if (dist > 22) op *= Math.max(0, 1 - (dist - 22) / 14);
    if (dist < 2.2) op *= Math.max(0, (dist - 0.7) / 1.5);
    op *= Math.max(0, Math.min(1,
      Math.min(sx / (W * .11), (W - sx) / (W * .11)),
      Math.min(sy / (H * .09), (H - sy) / (H * .09))
    ));

    el.style.opacity = op.toFixed(3);
    el.style.left    = sx.toFixed(1) + 'px';
    el.style.top     = sy.toFixed(1) + 'px';
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESIZE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MORPH STATE
   morphCurrent is derived entirely from
   zoomProgressSmoothed — not from camera distance.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let morphCurrent = 0;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ANIMATION LOOP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  elapsed += dt;

  // ── Smooth zoom progress ───────────────────────────────────────
  // Phase 1 lag is a little slower (structure is precious, let it breathe).
  // Phase 2 snaps slightly faster (user is now deliberately entering).
  const lagRate = zoomProgressSmoothed < 1 ? 3.2 : 4.5;
  zoomProgressSmoothed += (zoomProgressTarget - zoomProgressSmoothed)
                          * Math.min(1, dt * lagRate);
  zoomProgressSmoothed  = Math.max(0, Math.min(2, zoomProgressSmoothed));

  // ── Derive morph and camera distance from zoom progress ────────
  morphCurrent = zoomToMorph(zoomProgressSmoothed);

  const targetDist = zoomToDistance(zoomProgressSmoothed);

  // Override radial distance while preserving OrbitControls rotation.
  // Must happen AFTER controls.update() so rotation damping is applied first.
  controls.update();
  const camDir = camera.position.clone().sub(controls.target).normalize();
  camera.position.copy(controls.target).addScaledVector(camDir, targetDist);

  lineMat.uniforms.uTime.value  = elapsed;
  lineMat.uniforms.uMorph.value = morphCurrent;

  updateLabels(elapsed, morphCurrent);
  renderer.render(scene, camera);
}

animate();
requestAnimationFrame(() => requestAnimationFrame(() => buildScene()));
setTimeout(() => { if (!interacted) document.getElementById('hint').classList.add('gone'); }, 5000);
</script>
</body>
</html>
