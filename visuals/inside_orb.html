<html lang="en">
<head>

<title>Mia Orb</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100vw;height:100vh;background:#f4f4f6;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:grab;}
body.dragging{cursor:grabbing;}
#wrap{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}

canvas#orb{display:block;position:absolute;filter:blur(18px);z-index:1;pointer-events:none;}
#aura{position:absolute;z-index:2;pointer-events:none;width:80vmin;height:80vmin;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,transparent 28%,rgba(255,252,252,.18) 42%,rgba(255,250,250,.55) 54%,rgba(255,255,255,.72) 62%,rgba(255,253,253,.40) 72%,rgba(255,250,250,.12) 84%,transparent 100%);
  filter:blur(10px);}
#lc{position:absolute;top:0;left:0;pointer-events:none;z-index:3;}
#lbls{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;}

/* ── Labels ── */
.lbl{position:absolute;left:0;top:0;transform:translate(-50%,-50%);font-family:'Inter',system-ui,sans-serif;white-space:nowrap;pointer-events:auto;transition:opacity .35s ease,color .3s ease;user-select:none;}
.op{font-size:10.5px;font-weight:300;letter-spacing:.07em;color:rgba(125,82,93,.82);cursor:pointer;padding:4px 2px;display:flex;align-items:center;gap:6px;}
.op::before{content:'';width:3.5px;height:3.5px;border-radius:50%;background:rgba(170,98,112,.55);flex-shrink:0;transition:background .25s,transform .25s;}
.op:hover{color:rgba(158,58,80,1);}
.op.sel{color:rgba(148,48,72,1);font-weight:400;letter-spacing:.05em;}
.op.sel::before{background:rgba(148,48,72,.9);transform:scale(1.7);}
.person{font-size:12.5px;font-weight:500;letter-spacing:.02em;color:rgba(44,28,36,.90);cursor:pointer;display:flex;align-items:center;gap:7px;padding:4px 2px;}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;box-shadow:0 0 6px currentColor;}
.pinfo{display:flex;flex-direction:column;gap:1px;}
.pname{font-size:12px;font-weight:500;letter-spacing:.02em;line-height:1.2;}
.prole{font-size:9px;font-weight:300;letter-spacing:.07em;color:rgba(120,85,95,.52);line-height:1.2;}
.person:hover .pname{color:rgba(28,16,24,1);}
.person.focused .pname{color:rgba(28,16,24,1);}
.ip{font-size:9px;font-weight:300;letter-spacing:.055em;color:rgba(115,75,86,.52);pointer-events:none;padding:2px 0;}

/* ── Person card ── */
#card{
  position:fixed;right:28px;top:50%;transform:translateY(-50%) translateX(24px);
  width:272px;font-family:'Inter',system-ui,sans-serif;
  background:rgba(250,246,248,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(195,165,175,.22);border-radius:18px;
  padding:26px 22px 22px;
  z-index:20;opacity:0;pointer-events:none;
  transition:opacity .38s cubic-bezier(.4,0,.2,1), transform .38s cubic-bezier(.4,0,.2,1);
}
#card.visible{opacity:1;transform:translateY(-50%) translateX(0);pointer-events:auto;}
#card-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;font-size:15px;color:rgba(130,100,110,.5);line-height:1;padding:4px;font-family:'Inter',system-ui;}
#card-close:hover{color:rgba(130,100,110,.9);}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.card-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.card-name{font-size:17px;font-weight:600;letter-spacing:-.01em;color:rgba(38,22,30,.92);}
.card-role{font-size:10px;font-weight:400;letter-spacing:.10em;text-transform:uppercase;color:rgba(158,108,122,.80);margin-bottom:14px;padding-left:21px;}
.card-desc{font-size:12px;font-weight:300;line-height:1.65;color:rgba(72,50,60,.78);margin-bottom:16px;}
.card-patterns-label{font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(150,108,120,.55);margin-bottom:8px;}
.card-pattern{font-size:11px;font-weight:300;color:rgba(108,75,86,.72);padding:3px 0;display:flex;align-items:center;gap:7px;}
.card-pattern::before{content:'';width:3px;height:3px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.7;}

/* ── Hints ── */
#hint,#dhint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-family:'Inter',system-ui;font-size:10px;letter-spacing:.12em;text-transform:uppercase;pointer-events:none;z-index:10;transition:opacity 1s,color 1s;}
#hint{color:rgba(148,122,132,.60);}
#dhint{color:rgba(162,105,120,.0);}
#sbadge{position:fixed;top:26px;left:50%;transform:translateX(-50%);font-family:'Inter',system-ui;font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(145,115,125,.0);pointer-events:none;z-index:10;transition:color 1s;}
</style>

<script type="module">
import * as THREE from 'three';

const OUTER_PATTERNS=[

// ═══════════════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0,0);
renderer.sortObjects=true;
const orbC=renderer.domElement; orbC.id='orb';
document.getElementById('wrap').appendChild(orbC);

const scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(52,window.innerWidth/window.innerHeight,0.01,100);
camera.position.set(0,0,3.8);
camera.rotation.order='YXZ';
var camera;

// ═══════════════════════════════════════════════════════════════
//  GLSL
// ═══════════════════════════════════════════════════════════════
const NOISE=`
vec3 mod289v3(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute(vec4 x){return mod289v4(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod289v3(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm(vec3 p,int o){float v=0.,a=.5;for(int i=0;i<8;i++){if(i>=o)break;v+=snoise(p)*a;p*=2.05;a*=.48;}return v;}
float fbm(vec3 p){return fbm(p,5);}
`;
const oV=`varying vec3 vN,vW;void main(){vN=normalize(normalMatrix*normal);vW=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const iV=`varying vec3 vN,vW;void main(){vW=(modelMatrix*vec4(position,1.)).xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

const coreF=`${NOISE}
uniform float uT;uniform vec3 uC;uniform float uOT;varying vec3 vN,vW;
void main(){
  vec3 v=normalize(uC-vW);float nd=max(dot(vN,v),0.);float fr=1.-nd;
  float n=clamp(fbm(vW*1.7+vec3(uT*.09,uT*.06,uT*.05))*.6+fbm(vW*3.2+vec3(-uT*.05,uT*.08,-uT*.07))*.4,-1.,1.)*.5+.5;
  vec3 cL=vec3(1.,.94,.94),cP=vec3(.95,.72,.73),cR=vec3(.84,.54,.56),cD=vec3(.72,.38,.42);
  vec3 col;if(n<.35)col=mix(cD,cR,n/.35);else if(n<.65)col=mix(cR,cP,(n-.35)/.3);else col=mix(cP,cL,(n-.65)/.35);
  col=mix(col,vec3(1.,.97,.97),pow(fr,1.2)*.85);
  gl_FragColor=vec4(col,(1.-pow(fr,3.)*.15)*(uOT*.85+.12));
}`;
const haloF=`${NOISE}
uniform float uT,uI,uOT;uniform vec3 uC;varying vec3 vN,vW;
void main(){
  vec3 v=normalize(uC-vW);float fr=pow(1.-max(dot(vN,v),0.),2.2);
  vec3 col=mix(vec3(.94,.75,.76),vec3(1.,.96,.96),fbm(vW*1.5+uT*.04)*.5+.5);
  gl_FragColor=vec4(col,fr*max(0.,.30-uI*.05)*uOT);
}`;
const memF=`uniform float uMT;uniform vec3 uC;varying vec3 vN,vW;
void main(){vec3 v=normalize(uC-vW);float r=pow(1.-max(dot(normalize(vN),v),0.),1.8);gl_FragColor=vec4(1.,.93,.94,r*uMT*.55);}`;

// Volumetric cloud — 7-octave fbm, double-layer noise for depth
const cloudF=`${NOISE}
uniform float uT,uIT;uniform vec3 uC,uC1,uC2;uniform float uNS,uSP,uOP,uFog;
varying vec3 vN,vW;
void main(){
  if(uIT<.01)discard;
  vec3 vd=normalize(uC-vW);
  float fc=abs(dot(normalize(vN),vd));
  // Multi-scale cloud body
  float body=pow(smoothstep(0.,.72,fc),0.7);
  // Three noise octave bands for layered atmospheric look
  vec3 p0=vW*uNS+vec3(uT*uSP*.8,uT*uSP,uT*uSP*.6);
  vec3 p1=vW*uNS*1.9+vec3(-uT*uSP*.5,uT*uSP*.6,uT*uSP*.4);
  vec3 p2=vW*uNS*4.1+vec3(uT*uSP*.3,-uT*uSP*.8,uT*uSP*.2);
  float n0=fbm(p0,6)*.5+.5;
  float n1=fbm(p1,4)*.5+.5;
  float n2=fbm(p2,3)*.5+.5;
  // Compose: broad shape * mid detail * fine texture
  float n=n0*.50+n1*.32+n2*.18;
  n=clamp(n,0.,1.);
  // Color with depth variation
  vec3 col=mix(uC1,uC2,n*.8+.1);
  // Warmer near center, cooler at edge
  col=mix(col,mix(uC1,vec3(1.,.96,.94),.5),pow(1.-fc,.8)*.3);
  // Depth fog
  float fog=exp(-length(vW-uC)*uFog);
  // Soft luminosity from beneath
  float lum=pow(n,.6)*.4+.6;
  float alpha=body*pow(n,.55)*uOP*uIT*fog*lum;
  gl_FragColor=vec4(col,clamp(alpha,0.,1.));
}`;

// Glow sphere for people — very soft gaseous / atmospheric node
const glowF=`${NOISE}
uniform float uT;uniform vec3 uColor,uC;uniform float uIT;varying vec3 vN,vW;
void main(){
  vec3 vd=normalize(uC-vW);
  float fr=1.-max(dot(normalize(vN),vd),0.);
  // Two noise layers for organic gaseous form
  float n=fbm(vW*6.+vec3(uT*.18,uT*.14,uT*.12))*.5+.5;
  float n2=fbm(vW*11.+vec3(-uT*.12,uT*.20,uT*.09))*.5+.5;
  float pulse=.78+.22*sin(uT*1.1+uColor.r*6.+uColor.b*4.);
  // Extremely soft rim — spherical form just barely perceptible
  float rim=pow(fr,5.0)*pulse;
  // Very faint internal haze
  float haze=pow(1.-fr,2.0)*(n*.5+n2*.5)*.18*pulse;
  // Noise erosion breaks the rim into a gaseous edge
  float erosion=.50+.50*(n*.6+n2*.4);
  float alpha=clamp((rim*erosion*.46+haze*.54)*uIT,.0,.38);
  // Color: person hue at rim, pale milky core
  vec3 coreCol=mix(uColor*.5,vec3(1.,.95,.95),.62);
  vec3 col=mix(coreCol,uColor,pow(fr,.8));
  col*=(.70+.30*(n*.55+n2*.45));
  gl_FragColor=vec4(col,alpha);
}`;

// ═══════════════════════════════════════════════════════════════
//  PIVOT + ALL MESHES
// ═══════════════════════════════════════════════════════════════
const pivot=new THREE.Group(); scene.add(pivot);
function smat(vs,fs,u,ex={}){return new THREE.ShaderMaterial({vertexShader:vs,fragmentShader:fs,uniforms:u,transparent:true,depthWrite:false,...ex});}

// Outer shell
const orbMat=smat(oV,coreF,{uT:{value:0},uC:{value:camera.position},uOT:{value:1}});
const orb=new THREE.Mesh(new THREE.SphereGeometry(1,256,256),orbMat);
orb.renderOrder=10; pivot.add(orb);

const hScales=[1.15,1.35,1.65,2.10];
const halos=hScales.map((s,i)=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),smat(oV,haloF,{uT:{value:0},uI:{value:i},uC:{value:camera.position},uOT:{value:1}}));
  m.scale.setScalar(s);m.userData.bs=s;m.renderOrder=9;pivot.add(m);return m;
});
const memMat=smat(oV,memF,{uMT:{value:0},uC:{value:camera.position}},{side:THREE.BackSide});
pivot.add(new THREE.Mesh(new THREE.SphereGeometry(.99,96,96),memMat));

// Interior clouds — 15 volumes, varied sizes, blending modes
const cDefs=[
  // Large atmospheric veils — desaturated, varied hue
  {p:[ .08, .05, .35],s:[.75,.42,.62],c1:[.88,.86,.94],c2:[.96,.94,.99],ns:1.6,sp:.048,op:.68,fog:.40,add:false},
  {p:[-.32,.10,.08],s:[.80,.30,.65],c1:[.80,.88,.92],c2:[.90,.94,.97],ns:1.3,sp:.038,op:.55,fog:.35,add:false},
  {p:[ .28,-.10,-.08],s:[.58,.62,.42],c1:[.92,.88,.82],c2:[.97,.94,.90],ns:1.9,sp:.058,op:.55,fog:.38,add:false},
  // Dense cloud chambers — one rose, one soft purple, one slate
  {p:[ .32, .12, .10],s:[.44,.38,.48],c1:[.80,.52,.58],c2:[.92,.72,.76],ns:2.8,sp:.088,op:.72,fog:.55,add:false},
  {p:[-.42, .20, .15],s:[.40,.34,.44],c1:[.72,.68,.88],c2:[.88,.86,.96],ns:3.0,sp:.092,op:.68,fog:.52,add:false},
  {p:[ .08,-.32,-.40],s:[.48,.40,.40],c1:[.70,.78,.82],c2:[.84,.90,.94],ns:2.6,sp:.075,op:.65,fog:.42,add:false},
  // Filament veils — sage, warm peach, soft lavender
  {p:[-.20, .38,-.18],s:[.65,.18,.55],c1:[.78,.88,.80],c2:[.90,.96,.92],ns:1.2,sp:.030,op:.48,fog:.30,add:false},
  {p:[ .15,-.42, .22],s:[.55,.20,.60],c1:[.94,.86,.74],c2:[.98,.94,.88],ns:1.5,sp:.035,op:.44,fog:.28,add:false},

  {p:[ .02,.06,-.05],s:[.32,.32,.32],c1:[.96,.94,.92],c2:[1.,.98,.97],ns:3.5,sp:.115,op:.78,fog:.20,add:true},

const clouds=cDefs.map((d,i)=>{

//  LABEL SYSTEM
// ═══════════════════════════════════════════════════════════════
const lblC=document.getElementById('lbls');
const lc=document.getElementById('lc');
const lctx=lc.getContext('2d');
function resizeLC(){lc.width=window.innerWidth;lc.height=window.innerHeight;}
resizeLC();

const lblReg=new Map(); // id→{el,pivotLocal,type,personId,screenPos}

function mkLbl(id,html,cls,pivotLocal,personId=null){
  const el=document.createElement('div');
  el.className=`lbl ${cls}`;el.innerHTML=html;
  lblC.appendChild(el);
  lblReg.set(id,{el,pivotLocal:pivotLocal.clone(),type:cls,personId,screenPos:{x:0,y:0,depth:0,df:0}});
  return el;
}

OUTER_PATTERNS.forEach(p=>{
  const el=mkLbl(p.id,p.text,'op',p.pos);
  el.addEventListener('click',()=>openPatternCard(p.id));
});

PEOPLE.forEach(p=>{
  const html=`<span class="pdot" style="background:${p.color};color:${p.color}"></span><span class="pinfo"><span class="pname">${p.name}</span><span class="prole">${p.role}</span></span>`;
  const el=mkLbl(p.id,html,'person',p.pos);
  el.addEventListener('click',()=>openCard(p.id));
  // Inner pattern labels
  const [cx,cy,cz_]=p.pos.toArray();
  p.patterns.forEach((pat,j)=>{
    const ang=((j/p.patterns.length)*Math.PI*2)+Math.random()*.5;
    const r=.18+Math.random()*.10;
    const vy=(.4-Math.random()*.8)*.2;
    const off=new THREE.Vector3(Math.cos(ang)*r,vy,Math.sin(ang)*r);
    const worldPos=p.pos.clone().add(off);
    mkLbl(p.id+'_'+j,pat,'ip',worldPos,p.id);
  });
});

function projectLbl(pivotLocal){
  pivot.updateMatrixWorld(true);
  const wp=pivotLocal.clone().applyMatrix4(pivot.matrixWorld);
  const v=wp.clone().project(camera);
  const x=(v.x+1)*.5*window.innerWidth;
  const y=(-v.y+1)*.5*window.innerHeight;
  const df=Math.max(0,Math.min(1,(wp.z+0.8)/2.0)); // depth fade
  return {x,y,depth:v.z,wp,df};
}

//  PERSON CARD
// ═══════════════════════════════════════════════════════════════
const card=document.getElementById('card');
let focusedPerson=null;
let focusedPattern=null;

function openCard(id){
  if(focusedPerson===id){closeCard();return;}
  focusedPerson=id; focusedPattern=null;
  const p=PEOPLE.find(x=>x.id===id);
  document.getElementById('cdot').style.background=p.color;
  document.getElementById('cname').textContent=p.name;
  document.getElementById('crole').textContent=p.role;
  document.getElementById('cdesc').textContent=p.desc;
  const patsEl=document.getElementById('cpats');
  patsEl.innerHTML=p.patterns.map(pat=>`<div class="card-pattern">${pat}</div>`).join('');
  document.querySelector('.card-patterns-label').style.display='';
  card.classList.add('visible');
  updateFocus();
}

function openPatternCard(id){
  if(focusedPattern===id){closeCard();return;}
  focusedPattern=id; focusedPerson=null;
  const p=OUTER_PATTERNS.find(x=>x.id===id);
  document.getElementById('cdot').style.background='#B86878';
  document.getElementById('cname').textContent=p.text;
  document.getElementById('crole').textContent='Core pattern';
  document.getElementById('cdesc').textContent=p.desc;
  document.getElementById('cpats').innerHTML='';
  document.querySelector('.card-patterns-label').style.display='none';
  card.classList.add('visible');
  // Mark the selected label
  lblReg.forEach((r,k)=>{ if(r.type==='op') r.el.classList.toggle('sel',k===id); });
  updateFocus();
}

function closeCard(){
  focusedPerson=null; focusedPattern=null;
  card.classList.remove('visible');
  lblReg.forEach((r,k)=>{ if(r.type==='op') r.el.classList.remove('sel'); });
  updateFocus();
}
document.getElementById('card-close').addEventListener('click',closeCard);

function updateFocus(){
  lblReg.forEach((r,id)=>{
    if(r.type==='person'){
      const active=!focusedPerson||id===focusedPerson;
      r.el.classList.toggle('focused',id===focusedPerson);
    }
  });
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════════
let isDragging=false,pMouse={x:0,y:0},ldx=0,ldy=0;
// Outside rotation state
let rotX=0,rotY=0,velX=0,velY=0;
// Inside look-around state
let camYaw=0,camPitch=0,camVY=0,camVP=0;
let autoRotY=0,autoOn=true,idleT=null;

const Z_START=3.8,Z_ENTRY=0.9,Z_NUC=-0.5;
let targetZ=Z_START;

function stopAuto(){autoOn=false;clearTimeout(idleT);idleT=setTimeout(()=>autoOn=true,4500);}

const DAMP=.88,LOOK_DAMP=.85;
const D_OUT=.009,D_IN=.007;

function applyDelta(dx,dy,nb){
  // nb: 0=outside rotation, 1=inside look-around
  if(nb<1){rotY+=dx*D_OUT*(1-nb);rotX+=dy*D_OUT*(1-nb);}
  if(nb>0){
    camYaw  -=dx*D_IN*nb;
    camPitch-=dy*D_IN*nb;
    camPitch=Math.max(-1.25,Math.min(1.25,camPitch));
  }
}

window.addEventListener('mousedown',e=>{
  if(e.target.closest('.lbl')||e.target.closest('#card'))return; // let labels & card handle their own events
  isDragging=true;pMouse={x:e.clientX,y:e.clientY};ldx=ldy=0;
  velX=velY=camVY=camVP=0;
  document.body.classList.add('dragging');stopAuto();
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  ldx=e.clientX-pMouse.x;ldy=e.clientY-pMouse.y;
  applyDelta(ldx,ldy,_nb);
  pMouse={x:e.clientX,y:e.clientY};
});
window.addEventListener('mouseup',()=>{
  if(!isDragging)return;
  isDragging=false;
  const nb=_nb;
  velY=ldx*D_OUT*(1-nb);velX=ldy*D_OUT*(1-nb);
  camVY=-ldx*D_IN*nb;camVP=-ldy*D_IN*nb;
  document.body.classList.remove('dragging');
});

let pTouch=null,pPinch=null;
window.addEventListener('touchstart',e=>{
  if(e.target.closest('.lbl')||e.target.closest('#card'))return;
  if(e.touches.length===1){pTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};velX=velY=camVY=camVP=0;}
  if(e.touches.length===2)pPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  stopAuto();
},{passive:true});
window.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&pTouch){
    ldx=e.touches[0].clientX-pTouch.x;ldy=e.touches[0].clientY-pTouch.y;
    applyDelta(ldx,ldy,_nb);
    pTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if(e.touches.length===2&&pPinch!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    targetZ=Math.min(Z_START+2,Math.max(Z_NUC,targetZ+(pPinch-d)*.012));pPinch=d;
  }
},{passive:true});
window.addEventListener('touchend',()=>{velY=ldx*D_OUT*(1-_nb);velX=ldy*D_OUT*(1-_nb);camVY=-ldx*D_IN*_nb;camVP=-ldy*D_IN*_nb;pTouch=null;pPinch=null;});

window.addEventListener('wheel',e=>{
  e.preventDefault();
  const spd=camera.position.z<Z_ENTRY?.003:.006;
  targetZ=Math.min(Z_START+2,Math.max(Z_NUC,targetZ+e.deltaY*spd));
  document.getElementById('hint').style.opacity='0';
},{passive:false});
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  resizeLC();
});

setTimeout(()=>document.getElementById('hint').style.opacity='0',5500);

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function ss(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t);}
function lerp(a,b,t){return a+(b-a)*t;}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}

// Live nav blend value (used in event handlers)
let _nb=0;

// Draw glow line: 3-pass (outer glow, mid, core)
function drawGlowLine(x0,y0,x1,y1,rgb,alpha,width=1){
  // Outer glow
  lctx.beginPath();lctx.moveTo(x0,y0);lctx.lineTo(x1,y1);
  lctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${(alpha*.18).toFixed(3)})`;
  lctx.lineWidth=width*5;lctx.stroke();
  // Mid
  lctx.beginPath();lctx.moveTo(x0,y0);lctx.lineTo(x1,y1);
  lctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${(alpha*.45).toFixed(3)})`;
  lctx.lineWidth=width*2;lctx.stroke();
  // Core
  lctx.beginPath();lctx.moveTo(x0,y0);lctx.lineTo(x1,y1);
  lctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha.toFixed(3)})`;
  lctx.lineWidth=width*.7;lctx.stroke();
}

// Draw curved thread (quadratic bezier)
function drawThread(x0,y0,x1,y1,rgb,alpha,t){
  const mx=(x0+x1)/2+(y0-y1)*.10,my=(y0+y1)/2+(x1-x0)*.10;
  lctx.setLineDash([]);
  // Glow
  lctx.beginPath();lctx.moveTo(x0,y0);lctx.quadraticCurveTo(mx,my,x1,y1);
  lctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${(alpha*.15).toFixed(3)})`;
  lctx.lineWidth=4;lctx.stroke();
  // Mid
  lctx.beginPath();lctx.moveTo(x0,y0);lctx.quadraticCurveTo(mx,my,x1,y1);
  lctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${(alpha*.40).toFixed(3)})`;
  lctx.lineWidth=1.4;lctx.stroke();
  // Core (animated dash)
  lctx.beginPath();lctx.moveTo(x0,y0);lctx.quadraticCurveTo(mx,my,x1,y1);
  lctx.setLineDash([4,8]);lctx.lineDashOffset=-t*6;
  lctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${(alpha*.75).toFixed(3)})`;
  lctx.lineWidth=.7;lctx.stroke();
  lctx.setLineDash([]);
}

// ═══════════════════════════════════════════════════════════════
//  ANIMATE
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
let shownInside=false;

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Camera Z (hard stop)
  targetZ=Math.max(Z_NUC,targetZ);
  camera.position.z+=(targetZ-camera.position.z)*.07;
  const cz=camera.position.z;

  // Transition values
  const outsideT=ss(Z_ENTRY,Z_START*.9,cz); // 1=outside, 0=inside
  const insideT=1-outsideT;
  const navBlend=ss(0.40,0.80,insideT);     // 0=pivot-rotate, 1=look-around
  _nb=navBlend;

  const memT=Math.sin(Math.max(0,Math.min(1,(Z_START*.9-cz)/(Z_START*.9-Z_ENTRY)))*Math.PI);

  // FOV: widen when inside for immersion
  camera.fov=lerp(52,70,insideT);
  camera.updateProjectionMatrix();

  // ── Rotation/look ────────────────────────────────────────────
  if(!isDragging){
    // Outside inertia
    velX*=DAMP;velY*=DAMP;rotX+=velX;rotY+=velY;
    // Inside inertia
    camVY*=LOOK_DAMP;camVP*=LOOK_DAMP;
    camYaw+=camVY;camPitch+=camVP;
    camPitch=Math.max(-1.25,Math.min(1.25,camPitch));
  }
  if(autoOn){
    // Auto-rotation blends: outside=pivot, inside=very slow pivot drift
    autoRotY+=lerp(.0038,.0008,navBlend);
  }
  // Apply pivot rotation (fades out as we go inside)
  pivot.rotation.x=rotX*(1-navBlend)+Math.sin(t*.12)*.018;
  pivot.rotation.y=(rotY+autoRotY)*(1-navBlend)+autoRotY*navBlend;
  // Apply camera look-around (fades in as we go inside)
  camera.rotation.y=lerp(0,camYaw,navBlend);
  camera.rotation.x=lerp(0,camPitch,navBlend);

  // ── Breathing ────────────────────────────────────────────────
  const breath=1+Math.sin(t*.55)*.013+Math.sin(t*.91)*.006;

  // ── Update materials ─────────────────────────────────────────
  orbMat.uniforms.uT.value=t;orbMat.uniforms.uOT.value=outsideT;
  orb.scale.setScalar(breath);
  halos.forEach((h,i)=>{h.material.uniforms.uT.value=t;h.material.uniforms.uOT.value=outsideT;h.scale.setScalar(hScales[i]*breath);});
  memMat.uniforms.uMT.value=memT;
  clouds.forEach(c=>{c.material.uniforms.uT.value=t;c.material.uniforms.uIT.value=insideT;});
  glowMats.forEach(m=>{m.uniforms.uT.value=t;m.uniforms.uIT.value=insideT;});

  // ── Canvas blur + aura ───────────────────────────────────────
  orbC.style.filter=`blur(${lerp(5,18,outsideT).toFixed(1)}px)`;
  const aE=document.getElementById('aura');
  aE.style.opacity=outsideT.toFixed(3);
  const zf=3.8/Math.max(cz,.5);
  const sz=(80*breath*zf).toFixed(1);
  aE.style.width=sz+'vmin';aE.style.height=sz+'vmin';

  // ── Background ───────────────────────────────────────────────
  document.body.style.background=`rgb(${Math.round(244-insideT*8)},${Math.round(244-insideT*10)},${Math.round(246-insideT*6)})`;

  // ── Stage hints ───────────────────────────────────────────────
  if(insideT>.65&&!shownInside){shownInside=true;
    document.getElementById('dhint').style.color='rgba(162,105,120,.58)';
    document.getElementById('sbadge').style.color='rgba(142,112,122,.52)';
    setTimeout(()=>document.getElementById('dhint').style.color='rgba(162,105,120,0)',3000);
  }
  if(insideT<.15){shownInside=false;document.getElementById('sbadge').style.color='rgba(142,112,122,0)';}

  // ══════════════════════════════════════════════════════════════
  //  LABELS
  // ══════════════════════════════════════════════════════════════
  const W=window.innerWidth,H=window.innerHeight;
  lblReg.forEach(r=>{r.screenPos=projectLbl(r.pivotLocal);});

  // Outer patterns
  lblReg.forEach((r,id)=>{
    if(r.type!=='op')return;
    const {x,y,df}=r.screenPos;
    r.el.style.left=x.toFixed(1)+'px';r.el.style.top=y.toFixed(1)+'px';
    r.el.style.opacity=(outsideT*df).toFixed(3);
    r.el.style.pointerEvents=outsideT>.25?'auto':'none';
  });
  // Person labels
  lblReg.forEach((r,id)=>{
    if(r.type!=='person')return;
    const {x,y}=r.screenPos;
    r.el.style.left=x.toFixed(1)+'px';r.el.style.top=y.toFixed(1)+'px';
    const fA=focusedPerson&&focusedPerson!==id?.18:1;
    r.el.style.opacity=(insideT*fA).toFixed(3);
    r.el.style.pointerEvents=insideT>.35?'auto':'none';
  });
  // Inner patterns
  lblReg.forEach((r,id)=>{
    if(r.type!=='ip')return;
    const {x,y}=r.screenPos;
    r.el.style.left=x.toFixed(1)+'px';r.el.style.top=y.toFixed(1)+'px';
    const fA=focusedPerson&&focusedPerson!==r.personId?.12:.72;
    r.el.style.opacity=(insideT*fA).toFixed(3);
  });

  // ══════════════════════════════════════════════════════════════
  //  LINE CANVAS
  // ══════════════════════════════════════════════════════════════
  lctx.clearRect(0,0,W,H);
  lctx.lineCap='round';

  // Outside: connectors from just past orb edge to just before label text
  if(outsideT>.02){
    const cx=W/2,cy=H/2;
    OUTER_PATTERNS.forEach(p=>{
      const r=lblReg.get(p.id);if(!r)return;
      const {x,y,df}=r.screenPos;
      const alpha=outsideT*df*.42;if(alpha<.01)return;
      const x0=cx+(x-cx)*.52,y0=cy+(y-cy)*.52;
      const x1=cx+(x-cx)*.88,y1=cy+(y-cy)*.88;
      drawGlowLine(x0,y0,x1,y1,[155,90,108],alpha,1);
    });
  }

  // Inside: person fields + person→pattern threads
  if(insideT>.02){
    PEOPLE.forEach((p,i)=>{
      const pr=lblReg.get(p.id);if(!pr)return;
      const {x:px,y:py}=pr.screenPos;
      const isFoc=!focusedPerson||focusedPerson===p.id;
      const fieldAlpha=insideT*(isFoc?.18:.04);
      const threadAlpha=insideT*(isFoc?.58:.10);
      const rgb=hexToRgb(p.color);

      // Person field glow
      if(fieldAlpha>.01){
        const fieldR=isFoc?75:40;
        const g=lctx.createRadialGradient(px,py,0,px,py,fieldR);
        g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${fieldAlpha.toFixed(3)})`);
        g.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
        lctx.fillStyle=g;lctx.beginPath();lctx.arc(px,py,fieldR,0,Math.PI*2);lctx.fill();
      }

      // Person → pattern threads
      p.patterns.forEach((_,j)=>{
        const patR=lblReg.get(p.id+'_'+j);if(!patR)return;
        const {x:qx,y:qy}=patR.screenPos;
        if(threadAlpha>.02) drawThread(px,py,qx,qy,rgb,threadAlpha,t);
      });
    });

    // Cross-person resonance lines (shared patterns between people)
    // Draw subtle links between people with similar patterns
    const resonancePairs=[
      ['mom','grandma'],[['partner','expart']],['mom','inner'],['mentor','therapist']
    ].flat();
    for(let i=0;i<PEOPLE.length-1;i+=3){
      const p1=PEOPLE[i],p2=PEOPLE[(i+2)%PEOPLE.length];
      const r1=lblReg.get(p1.id),r2=lblReg.get(p2.id);
      if(!r1||!r2)continue;
      const alpha=insideT*.08*(focusedPerson?0:.6+.4);
      if(alpha<.01)continue;
      const rgb1=hexToRgb(p1.color);
      drawThread(r1.screenPos.x,r1.screenPos.y,r2.screenPos.x,r2.screenPos.y,rgb1,alpha*.5,t);
    }
  }

  renderer.render(scene,camera);
}
animate();
