<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relational Field</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f4f6; cursor: none; }
    canvas { display: block; position: fixed; inset: 0; cursor: none; z-index: 0; }
    #pills { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    .pill {
      position: absolute;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      border-radius: 4px;
      font: 400 10.5px system-ui, -apple-system, sans-serif;
      padding: 5px 10px;
      pointer-events: none;
      cursor: none;
      user-select: none;
      opacity: 0;
    }
    .pill.solo { background: rgba(238,237,244,0.93); border: 0.8px solid rgba(50,45,70,0.28); color: rgba(28,24,42,1); }
    .pill.pair { background: rgba(242,236,255,0.93); border: 0.8px solid rgba(100,72,170,0.36); color: rgba(58,30,110,1); }
    .pill.live { pointer-events: all; }
    .pill.solo.live:hover { border-color: rgba(50,45,70,0.58); background: rgba(230,228,242,0.97); }
    .pill.pair.live:hover { border-color: rgba(100,72,170,0.62); background: rgba(236,228,255,0.97); }

    /* ── floating detail card ─────────────────────────── */
    #card {
      position: fixed;
      width: 276px;
      background: #f7f6fb;
      border: 0.8px solid rgba(60,50,90,0.13);
      border-radius: 14px;
      overflow: hidden;
      z-index: 300;
      opacity: 0;
      transform: scale(0.94) translateY(8px);
      transition: opacity 0.16s ease, transform 0.16s ease;
      pointer-events: none;
      cursor: none;
    }
    #card.open { opacity: 1; transform: scale(1) translateY(0); pointer-events: all; }

    #card-top {
      padding: 13px 14px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    #card-kind {
      display: flex; align-items: center; gap: 5px;
      font: 400 8.5px system-ui; color: rgba(110,95,145,0.72);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    #card-kind-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(110,95,145,0.55); flex-shrink: 0;
    }
    #card.pair-mode #card-kind { color: rgba(88,48,148,0.75); }
    #card.pair-mode #card-kind-dot { background: rgba(88,48,148,0.55); }

    #card-close {
      width: 22px; height: 22px; border-radius: 50%;
      border: 0.7px solid rgba(60,50,90,0.12);
      background: rgba(60,50,90,0.05);
      color: rgba(60,50,90,0.45);
      font: 400 14px/22px system-ui;
      text-align: center;
      cursor: none; user-select: none;
    }
    #card-close:hover { background: rgba(60,50,90,0.10); color: rgba(60,50,90,0.70); }

    #card-body { padding: 8px 14px 16px; }

    #card-title {
      font: 500 15px/1.3 system-ui;
      color: rgba(16,12,26,1);
      margin: 9px 0 9px;
    }
    #card-desc {
      font: 400 12px/1.65 system-ui;
      color: rgba(38,32,58,0.82);
      margin-bottom: 14px;
    }
    .cs { margin-bottom: 11px; }
    .cs-label {
      font: 400 8px system-ui;
      color: rgba(110,95,145,0.62);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 5px;
    }
    .cs-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .cs-tag {
      font: 400 9.5px system-ui;
      color: rgba(38,32,58,0.72);
      background: rgba(60,50,90,0.06);
      border: 0.6px solid rgba(60,50,90,0.11);
      border-radius: 3px; padding: 3px 7px;
    }
    .cs-tag.person {
      font-weight: 500;
      color: rgba(14,12,22,0.82);
      background: rgba(14,12,22,0.07);
      border-color: rgba(14,12,22,0.14);
    }
    #card-feels {
      font: italic 11px/1.62 system-ui;
      color: rgba(80,65,115,0.68);
      border-top: 0.6px solid rgba(60,50,90,0.09);
      padding-top: 11px;
      margin-top: 2px;
    }

    /* ── dom cursor dot ─────────────────────────────────── */
    #cur {
      position: fixed; width: 7px; height: 7px;
      background: rgba(10,8,16,0.88); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .08s, height .08s;
    }
    #cur.big { width: 11px; height: 11px; background: rgba(10,8,16,0.78); }
    #cur.big::after {
      content: ''; position: absolute; inset: -5px; border-radius: 50%;
      border: 0.8px solid rgba(10,8,16,0.18);
    }
  </style>
</head>

    <div class="cs" id="cs-people"><div class="cs-label">related</div><div class="cs-tags" id="card-people"></div></div>

  </div>
</div>

<div id="cur"></div>

<script>

  'safe harbor': { kind:'solo', people:['Jake'], desc:'You instinctively designate one person as your emotional refuge, allowing yourself to relax in ways you rarely do elsewhere.', triggers:['conflict with others','feeling unheard','emotional exhaustion'], feels:'Relief. Like you can finally put something down.' },
  'low conflict': { kind:'solo', people:['Jake'], desc:'You bend, smooth over, and absorb discomfort rather than risk rupture — even when the cost is your own needs.', triggers:['raised voices','silence after disagreement','perceived disappointment'], feels:'A constant low hum of vigilance, always tracking the room\'s temperature.' },

  /* ── Sofia ─────────────────────────── */
  'mirroring': { kind:'solo', people:['Sofia'], desc:'You unconsciously take on the emotional tone, language, and even opinions of the people you care about most.', triggers:['desire for approval','fear of rejection','new relationship energy'], feels:'Like dissolving into the other person, then wondering where you went.' },
  'warmth exchange': { kind:'solo', people:['Sofia'], desc:'You give and receive affection through sustained presence and small consistent acts of care.', triggers:['feeling disconnected','emotional coldness nearby','need for closeness'], feels:'A quiet mutual understanding that you\'re both simply showing up.' },
  'softness': { kind:'solo', people:['Sofia'], desc:'An innate gentleness in how you hold others\' vulnerability — which sometimes masks how rarely you show your own.', triggers:['others in pain','tense situations','being needed'], feels:'Like being a container for everyone else\'s feelings.' },
  /* ── Priya ─────────────────────────── */

  'conditional worth': { kind:'solo', people:['Priya'], desc:'Your sense of lovability feels tied to performance — what you produce, achieve, or provide for others.', triggers:['failure','criticism','being surpassed'], feels:'Like you\'re constantly justifying your right to be here.' },
  'performance anxiety': { kind:'solo', people:['Priya'], desc:'A pervasive fear that if you stop delivering at a high level, the connection — or the love — will dissolve.', triggers:['stillness','perceived inadequacy','comparison with others'], feels:'Exhaustion from running a race that never ends and has no finish line.' },

  'humor shield': { kind:'solo', people:['Ethan'], desc:'You use wit and lightness to deflect from emotional exposure, keeping things safe through laughter.', triggers:['vulnerability in the air','direct personal questions','emotional intensity'], feels:'The laugh lands. But something underneath stays untouched.' },
  'surface depth': { kind:'solo', people:['Ethan'], desc:'You\'re engaging, curious, and warm — up to a certain depth. Then an invisible door quietly closes.', triggers:['real intimacy','being truly seen','conversations that get too close'], feels:'Standing at the edge of something and choosing, again, not to jump.' },

  'power play': { kind:'solo', people:['Marco'], desc:'You reestablish a sense of control in relationships when you feel destabilized, overlooked, or exposed.', triggers:['feeling powerless','perceived disrespect','emotional exposure'], feels:'Reaching for solid ground by shifting the weight in the room.' },

  'overwhelm triggers': { kind:'solo', people:['Luna'], desc:'Emotional intensity — yours or others\' — can cause a sudden shutdown or retreat that feels involuntary.', triggers:['high emotional stakes','conflict','feeling responsible for others\' pain'], feels:'A circuit breaker flipping off to protect the whole system.' },

  'emotional walls': { kind:'solo', people:['Alex'], desc:'You\'ve built a self-sufficient internal world where emotional dependency feels like a risk you\'d rather not take.', triggers:['vulnerability','past betrayals','someone getting close too fast'], feels:'Safety inside the wall. Loneliness too, but that\'s manageable.' },
  'mixed signals': { kind:'solo', people:['Alex'], desc:'You attract people toward you while simultaneously signaling you\'re unavailable, leaving relationships in a holding pattern.', triggers:['fear of commitment','desire for connection','internal ambivalence'], feels:'Standing in a doorway — neither fully inside nor out.' },
  'intimacy fear': { kind:'solo', people:['Alex'], desc:'True closeness triggers an alarm — not because you don\'t want it, but because of what it might cost you.', triggers:['being clearly seen','reciprocal vulnerability','love that asks something of you'], feels:'A contraction right when things start to feel most real.' },

  'losing self': { kind:'solo', people:['Maya'], desc:'In deep relationships, your own needs, preferences, and perspective slowly erode in favor of the other person\'s.', triggers:['strong personalities','fear of conflict','intense attachment'], feels:'Looking in the mirror and not quite recognizing who you\'ve become.' },
  /* ── Sam ────────────────────────────── */
  'avoidance': { kind:'solo', people:['Sam'], desc:'You navigate relationships by staying just beyond the reach of real vulnerability — close enough to feel connected, far enough to feel safe.', triggers:['intimacy','emotional demands','being asked to commit'], feels:'A constant, low-key retreat that looks a lot like independence.' },
  'withdrawal': { kind:'solo', people:['Sam'], desc:'Under pressure, you go inward and silent, cutting off contact as a form of self-protection without quite intending to.', triggers:['conflict','feeling misunderstood','emotional overwhelm'], feels:'Pulling all the drawbridges up at once.' },

  'passive aggression': { kind:'solo', people:['Jordan'], desc:'Unexpressed frustration finds its way out through indirect behavior — silence, delays, or subtle sabotage that never gets named.', triggers:['feeling powerless','resentment building','conflict avoidance'], feels:'Saying yes with your mouth while your body says no.' },
  'emotional unavailability': { kind:'solo', people:['Jordan'], desc:'You remain functionally present in relationships while keeping your emotional core carefully inaccessible.', triggers:['intimacy','being asked how you really feel','vulnerability from others'], feels:'Watching yourself from a slight distance, going through all the right motions.' },
  'stonewalling': { kind:'solo', people:['Jordan'], desc:'In conflict, you shut down completely — no response, no engagement, no resolution, just absence where a person should be.', triggers:['feeling flooded','sustained criticism','perceived attacks'], feels:'A wall going up so fast you don\'t even know you built it.' },
  /* ── River ──────────────────────────── */

  'self-sacrifice': { kind:'solo', people:['River'], desc:'You chronically deprioritize your own needs in service of others\', framing it as love rather than recognizing it as loss.', triggers:['others\' needs becoming visible','guilt','fear of being seen as selfish'], feels:'A kind of nobility that\'s slowly eating you alive.' },
  'nurturing': { kind:'solo', people:['River'], desc:'You find deep purpose in caring for others — a genuine gift that can also become a way of avoiding your own unmet needs.', triggers:['others\' vulnerability','being needed','emptiness when not in a caretaking role'], feels:'Most alive when someone else needs you. Unmoored when they don\'t.' },

  { name:'Ethan',  pos:[ 380,-680, 310], reveal:0, patterns:[ {label:'humor shield',offset:[-155,-85,60]},{label:'surface depth',offset:[130,-155,-40]},{label:'deflection',offset:[-90,150,55]} ] },
  { name:'Marco',  pos:[-950, 310,-110], reveal:0, patterns:[ {label:'push-pull',offset:[190,-90,-50]},{label:'testing loyalty',offset:[-130,-155,65]},{label:'power play',offset:[-170,88,40]} ] },
  { name:'Luna',   pos:[ 120, -90,-760], reveal:0, patterns:[ {label:'freedom vs closeness',offset:[-215,-70,45]},{label:'overwhelm triggers',offset:[90,-180,-50]},{label:'disappearing',offset:[-115,160,60]} ] },
  { name:'Alex',   pos:[ 860, 140,-250], reveal:0, patterns:[ {label:'emotional walls',offset:[170,-125,45]},{label:'mixed signals',offset:[-125,-150,-60]},{label:'intimacy fear',offset:[135,120,75]} ] },
  { name:'Maya',   pos:[-240, 520,-580], reveal:0, patterns:[ {label:'empathic merger',offset:[-165,-105,50]},{label:'over-giving',offset:[115,-165,-45]},{label:'losing self',offset:[150,90,-55]} ] },
  { name:'Sam',    pos:[ 750, 480,-450], reveal:0, patterns:[ {label:'avoidance',offset:[175,-100,55]},{label:'withdrawal',offset:[-135,-135,-50]},{label:'quiet distance',offset:[105,155,65]} ] },
  { name:'Lea',    pos:[-680,-600, 260], reveal:0, patterns:[ {label:'over-attachment',offset:[165,-120,50]},{label:'need for validation',offset:[-115,-148,-60]},{label:'clinginess',offset:[138,115,70]} ] },
  { name:'Jordan', pos:[ 420, 650,-160], reveal:0, patterns:[ {label:'passive aggression',offset:[-160,-95,55]},{label:'emotional unavailability',offset:[115,-158,-45]},{label:'stonewalling',offset:[-128,132,60]} ] },
  { name:'River',  pos:[-380, 680, 290], reveal:0, patterns:[ {label:'codependency',offset:[-170,-100,50]},{label:'self-sacrifice',offset:[115,-160,-45]},{label:'nurturing',offset:[142,95,-55]} ] },
];
const personMap={};
PEOPLE.forEach(p=>{personMap[p.name]=p;});

/* ═══════════════════════════════════════════════════════════
   PAIRS
   ═══════════════════════════════════════════════════════════ */
const PAIRS_RAW=[
  {a:'Jake',b:'Sofia',   patterns:[{label:'safe bond',mo:[60,-80,30]},{label:'mutual warmth',mo:[-70,50,-20]},{label:'emotional reliance',mo:[30,110,45]}]},
  {a:'Jake',b:'Ethan',   patterns:[{label:'comfort without depth',mo:[50,-60,25]},{label:'humor bridge',mo:[-65,45,-20]},{label:'safe distance',mo:[30,90,40]}]},
  {a:'Jake',b:'Luna',    patterns:[{label:'attachment anxiety',mo:[55,-70,30]},{label:'push-pull distance',mo:[-60,40,-25]},{label:'tangled signals',mo:[25,100,40]}]},
  {a:'Sofia',b:'Maya',   patterns:[{label:'empathic enmeshment',mo:[50,-65,30]},{label:'over-giving loop',mo:[-60,50,-20]},{label:'blurred boundaries',mo:[30,100,40]}]},
  {a:'Sofia',b:'Lea',    patterns:[{label:'validation spiral',mo:[55,-70,25]},{label:'mirror dynamic',mo:[-60,45,-20]},{label:'neediness exchange',mo:[30,95,40]}]},
  {a:'Marco',b:'Alex',   patterns:[{label:'power struggle',mo:[50,-65,30]},{label:'trust deficit',mo:[-60,50,-25]},{label:'dominance clash',mo:[30,95,40]}]},
  {a:'Marco',b:'Ethan',  patterns:[{label:'avoidance pact',mo:[55,-70,25]},{label:'deflection mirror',mo:[-65,45,-20]},{label:'surface bond',mo:[30,100,40]}]},
  {a:'Luna',b:'Sam',     patterns:[{label:'freedom pact',mo:[50,-65,30]},{label:'parallel loneliness',mo:[-60,50,-20]},{label:'mutual avoidance',mo:[30,95,40]}]},
  {a:'Priya',b:'Jordan', patterns:[{label:'unmet needs',mo:[55,-70,30]},{label:'performance vs withdrawal',mo:[-65,50,-25]},{label:'emotional mismatch',mo:[30,100,40]}]},
  {a:'Maya',b:'River',   patterns:[{label:'caretaker loop',mo:[50,-65,30]},{label:'self-sacrifice bond',mo:[-60,50,-20]},{label:'codependent warmth',mo:[30,95,40]}]},
  {a:'Sam',b:'River',    patterns:[{label:'quiet withdrawal',mo:[55,-70,25]},{label:'peaceful disconnect',mo:[-65,45,-20]},{label:'unspoken distance',mo:[30,100,40]}]},
];
function pairKey(a,b){return[a,b].sort().join('||');}
const PAIRS={};
PAIRS_RAW.forEach(p=>{PAIRS[pairKey(p.a,p.b)]={...p,reveal:0};});

/* ═══════════════════════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════════════════════ */
const BG='#f4f4f6',COUNT=260,COUNT_FILL=480,RANGE=1200,CONNECT_R=208,MAX_LINES=6;
const ATTRACT_F=0.014,SPRING=0.05,DAMP=0.80,AUTO_ROT=0.00052;
const REVEAL_R=175,PAIR_R=230,REVEAL_SPD=0.045,PIN_MS=5000;

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
let W,H,camTheta=0,camPhi=0.15,camFov=500;
let dragging=false,dSX=0,dSY=0,dT0=0,dP0=0;
let particles=[],fillDots=[];
const mouse={x:-9999,y:-9999};
const pinnedPersons={},pinnedPairs={};
const hoveredPersons=new Set(),hoveredPairs=new Set();

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const pillBox=document.getElementById('pills');
const card=document.getElementById('card');
const cardKindTxt=document.getElementById('card-kind-txt');
const cardTitle=document.getElementById('card-title');
const cardDesc=document.getElementById('card-desc');
const cardTriggers=document.getElementById('card-triggers');
const cardPeople=document.getElementById('card-people');
const cardFeels=document.getElementById('card-feels');
const cardClose=document.getElementById('card-close');
const curDot=document.getElementById('cur');

/* ═══════════════════════════════════════════════════════════
   FLOATING CARD
   ═══════════════════════════════════════════════════════════ */
function showCard(label,ex,ey){
  const d=PD[label]; if(!d) return;
  card.className=d.kind==='pair'?'pair-mode':'';
  cardKindTxt.textContent=d.kind==='pair'?'shared pattern':'pattern';
  cardTitle.textContent=label;
  cardDesc.textContent=d.desc;
  cardTriggers.innerHTML=d.triggers.map(t=>`<span class="cs-tag">${t}</span>`).join('');
  cardPeople.innerHTML=d.people.map(p=>`<span class="cs-tag person">${p}</span>`).join('');
  cardFeels.textContent=d.feels;
  // position
  const cw=276,ch=310,mg=14;
  let x=ex+18, y=ey-ch/2;
  if(x+cw>W-mg) x=ex-cw-18;
  y=Math.max(mg,Math.min(y,H-ch-mg));
  card.style.left=x+'px'; card.style.top=y+'px';
  requestAnimationFrame(()=>card.classList.add('open'));
}
function hideCard(){ card.classList.remove('open'); }

cardClose.addEventListener('mousedown',e=>{e.stopPropagation();hideCard();});
card.addEventListener('mousedown',e=>e.stopPropagation());
window.addEventListener('keydown',e=>{if(e.key==='Escape')hideCard();});

/* ═══════════════════════════════════════════════════════════
   DOM PILLS
   ═══════════════════════════════════════════════════════════ */
function makePill(label,kind,key){
  const el=document.createElement('div');
  el.className=`pill ${kind}`;
  el.textContent=label;
  el._key=key; el._kind=kind; el._label=label;
  pillBox.appendChild(el);
  el.addEventListener('mouseenter',()=>{
    curDot.classList.add('big');
    kind==='solo'?hoveredPersons.add(key):hoveredPairs.add(key);
  });
  el.addEventListener('mouseleave',()=>{
    curDot.classList.remove('big');
    kind==='solo'?hoveredPersons.delete(key):hoveredPairs.delete(key);
  });
  el.addEventListener('mousedown',e=>{
    e.stopPropagation();
    if(kind==='solo') pinnedPersons[key]=Date.now()+PIN_MS;
    else              pinnedPairs[key]=Date.now()+PIN_MS;
    showCard(label,e.clientX,e.clientY);
  });
  return el;
}

PEOPLE.forEach(p=>p.patterns.forEach(pat=>{pat._el=makePill(pat.label,'solo',p.name);}));
Object.entries(PAIRS).forEach(([k,pair])=>pair.patterns.forEach(pat=>{pat._el=makePill(pat.label,'pair',k);}));
pillBox.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});

/* ═══════════════════════════════════════════════════════════
   CURSOR
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('mousemove',e=>{
  curDot.style.left=e.clientX+'px'; curDot.style.top=e.clientY+'px';
});

/* ═══════════════════════════════════════════════════════════
   PARTICLES
   ═══════════════════════════════════════════════════════════ */
function rp(){return[(Math.random()-.5)*RANGE*2,(Math.random()-.5)*RANGE*2,(Math.random()-.5)*RANGE*2];}
function rs(){const r=Math.random();if(r<.6)return.5+Math.random()*1.2;if(r<.88)return 1.8+Math.random()*2;return 4+Math.random()*4.5;}
function mkP(){const[rx,ry,rz]=rp();return{rx,ry,rz,x:rx,y:ry,z:rz,vx:0,vy:0,size:rs(),sx:0,sy:0,_pr:null};}
function mkF(){const[rx,ry,rz]=rp();return{rx,ry,rz,size:.3+Math.random()*1.1,alpha:.08+Math.random()*.18,sx:0,sy:0,_pr:null};}

function init(){
  W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
  particles=Array.from({length:COUNT},mkP);
  fillDots =Array.from({length:COUNT_FILL},mkF);
}

/* ═══════════════════════════════════════════════════════════
   PROJECTION
   ═══════════════════════════════════════════════════════════ */
function proj(wx,wy,wz){
  const cT=Math.cos(camTheta),sT=Math.sin(camTheta);
  const x1=wx*cT+wz*sT,y1=wy,z1=-wx*sT+wz*cT;
  const cP=Math.cos(camPhi),sP=Math.sin(camPhi);
  const x2=x1,y2=y1*cP-z1*sP,z2=y1*sP+z1*cP;
  const dz=z2+RANGE+camFov,sc=camFov/Math.max(dz,40);
  return{sx:W/2+x2*sc,sy:H/2+y2*sc,scale:sc,pz:z2};
}

/* ═══════════════════════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('mousemove',e=>{
  if(dragging){camTheta=dT0+(e.clientX-dSX)*.007;camPhi=Math.max(-1.2,Math.min(1.2,dP0+(e.clientY-dSY)*.005));}
  mouse.x=e.clientX;mouse.y=e.clientY;
});
window.addEventListener('mousedown',e=>{
  if(card.classList.contains('open')&&!card.contains(e.target)) hideCard();
  dragging=true;dSX=e.clientX;dSY=e.clientY;dT0=camTheta;dP0=camPhi;
});
window.addEventListener('mouseup',()=>{dragging=false;});
window.addEventListener('mouseleave',()=>{dragging=false;mouse.x=-9999;mouse.y=-9999;});
window.addEventListener('wheel',e=>{camFov=Math.max(200,Math.min(2500,camFov-e.deltaY*.9));},{passive:true});
let t0=null;
window.addEventListener('touchstart',e=>{t0={x:e.touches[0].clientX,y:e.touches[0].clientY,theta:camTheta,phi:camPhi};mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchmove',e=>{e.preventDefault();const tx=e.touches[0].clientX,ty=e.touches[0].clientY;if(t0){camTheta=t0.theta+(tx-t0.x)*.007;camPhi=Math.max(-1.2,Math.min(1.2,t0.phi+(ty-t0.y)*.005));}mouse.x=tx;mouse.y=ty;},{passive:false});
window.addEventListener('touchend',()=>{t0=null;mouse.x=-9999;mouse.y=-9999;});
window.addEventListener('resize',init);

/* ═══════════════════════════════════════════════════════════
   DRAW
   ═══════════════════════════════════════════════════════════ */
function ln(x1,y1,x2,y2,col,lw){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawPersonPill(name,cx,cy,alpha){
  ctx.font='500 11px system-ui,-apple-system,sans-serif';
  const tw=ctx.measureText(name).width,pw=tw+18,ph=22,pr=5,px=cx-pw/2,py=cy-ph/2;
  rrect(px,py,pw,ph,pr);ctx.fillStyle=`rgba(14,12,20,${alpha.toFixed(3)})`;ctx.fill();
  ctx.fillStyle=`rgba(238,234,250,${alpha.toFixed(3)})`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(name,cx,cy);
}

function draw(){
  requestAnimationFrame(draw);
  camTheta+=AUTO_ROT;
  const now=Date.now();
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

  for(const p of fillDots){p._pr=proj(p.rx,p.ry,p.rz);p.sx=p._pr.sx;p.sy=p._pr.sy;}
  for(const p of particles){
    const pr=proj(p.x,p.y,p.z);p._pr=pr;p.sx=pr.sx;p.sy=pr.sy;
    const dsx=mouse.x-p.sx,dsy=mouse.y-p.sy,sd=Math.sqrt(dsx*dsx+dsy*dsy);
    if(sd<CONNECT_R*1.6&&sd>1){const f=(1-sd/(CONNECT_R*1.6))*ATTRACT_F*pr.scale;p.vx+=dsx*f;p.vy+=dsy*f;}
    p.vx+=(p.rx-p.x)*SPRING;p.vy+=(p.ry-p.y)*SPRING;p.vx*=DAMP;p.vy*=DAMP;p.x+=p.vx;p.y+=p.vy;
  }

  /* reveal logic */
  const near=[];
  for(const p of PEOPLE){const pr=proj(...p.pos),d=Math.hypot(mouse.x-pr.sx,mouse.y-pr.sy);if(d<PAIR_R)near.push({person:p,dist:d});}
  near.sort((a,b)=>a.dist-b.dist);
  let activePair=null;
  if(near.length>=2){const k=pairKey(near[0].person.name,near[1].person.name);if(PAIRS[k])activePair=PAIRS[k];}
  const pairNames=activePair?new Set([activePair.a,activePair.b]):new Set();
  const singleActive=near.find(o=>o.dist<REVEAL_R&&!pairNames.has(o.person.name));

  for(const p of PEOPLE){
    const on=pinnedPersons[p.name]&&now<pinnedPersons[p.name];
    const hov=hoveredPersons.has(p.name)&&p.reveal>0.05;
    const active=on||hov||(!pairNames.has(p.name)&&singleActive&&singleActive.person===p);
    p.reveal=active?Math.min(1,p.reveal+REVEAL_SPD):Math.max(0,p.reveal-REVEAL_SPD*.55);
  }
  for(const k in PAIRS){
    const pair=PAIRS[k];
    const on=pinnedPairs[k]&&now<pinnedPairs[k];
    const hov=hoveredPairs.has(k)&&pair.reveal>0.05;
    pair.reveal=(activePair===pair||on||hov)?Math.min(1,pair.reveal+REVEAL_SPD):Math.max(0,pair.reveal-REVEAL_SPD*.55);
  }
  const maxR=Math.max(...PEOPLE.map(p=>p.reveal),...Object.values(PAIRS).map(p=>p.reveal));

  /* field connectors */
  const fa=Math.max(0,1-maxR*1.5);
  if(fa>0.01){
    particles.map(p=>({p,d:Math.hypot(mouse.x-p.sx,mouse.y-p.sy)})).filter(o=>o.d<CONNECT_R).sort((a,b)=>a.d-b.d).slice(0,MAX_LINES).forEach(({p,d})=>{
      const t=(1-d/CONNECT_R)*fa;ln(p.sx,p.sy,mouse.x,mouse.y,`rgba(10,10,10,${(t*.78).toFixed(3)})`,0.8+(1-d/CONNECT_R));
    });
  }

  /* particles */
  [...fillDots.map(p=>({sx:p.sx,sy:p.sy,pz:p._pr.pz,sc:p._pr.scale,sz:p.size,al:p.alpha,f:true})),
   ...particles.map(p=>({sx:p.sx,sy:p.sy,pz:p._pr.pz,sc:p._pr.scale,sz:p.size,al:null,f:false}))]
  .sort((a,b)=>a.pz-b.pz).forEach(d=>{
    const s=Math.max(.3,d.sz*Math.min(2.2,.25+d.sc*2));const a=d.f?Math.min(1,d.al*d.sc*2.2):Math.min(.92,.18+d.sc*1.1);
    ctx.beginPath();ctx.arc(d.sx,d.sy,s/2,0,Math.PI*2);ctx.fillStyle=`rgba(10,10,10,${a.toFixed(3)})`;ctx.fill();
  });

  /* pair networks */
  for(const k in PAIRS){
    const pair=PAIRS[k];if(pair.reveal<=.01)continue;
    const rev=pair.reveal,pA=personMap[pair.a],pB=personMap[pair.b];
    const prA=proj(...pA.pos),prB=proj(...pB.pos);
    const spP=pair.patterns.map(pat=>proj((pA.pos[0]+pB.pos[0])/2+pat.mo[0],(pA.pos[1]+pB.pos[1])/2+pat.mo[1],(pA.pos[2]+pB.pos[2])/2+pat.mo[2]));
    for(const sp of spP) ln(mouse.x,mouse.y,sp.sx,sp.sy,`rgba(80,40,150,${(rev*.13).toFixed(3)})`,.5);
    for(const sp of spP){ln(prA.sx,prA.sy,sp.sx,sp.sy,`rgba(60,30,120,${(rev*.30).toFixed(3)})`,.6+rev*.4);ln(prB.sx,prB.sy,sp.sx,sp.sy,`rgba(60,30,120,${(rev*.30).toFixed(3)})`,.6+rev*.4);}
    ln(prA.sx,prA.sy,prB.sx,prB.sy,`rgba(50,22,105,${(rev*.40).toFixed(3)})`,.8+rev*.6);
    ln(mouse.x,mouse.y,prA.sx,prA.sy,`rgba(14,10,22,${(rev*.56).toFixed(3)})`,1+rev*.5);
    ln(mouse.x,mouse.y,prB.sx,prB.sy,`rgba(14,10,22,${(rev*.56).toFixed(3)})`,1+rev*.5);
    spP.forEach(sp=>{const ps=Math.max(2,3*sp.scale*1.8);ctx.beginPath();ctx.arc(sp.sx,sp.sy,ps,0,Math.PI*2);ctx.fillStyle=`rgba(80,40,160,${(rev*.68).toFixed(3)})`;ctx.fill();});
    for(const pr of[prA,prB]){ctx.beginPath();ctx.arc(pr.sx,pr.sy,Math.max(10,30*pr.scale),0,Math.PI*2);ctx.strokeStyle=`rgba(80,40,160,${(rev*.16).toFixed(3)})`;ctx.lineWidth=1;ctx.stroke();}
  }

  /* individual networks */
  for(const person of PEOPLE){
    if(person.reveal<=.01)continue;
    const rev=person.reveal,ppr=proj(...person.pos);
    const pp=person.patterns.map(pat=>proj(person.pos[0]+pat.offset[0],person.pos[1]+pat.offset[1],person.pos[2]+pat.offset[2]));
    for(const pd of pp) ln(mouse.x,mouse.y,pd.sx,pd.sy,`rgba(18,15,28,${(rev*.15).toFixed(3)})`,.5);
    for(const pd of pp) ln(ppr.sx,ppr.sy,pd.sx,pd.sy,`rgba(18,15,28,${(rev*.36).toFixed(3)})`,.6+rev*.5);
    ln(mouse.x,mouse.y,ppr.sx,ppr.sy,`rgba(14,10,22,${(rev*.58).toFixed(3)})`,1+rev*.6);
    ctx.beginPath();ctx.arc(ppr.sx,ppr.sy,Math.max(10,30*ppr.scale),0,Math.PI*2);ctx.strokeStyle=`rgba(18,14,30,${(rev*.14).toFixed(3)})`;ctx.lineWidth=1;ctx.stroke();
    pp.forEach(pd=>{const ps=Math.max(2,3*pd.scale*1.8);ctx.beginPath();ctx.arc(pd.sx,pd.sy,ps,0,Math.PI*2);ctx.fillStyle=`rgba(25,22,36,${(rev*.70).toFixed(3)})`;ctx.fill();});
  }

  /* person dots */
  for(const person of PEOPLE){
    const pr=proj(...person.pos),sz=Math.max(4.5,5.5*pr.scale*2.2);
    const anyR=Math.max(person.reveal,...Object.values(PAIRS).filter(p=>p.a===person.name||p.b===person.name).map(p=>p.reveal));
    if(anyR>.01){ctx.beginPath();ctx.arc(pr.sx,pr.sy,sz+5,0,Math.PI*2);ctx.fillStyle=`rgba(20,16,32,${(anyR*.10).toFixed(3)})`;ctx.fill();}
    ctx.beginPath();ctx.arc(pr.sx,pr.sy,sz,0,Math.PI*2);ctx.fillStyle='rgba(12,10,18,0.92)';ctx.fill();
  }

  /* person labels */
  for(const person of PEOPLE){
    const pr=proj(...person.pos);
    const anyR=Math.max(person.reveal,...Object.values(PAIRS).filter(p=>p.a===person.name||p.b===person.name).map(p=>p.reveal));
    drawPersonPill(person.name,pr.sx,pr.sy-26,0.50+anyR*0.50);
  }

  /* update DOM pill positions */
  for(const person of PEOPLE){
    const rev=person.reveal,vis=rev>0.04;
    person.patterns.forEach(pat=>{
      const pr2=proj(person.pos[0]+pat.offset[0],person.pos[1]+pat.offset[1],person.pos[2]+pat.offset[2]);
      const ps=Math.max(2,3*pr2.scale*1.8);
      pat._el.style.left=pr2.sx+'px'; pat._el.style.top=(pr2.sy+ps+14)+'px';
      pat._el.style.opacity=vis?(rev*.92).toFixed(3):'0';
      pat._el.classList.toggle('live',vis);
    });
  }
  for(const k in PAIRS){
    const pair=PAIRS[k],rev=pair.reveal,vis=rev>0.04;
    const pA=personMap[pair.a],pB=personMap[pair.b];
    pair.patterns.forEach(pat=>{
      const sp=proj((pA.pos[0]+pB.pos[0])/2+pat.mo[0],(pA.pos[1]+pB.pos[1])/2+pat.mo[1],(pA.pos[2]+pB.pos[2])/2+pat.mo[2]);
      const ps=Math.max(2,3*sp.scale*1.8);
      pat._el.style.left=sp.sx+'px'; pat._el.style.top=(sp.sy+ps+14)+'px';
      pat._el.style.opacity=vis?(rev*.94).toFixed(3):'0';
      pat._el.classList.toggle('live',vis);
    });
  }
}

init();
draw();
</script>
