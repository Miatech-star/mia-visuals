<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Branching</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: crosshair; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }
canvas { display: block; }

/* ── HUD ── */
#ui {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  color: rgba(167,139,250,0.35); font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; pointer-events: none; white-space: nowrap;
}
#layer-ui {
  position: fixed; top: 24px; right: 28px;
  color: rgba(167,139,250,0.30); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; pointer-events: none;
}

/* ── LABELS ── */
#label-layer {
  position: fixed; inset: 0; pointer-events: none; z-index: 10;
}
.node-label {
  position: absolute;
  display: flex; align-items: center; gap: 6px;
  padding: 5px 11px 5px 8px;
  background: rgba(8, 2, 28, 0.72);
  border: 1px solid rgba(139, 92, 246, 0.30);
  border-radius: 999px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: rgba(214, 202, 255, 0.90);
  font-size: 12.5px; font-weight: 350; letter-spacing: 0.04em;
  text-transform: lowercase; white-space: nowrap;
  box-shadow: 0 0 16px rgba(109,40,217,0.22), inset 0 1px 0 rgba(196,181,253,0.06);
  transform: translate(-50%, -22px);
  opacity: 0; transition: opacity 0.75s ease;
  pointer-events: none;
}
.node-label.visible { opacity: 1; }
.node-label-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
/* Root label — slightly larger */
.node-label.root-label {
  font-size: 14px; font-weight: 400; letter-spacing: 0.08em;
  border-color: rgba(196, 181, 253, 0.40);
  background: rgba(8, 2, 28, 0.80);
}

/* ── CARD — desktop side panel ── */
#card {
  position: fixed; top: 50%; right: 32px;
  transform: translateY(-50%) translateX(calc(100% + 40px));
  width: 290px; max-height: 80vh; overflow-y: auto;
  background: rgba(4, 1, 18, 0.92);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border: 1px solid rgba(139, 92, 246, 0.28);
  border-radius: 20px; padding: 24px;
  transition: transform 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
  opacity: 0; z-index: 20; pointer-events: none;
  scrollbar-width: none;
}
#card::-webkit-scrollbar { display: none; }
#card.open {
  transform: translateY(-50%) translateX(0);
  opacity: 1; pointer-events: auto;
}

/* ── FADE OVERLAY ── */
#fade-overlay {
  position: fixed; inset: 0; background: #000;
  pointer-events: none; z-index: 200;
  opacity: 1;
}
#fade-overlay.fading {
  transition: opacity 2.0s cubic-bezier(0.4, 0, 0.15, 1);
  opacity: 0;
}

/* ── CARD — mobile bottom sheet ── */
@media (max-width: 767px) {
  #card {
    top: auto; right: 0; left: 0; bottom: 0;
    width: 100%; max-height: 72vh;
    transform: translateY(100%);
    border-radius: 22px 22px 0 0;
    border-bottom: none;
    padding: 16px 20px 40px;
    /* Peek height = handle(26px) + tag(16px) + title line(22px) + spacing ≈ 74px */
  }
  /* Peek: just handle + tag + title peeking above fold */
  #card.peek {
    transform: translateY(calc(100% - 74px));
    pointer-events: auto;
    opacity: 1;
  }
  #card.open {
    transform: translateY(0);
  }
  #card-handle {
    display: block;
  }
  /* Collapse content sections when peeking, show only title area */
  #card.peek #card-insight,
  #card.peek .card-section,
  #card.peek .card-divider,
  #card.peek #card-close { display: none; }
  #card.peek #card-title { margin-bottom: 0; }
  /* Expand hint on peek strip */
  #card-peek-hint { display: flex; }
}
#card-handle {
  display: none;
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(139,92,246,0.35);
  margin: 0 auto 12px;
  cursor: pointer;
  transition: background 0.2s;
}
#card-handle:hover { background: rgba(167,139,250,0.55); }
/* Peek expand hint — chevron + "tap to expand" */
#card-peek-hint {
  display: none;
  align-items: center; gap: 5px;
  color: rgba(139,92,246,0.50);
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  pointer-events: none; white-space: nowrap;
}

#card-close {
  position: absolute; top: 14px; right: 16px;
  background: none; border: none; cursor: pointer;
  color: rgba(167,139,250,0.45); font-size: 15px; line-height: 1;
  transition: color 0.2s; z-index: 2;
}
#card-close:hover { color: rgba(196,181,253,0.9); }

.card-tag {
  font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(139,92,246,0.65); margin-bottom: 10px;
}
#card-title {
  font-size: 16px; font-weight: 500; color: rgba(221, 214, 254, 0.95);
  line-height: 1.3; margin-bottom: 14px; padding-right: 20px;
}
#card-insight {
  font-size: 12.5px; line-height: 1.65; color: rgba(196,181,253,0.72);
  margin-bottom: 18px; font-style: italic;
}
.card-section { margin-bottom: 14px; }
.card-section-label {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(139,92,246,0.55); margin-bottom: 6px;
}
.card-section p, .card-section li {
  font-size: 11.5px; color: rgba(196,181,253,0.62); line-height: 1.6;
}
.card-section ul { list-style: none; padding: 0; }
.card-section ul li::before { content: "·  "; color: rgba(139,92,246,0.55); }
.card-divider { height: 1px; background: rgba(139,92,246,0.15); margin: 16px 0; }

/* ── SMOOTH THEME TRANSITIONS ── */
body, #ui, #layer-ui { transition: background 0.55s ease, color 0.55s ease; }
.node-label {
  transition: opacity 0.75s ease, background 0.45s ease, border-color 0.45s ease,
              color 0.45s ease, box-shadow 0.45s ease;
}
#card {
  transition: transform 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease,
              background 0.45s ease, border-color 0.45s ease;
}

/* ── THEME TOGGLE ── */
#theme-toggle {
  position: fixed; top: 22px; left: 22px;
  width: 48px; height: 26px;
  background: rgba(55,18,95,0.28);
  border: 1px solid rgba(139,92,246,0.32);
  border-radius: 999px; cursor: pointer; z-index: 30;
  transition: background 0.5s ease, border-color 0.5s ease;
  padding: 0; outline: none; display: flex; align-items: center;
}
#theme-toggle::after {
  content: ''; display: block;
  width: 18px; height: 18px; border-radius: 50%;
  margin-left: 3px; flex-shrink: 0;
  background: rgba(196,181,253,0.88);
  transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1), background 0.45s ease;
}
body.light-mode #theme-toggle {
  background: rgba(238,228,235,0.72);
  border-color: rgba(190,155,168,0.42);
}
body.light-mode #theme-toggle::after {
  transform: translateX(22px);
  background: rgba(155,80,108,0.80);
}

/* ── NEON CANVAS OVERLAY (light mode only) ── */
#neon-canvas {
  display: none;
  position: fixed; inset: 0;
  pointer-events: none; z-index: 5;
}
body.light-mode #neon-canvas { display: block; }

/* ── LIGHT MODE ── */
body.light-mode { background: #f4f4f6; }
body.light-mode #ui        { color: rgba(125,82,93,0.40); }
body.light-mode #layer-ui  { color: rgba(125,82,93,0.32); }

body.light-mode .node-label {
  background: rgba(250,246,248,0.90);
  border-color: rgba(188,155,165,0.30);
  color: rgba(56,36,46,0.88);
  box-shadow: 0 1px 10px rgba(160,118,135,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
  text-shadow: none;
}
body.light-mode .node-label.root-label { border-color: rgba(188,155,165,0.45); }

body.light-mode #card {
  background: rgba(250,246,248,0.92);
  border-color: rgba(195,165,175,0.28);
}
body.light-mode .card-tag          { color: rgba(155,88,108,0.65); }
body.light-mode #card-title        { color: rgba(44,26,36,0.92); }
body.light-mode #card-insight      { color: rgba(70,50,58,0.72); }
body.light-mode .card-section-label{ color: rgba(125,80,95,0.55); }
body.light-mode .card-section p,
body.light-mode .card-section li   { color: rgba(85,60,70,0.68); }
body.light-mode .card-section ul li::before { color: rgba(155,88,108,0.55); }
body.light-mode .card-divider      { background: rgba(190,158,168,0.18); }
body.light-mode #card-close        { color: rgba(125,82,93,0.45); }
body.light-mode #card-handle       { background: rgba(188,155,168,0.32); }
body.light-mode #card-peek-hint    { color: rgba(125,82,93,0.45); }
</style>
</head>
<body>
<canvas id="neon-canvas"></canvas>
<button id="theme-toggle" aria-label="Toggle light/dark mode"></button>
<div id="fade-overlay"></div>
<div id="ui">drag to tilt · scroll to traverse · click nodes to explore</div>
<div id="layer-ui">LAYER 1 · 3</div>
<div id="label-layer"></div>

    <ul id="card-triggers"></ul>
  </div>
  <div class="card-divider" id="card-div1"></div>
  <div class="card-section" id="card-s-origin">
    <div class="card-section-label">Origin</div>
    <p id="card-origin"></p>
  </div>
  <div class="card-section" id="card-s-themes">
    <div class="card-section-label">Themes</div>
    <p id="card-themes"></p>
  </div>
</div>

// Frame the camera squarely on the active generation (endX cluster).
// endX lands at ~60 % from the left edge — slightly right of centre so labels
// have natural breathing room on the right and incoming strands appear as
// context on the left without competing equally for focus.
// The previous generation is not explicitly kept in view; it recedes naturally.
function camScrollTarget(origX, endX){
  const fovRad = 50 * Math.PI / 180;
  const halfW  = CAM_Z_FAR * Math.tan(fovRad / 2) * (window.innerWidth / window.innerHeight);
  // NDC offset: 0.20 puts endX at 60 % from left (NDC = 0.20 → screen = 60 %)
  return endX - halfW * 0.20;
}

  return new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide});
}

function strandRGB(s){ const c=s.lightCols[2]; return [c.r*255|0, c.g*255|0, c.b*255|0]; }

function drawNeonStrand(s){
  if(s.gone)return;
  const aMul = s.closing ? s.closingAlpha : 1.0;
  if(aMul<0.02)return;
  const maxT=Math.min(s.progress,1.0);
  if(maxT<0.01)return;

  const W=window.innerWidth, H=window.innerHeight, N=32;
  const pts=[];
  for(let i=0;i<=N;i++){
    const t=(i/N)*maxT;
    const p=s.curve.getPointAt(t);
    const v=p.clone().project(camera);
    if(v.z>1)return;
    pts.push([(v.x*.5+.5)*W,(-v.y*.5+.5)*H]);
  }
  if(pts.length<2)return;

  const [r,g,b]=strandRGB(s);
  neonCtx.lineCap='round'; neonCtx.lineJoin='round';

  // ── Pass 1: colored atmospheric glow ──────────────────
  // Single full-path stroke with shadowBlur — the blurred shadow IS the halo.
  // No bands, no hard contour: just a Gaussian soft spread of the vivid color.
  neonCtx.save();
  neonCtx.shadowBlur  = 22;
  neonCtx.shadowColor = `rgba(${r},${g},${b},${(.92*aMul).toFixed(3)})`;
  neonCtx.strokeStyle = `rgba(${r},${g},${b},${(.28*aMul).toFixed(3)})`;
  neonCtx.lineWidth   = 2.2;
  neonCtx.beginPath();
  pts.forEach(([x,y],i)=>i===0?neonCtx.moveTo(x,y):neonCtx.lineTo(x,y));
  neonCtx.stroke();
  neonCtx.restore();

  // ── Pass 2: white incandescent core ───────────────────
  // Per-segment for taper; minimal shadowBlur just slightly softens the edge.
  neonCtx.save();
  neonCtx.shadowBlur  = 4;
  neonCtx.shadowColor = `rgba(255,242,255,${(.55*aMul).toFixed(3)})`;
  for(let i=1;i<pts.length;i++){
    const tMid=(i-.5)/(pts.length-1);
    const tap=Math.pow(Math.sin(tMid*Math.PI),.52);
    neonCtx.beginPath();
    neonCtx.moveTo(pts[i-1][0],pts[i-1][1]); neonCtx.lineTo(pts[i][0],pts[i][1]);
    neonCtx.strokeStyle=`rgba(255,252,255,${(.90*aMul).toFixed(3)})`;
    neonCtx.lineWidth=1.6*tap;
    neonCtx.stroke();
  }
  neonCtx.restore();
}

function makeGlowTex(inner,outer,size=128){

  g.addColorStop(.5,outer.replace('1)','0.18)')); g.addColorStop(1,outer.replace('1)','0)'));
  ctx.fillStyle=g; ctx.fillRect(0,0,size,size); return new THREE.CanvasTexture(c);
}

// Light mode terminal halo: soft filled disc — NormalBlending creates a visible

function makeGlowDiscLight(color='rgba(210,80,160,1)',size=160){

// ══════════════════════════════════════════════════════════
//  TAPERED TUBE GEOMETRY
// ══════════════════════════════════════════════════════════
function taperedTube(curve,segments,maxR,radSeg,taperExp){
  const frames=curve.computeFrenetFrames(segments,false);
  const pos=new Float32Array((segments+1)*(radSeg+1)*3), uv=new Float32Array((segments+1)*(radSeg+1)*2), idx=[];
  let pi=0,ui=0;
  for(let i=0;i<=segments;i++){
    const t=i/segments, r=maxR*Math.pow(Math.sin(t*Math.PI),taperExp);
    const p=curve.getPointAt(t), N=frames.normals[i], B=frames.binormals[i];
    for(let j=0;j<=radSeg;j++){const a=(j/radSeg)*Math.PI*2,ca=Math.cos(a),sa=Math.sin(a);
      pos[pi++]=p.x+r*(ca*N.x+sa*B.x); pos[pi++]=p.y+r*(ca*N.y+sa*B.y); pos[pi++]=p.z+r*(ca*N.z+sa*B.z);
      uv[ui++]=t; uv[ui++]=j/radSeg;
    }
  }
  for(let i=0;i<segments;i++)for(let j=0;j<radSeg;j++){
    const a=(radSeg+1)*i+j,b=(radSeg+1)*(i+1)+j; idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3)); g.setAttribute('uv',new THREE.BufferAttribute(uv,2)); g.setIndex(idx); return g;
}

// ══════════════════════════════════════════════════════════
//  CURVE BUILDER
// ══════════════════════════════════════════════════════════
function buildCurve(s,e){
  const dx=e.x-s.x;
  return new THREE.CatmullRomCurve3([s.clone(),
    new THREE.Vector3(s.x+dx*rnd(.06,.20),s.y+(e.y-s.y)*rnd(.01,.10)+rnd(-1.2,1.2),s.z+rnd(-1.5,1.5)),
    new THREE.Vector3(s.x+dx*rnd(.38,.60),s.y+(e.y-s.y)*rnd(.32,.68)+rnd(-2,2),(s.z+e.z)*.5+rnd(-2,2)),
    new THREE.Vector3(s.x+dx*rnd(.78,.94),e.y+rnd(-.6,.6),e.z*rnd(.55,1)),
    e.clone()],false,'catmullrom',.5);
}

// ══════════════════════════════════════════════════════════
//  STRAND FACTORY
// ══════════════════════════════════════════════════════════
function makeStrand(origin,endpoint,{layer,kind,delay,nodeData}){
  const curve=buildCurve(origin,endpoint), geos=[], meshes=[], baseOps=[], baseCols=[], lightCols=[], lightOps=[];
  if(kind==='main'){
    const ci=Math.floor(Math.random()*MAIN.length);
    const color=MAIN[ci], lc=LM_MAIN[ci%LM_MAIN.length];
    const rad=rnd(.013,.022),op=rnd(.68,.90),SEG=80;
    // Light mode luminous structure (matches the YOU root node):
    //   lightCols[0] = white           — incandescent inner core
    //   lightCols[1] = near-white tint — body stays pale/almost-white (88% white + 12% vivid)
    //   lightCols[2] = vivid LM_MAIN   — color only emerges in the wide outer falloff
    const lcPale = lc.clone().lerp(new THREE.Color(1,1,1), 0.88); // near-white with subtle hue
    [{c:C.bright, lc:C.bright, o:op*.78, lo:0.92, r:rad*.20, rs:4, exp:.50},
     {c:color,    lc:lcPale,   o:op,     lo:0.42, r:rad,     rs:4, exp:.55},
     {c:color,    lc:lc,       o:op*.052,lo:0.16, r:rad*7,   rs:4, exp:.55}
    ].forEach(({c,lc:lco,o,lo,r,rs,exp})=>{
      const g=taperedTube(curve,SEG,r,rs,exp); g.setDrawRange(0,0);
      const m=new THREE.Mesh(g,mkMat(c,o)); scene.add(m);
      geos.push(g); meshes.push(m); baseOps.push(o); baseCols.push(c.clone()); lightCols.push(lco.clone()); lightOps.push(lo);
    });
  } else if(kind==='thick'){
    const ci=Math.floor(Math.random()*FIL.length);
    const color=FIL[ci], lc=LM_FIL[ci%LM_FIL.length];
    const rad=rnd(.004,.010),op=rnd(.22,.52),SEG=45;
    [{c:color,lc:lc,o:op,    lo:op*.55,r:rad,  exp:.50},
     {c:color,lc:lc,o:op*.044,lo:0.022, r:rad*5,exp:.50}
    ].forEach(({c,lc:lco,o,lo,r,exp})=>{
      const g=taperedTube(curve,SEG,r,3,exp); g.setDrawRange(0,0);
      const m=new THREE.Mesh(g,mkMat(c,o)); scene.add(m);
      geos.push(g); meshes.push(m); baseOps.push(o); baseCols.push(c.clone()); lightCols.push(lco.clone()); lightOps.push(lo);
    });
  } else {
    const ci=Math.floor(Math.random()*FIL.length);
    const color=FIL[ci], lc=LM_FIL[ci%LM_FIL.length];
    const op=rnd(.09,.28),PTS=68;
    const g=new THREE.BufferGeometry().setFromPoints(curve.getPoints(PTS)); g.setDrawRange(0,0);
    const m=new THREE.Line(g,mkMat(color,op,true)); scene.add(m);
    geos.push(g); meshes.push(m); baseOps.push(op); baseCols.push(color.clone()); lightCols.push(lc.clone()); lightOps.push(op*.42);
  }
  const s={curve,endPt:endpoint.clone(),layer,kind,geos,meshes,
    baseOps,baseCols,lightCols,lightOps,
    nodeData:nodeData||null,
    progress:0,growing:false,done:false,delay:delay??rnd(0,.60),duration:rnd(.85,1.65),
    timer:0,isLine:kind==='thin',termCore:null,termHalo:null,hitMesh:null,
    closing:false,closingAlpha:1,closingOps:null,gone:false};
  // If already in light mode, immediately apply light theme to the new strand
  if(lightMode){
    const bl=THREE.NormalBlending;
    meshes.forEach((m,i)=>{
      if(lightCols[i]) m.material.color.copy(lightCols[i]);
      m.material.opacity=lightOps[i]; m.material.blending=bl; m.material.needsUpdate=true;
      if(kind==='main') m.visible=false; // canvas draws main strands in light mode
    });
  }
  strands.push(s); return s;
}

// ══════════════════════════════════════════════════════════
//  FAN GENERATOR (accepts content array for main strands)
// ══════════════════════════════════════════════════════════
function spawnFan(origin,endX,{nThick,nThin},layerN,contentArray){
  const nMain=contentArray?contentArray.length:0;
  const dx=endX-origin.x, halfY=9.0, halfZ=5.5;
  const mains=[];
  for(let i=0;i<nMain;i++){
    const t=nMain===1?.5:i/(nMain-1);
    const angle=(t-.5)*2*(Math.PI*.244);
    const yEnd=origin.y+Math.tan(angle)*dx*rnd(.80,.97);
    const zEnd=origin.z+rnd(-halfZ*.60,halfZ*.60);
    const s=makeStrand(origin,new THREE.Vector3(endX,yEnd,zEnd),
      {layer:layerN,kind:'main',delay:rnd(0,.30),nodeData:contentArray[i]});
    mains.push(s);
  }
  for(let i=0;i<nThick;i++){
    const raw=(i/(nThick-1)-.5)*2;
    const angle=Math.sign(raw)*Math.pow(Math.abs(raw),.65)*Math.PI*.36;
    const reach=rnd(.58,1.02), len=dx*reach;
    const yEnd=origin.y+Math.tan(angle)*len+rnd(-1.4,1.4), zEnd=origin.z+rnd(-halfZ,halfZ);
    makeStrand(origin,new THREE.Vector3(origin.x+len,yEnd,zEnd),{layer:layerN,kind:'thick',delay:rnd(0,.70)});
  }
  for(let i=0;i<nThin;i++){
    const angle=rnd(-Math.PI*.42,Math.PI*.42), zAngle=rnd(-.35,.35), len=dx*rnd(.30,1.05);
    const yEnd=origin.y+Math.tan(angle)*len*rnd(.30,.65), zEnd=origin.z+Math.tan(zAngle)*len+rnd(-halfZ*.5,halfZ*.5);
    makeStrand(origin,new THREE.Vector3(origin.x+len,yEnd,zEnd),{layer:layerN,kind:'thin',delay:rnd(0,.80)});
  }
  return mains;
}

// ══════════════════════════════════════════════════════════
//  TERMINAL NODES & LABELS

function addTerminal(strand){
  const p=strand.endPt;
  const core=new THREE.Mesh(new THREE.SphereGeometry(.045,6,6),mkMat(C.bright,.88)); core.position.copy(p); scene.add(core);
  const aura=mkSprite(glowTexEndpt,0x9b7dff,.28,.75); aura.position.copy(p); scene.add(aura);
  const hit=new THREE.Mesh(new THREE.SphereGeometry(.55,7,7),new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false}));
  hit.position.copy(p); scene.add(hit);
  strand.termCore=core; strand.termHalo=aura; strand.hitMesh=hit;
  if(strand.layer<3) clickable.push({hit,strand});
  else clickable.push({hit,strand}); // L3 still clickable for card
  // Label
  if(strand.nodeData){
    const el=document.createElement('div'); el.className='node-label';
    // Dot
    const dot=document.createElement('span'); dot.className='node-label-dot';
    const dc=dotColor(strand.nodeData.card?.tag||'');
    dot.style.cssText=`background:${dc};color:${dc};box-shadow:0 0 5px ${dc};`;
    el.appendChild(dot);
    // Text
    el.appendChild(document.createTextNode(strand.nodeData.label));
    labelLayer.appendChild(el);
    labelMap.set(strand,el);
  }
}

function addSparks(strand){
  for(let i=0;i<1+Math.floor(Math.random()*2);i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(.038,6,6),mkMat(C.bright,.85)); scene.add(m);
    sparks.push({strand,t:Math.random(),speed:rnd(.07,.20),mesh:m});
  }
}

// ══════════════════════════════════════════════════════════
//  GROW ENGINE
// ══════════════════════════════════════════════════════════
function growStrand(s,dt){
  if(!s.growing||s.done||s.closing||s.gone)return;
  s.timer+=dt; if(s.timer<s.delay)return;
  s.progress=Math.min(1,(s.timer-s.delay)/s.duration);
  s.geos.forEach(g=>{const total=s.isLine?g.attributes.position.count:g.index.count; g.setDrawRange(0,Math.floor(total*s.progress));});
  if(s.progress>=1&&!s.done){s.done=true; s.growing=false; if(s.kind==='main'){addTerminal(s); addSparks(s);}}
}
function checkLayerDone(n){const ls=strands.filter(s=>s.layer===n&&!s.gone); return ls.length>0&&ls.every(s=>s.done||s.closing);}

// ══════════════════════════════════════════════════════════
//  CLOSE LAYER
// ══════════════════════════════════════════════════════════
function closeLayer(n){
  if(depth<n)return;
  for(let i=clickable.length-1;i>=0;i--){
    if(clickable[i].strand.layer!==n)continue;
    const{hit,strand}=clickable[i]; scene.remove(hit);
    [strand.termCore,strand.termHalo].forEach(m=>m&&scene.remove(m));
    // Remove label
    const el=labelMap.get(strand); if(el){el.remove(); labelMap.delete(strand);}
    clickable.splice(i,1);
  }
  strands.filter(s=>s.layer===n&&!s.gone).forEach(s=>{s.closing=true; s.closingAlpha=1; s.closingOps=s.meshes.map(m=>m.material.opacity);});
  depth=n-1; layerDone[n-1]=false;
  if(n===2){selBranch[0]=null; lookYTgt=0;}
  else if(n===3){selBranch[1]=null; lookYTgt=selBranch[0]?selBranch[0].endPt.y*.40:0;}
  document.getElementById('layer-ui').textContent=depth>0?`LAYER ${depth} · 3`:'LAYER 1 · 3';
  hideCard();
}

function showCard(nodeData){
  if(!nodeData)return;
  const cd=nodeData.card; if(!cd)return;
  document.getElementById('card-tag').textContent=cd.tag||'';
  document.getElementById('card-title').textContent=cd.title||'';
  document.getElementById('card-insight').textContent=cd.insight||cd.note||'';
  // Triggers
  const tEl=document.getElementById('card-triggers'); tEl.innerHTML='';
  if(cd.triggers&&cd.triggers.length){
    cd.triggers.forEach(t=>{const li=document.createElement('li'); li.textContent=t; tEl.appendChild(li);});
    document.getElementById('card-s-triggers').style.display='';
  } else { document.getElementById('card-s-triggers').style.display='none'; }
  // Origin
  if(cd.origin){ document.getElementById('card-origin').textContent=cd.origin; document.getElementById('card-s-origin').style.display=''; }
  else document.getElementById('card-s-origin').style.display='none';
  // Themes
  if(cd.themes){ document.getElementById('card-themes').textContent=cd.themes; document.getElementById('card-s-themes').style.display=''; }
  else document.getElementById('card-s-themes').style.display='none';
  // Divider
  document.getElementById('card-div1').style.display=(cd.origin||cd.themes)?'':'none';
  // Mobile → peek (collapsed teaser); desktop → open
  if(isMobile){
    cardEl.classList.remove('open');
    cardEl.classList.add('peek');
  } else {
    cardEl.classList.remove('peek');
    cardEl.classList.add('open');
  }
}
function hideCard(){ cardEl.classList.remove('open','peek'); }
document.getElementById('card-close').addEventListener('click',()=>hideCard());
// Card handle: toggle peek ↔ open on mobile
document.getElementById('card-handle').addEventListener('click',e=>{
  e.stopPropagation();

    cardEl.classList.remove('open'); cardEl.classList.add('peek');

});

function openLayer1(){

// Highlight selected strand differently in each theme

  } else {
    parent.meshes.slice(0,2).forEach((m,i)=>{m.material.opacity=Math.min(1,m.material.opacity*(i===0?1.9:1.5)); m.material.color.lerp(C.bright,.35);});

//  RAYCASTER / INPUT
// ══════════════════════════════════════════════════════════
const ray=new THREE.Raycaster(), mouse=new THREE.Vector2();

window.addEventListener('click',e=>{
  if(dragMoved>10)return;
  mouse.set((e.clientX/window.innerWidth)*2-1,-(e.clientY/window.innerHeight)*2+1);
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(clickable.map(c=>c.hit),false);
  if(!hits.length)return;
  const ct=clickable.find(c=>c.hit===hits[0].object); if(!ct)return;
  const sl=ct.strand.layer;

  if(sl===3){
    // Leaf node — always just show card
    showCard(ct.strand.nodeData);
  } else if(sl===2){
    // Close L3 if a different L2 node was selected (or L3 already open)
    if(depth>=3) closeLayer(3);
    // Now open L3 from this L2 — guard inside openLayer3 handles double-open
    if(layerDone[1]) openLayer3(ct.strand);
  } else if(sl===1){
    // Close any open deeper layers first, then open L2 from this L1 node
    if(depth>=3) closeLayer(3);
    if(depth>=2) closeLayer(2);
    if(layerDone[0]) openLayer2(ct.strand);
  }
});

window.addEventListener('mousedown',e=>{drag=true;dragLX=e.clientX;dragLY=e.clientY;dragMoved=0;});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  dragMoved+=Math.abs(e.movementX)+Math.abs(e.movementY);
  orbYawTgt=clamp(orbYawTgt+(e.clientX-dragLX)*.0030,-MAX_YAW,MAX_YAW);
  orbPitTgt=clamp(orbPitTgt+(e.clientY-dragLY)*.0022,-MAX_PITCH,MAX_PITCH);
  dragLX=e.clientX; dragLY=e.clientY;
});
window.addEventListener('mouseup',()=>{drag=false;dragMoved=0;orbYawTgt=0;orbPitTgt=0;});
window.addEventListener('wheel',e=>{e.preventDefault();scrollV+=e.deltaY*.0026;},{passive:false});
let tX0=0, tY0=0, tMoved=0;
window.addEventListener('touchstart',e=>{
  tX0=e.touches[0].clientX; tY0=e.touches[0].clientY; tMoved=0; dragMoved=0;
},{passive:true});
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  const dx=e.touches[0].clientX-tX0, dy=e.touches[0].clientY-tY0;
  tMoved+=Math.abs(dx)+Math.abs(dy);
  // Horizontal → scroll; tiny vertical → orbit pitch
  scrollV-=dx*.005;
  orbPitTgt=clamp(orbPitTgt+dy*.0010,-MAX_PITCH,MAX_PITCH);
  tX0=e.touches[0].clientX; tY0=e.touches[0].clientY;
},{passive:false});
window.addEventListener('touchend',e=>{
  orbPitTgt=0;
  // Tap (< 10px movement) → fire a synthetic click for raycasting
  if(tMoved<10){
    const t=e.changedTouches[0];
    const syn=new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true});
    dragMoved=0;
    window.dispatchEvent(syn);
  }
  dragMoved=0;
},{passive:true});

// ══════════════════════════════════════════════════════════
//  LABEL UPDATER
// ══════════════════════════════════════════════════════════
function updateLabels(t){
  // Root label
  const rv=ROOT.clone().project(camera);
  rootLabel.style.left=((rv.x*.5+.5)*window.innerWidth)+'px';
  rootLabel.style.top=((-rv.y*.5+.5)*window.innerHeight)+'px';
  rootLabel.classList.toggle('visible',rv.z<1);

  labelMap.forEach((el,strand)=>{
    if(strand.gone||strand.closing){el.classList.remove('visible');return;}
    if(!strand.done){el.classList.remove('visible');return;}
    const v=strand.endPt.clone().project(camera);
    // Hide label when node is behind camera or outside NDC [-1,1] horizontally
    if(v.z>1||v.x<-1||v.x>1){el.classList.remove('visible');return;}
    el.style.left=((v.x*.5+.5)*window.innerWidth)+'px';
    el.style.top=((-v.y*.5+.5)*window.innerHeight)+'px';
    el.classList.add('visible');
  });
}

// ══════════════════════════════════════════════════════════
//  THEME SYSTEM
// ══════════════════════════════════════════════════════════
function setTheme(isLight){
  lightMode = isLight;
  const overlay = document.getElementById('fade-overlay');
  overlay.style.background = isLight ? 'rgba(244,244,246,0.95)' : 'rgba(0,0,4,0.95)';
  overlay.style.transition  = 'opacity 0.32s ease';
  overlay.style.opacity     = '1';

  setTimeout(()=>{
    const bl = isLight ? THREE.NormalBlending : THREE.AdditiveBlending;

    // Scene background + fog
    const bgHex = isLight ? 0xf4f4f6 : 0x01000c;
    scene.background.set(bgHex); scene.fog.color.set(bgHex);

    // Tone mapping —
    //   Light mode: NoToneMapping so #f4f4f6 renders as exact sRGB (ACES would push
    //   the near-white background toward white before bloom even touches it).
    //   Dark mode: restore ACESFilmic.
    renderer.toneMapping = isLight ? THREE.NoToneMapping : THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = isLight ? 1.0 : 1.45;

    // Bloom —
    //   Background linear luminance ≈ 0.914 (#f4f4f6 sRGB → linear).
    //   threshold = 0.94 sits just above the background so it does NOT bloom.
    //   White strand cores (blended pixel ≈ 0.989) DO exceed threshold → glow halos.
    //   High strength + wide radius = clearly visible neon halos around every strand.
    bloom.strength  = isLight ? 1.80  : 2.6;
    bloom.radius    = isLight ? 1.40  : 0.52;
    bloom.threshold = isLight ? 0.94  : 0.0;

    // Strands — remap colors, opacities, blending
    strands.forEach(s=>{
      if(s.gone)return;
      s.meshes.forEach((m,i)=>{
        const col = isLight ? s.lightCols[i] : s.baseCols[i];
        const op  = isLight ? s.lightOps[i]  : s.baseOps[i];
        if(col) m.material.color.copy(col);
        m.material.opacity = s.closing ? op*(s.closingAlpha||0) : op;
        m.material.blending = bl;
        m.material.needsUpdate = true;
      });
    });

    // Root glow — white core blooms, aura uses ring glow with NormalBlending
    rootGlowCore.material.color.set(0xffffff);
    rootGlowCore.material.opacity = isLight ? 0.88 : 0.92;
    rootGlowCore.material.blending = bl; rootGlowCore.material.needsUpdate = true;
    rootGlowAura.material.map     = isLight ? glowTexRing   : glowTexCore;
    rootGlowAura.material.color.setHex(isLight ? 0xcc60e0 : 0xb89aff);
    rootGlowAura.material.opacity  = isLight ? 0.55 : 0.22;
    rootGlowAura.material.blending = isLight ? THREE.NormalBlending : THREE.AdditiveBlending;
    rootGlowAura.material.needsUpdate = true;
    rootGlowAura.scale.setScalar(isLight ? 2.4 : 1.8);

    // Terminal nodes — white core blooms; halo uses ring glow (NormalBlending = visible pink ring)
    strands.forEach(s=>{
      if(!s.termCore)return;
      s.termCore.material.color.set(0xffffff);
      s.termCore.material.opacity = isLight ? 0.92 : 0.88;
      s.termCore.material.blending = bl; s.termCore.material.needsUpdate = true;
      if(s.termHalo){
        s.termHalo.material.map     = isLight ? glowTexRing   : glowTexEndpt;
        s.termHalo.material.color.setHex(isLight ? 0xd060a8 : 0x9b7dff);
        s.termHalo.material.opacity  = isLight ? 0.60 : 0.28;
        s.termHalo.material.blending = isLight ? THREE.NormalBlending : THREE.AdditiveBlending;
        s.termHalo.material.needsUpdate = true;
        s.termHalo.scale.setScalar(isLight ? 1.10 : 0.75);
      }
    });

    // Sparks
    sparks.forEach(sp=>{
      sp.mesh.material.color.set(0xffffff);
      sp.mesh.material.opacity = isLight ? 0.80 : 0.85;
      sp.mesh.material.blending = bl; sp.mesh.material.needsUpdate = true;
    });

    // Main strands — Three.js meshes hidden in light mode (canvas draws them instead)
    strands.forEach(s=>{
      if(s.kind!=='main'||s.gone)return;
      s.meshes.forEach(m=>{ m.visible=!isLight; });
    });

    // Ambient particles — hide in light mode
    particlesMesh.visible = !isLight;

    // CSS
    document.body.classList.toggle('light-mode', isLight);

    // Fade back out
    overlay.style.opacity = '0';
    setTimeout(()=>{ overlay.style.background=''; overlay.style.transition=''; }, 380);
  }, 280);
}

document.getElementById('theme-toggle').addEventListener('click',()=>setTheme(!lightMode));

// ══════════════════════════════════════════════════════════
//  BOOT + ANIMATION
// ══════════════════════════════════════════════════════════
setTimeout(()=>openLayer1(),180);
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.elapsedTime;

  strands.forEach(s=>growStrand(s,dt));
  if(depth>=1&&!layerDone[0]&&checkLayerDone(1))layerDone[0]=true;
  if(depth>=2&&!layerDone[1]&&checkLayerDone(2))layerDone[1]=true;
  if(depth>=3&&!layerDone[2]&&checkLayerDone(3))layerDone[2]=true;

  strands.forEach(s=>{
    if(!s.closing||s.gone)return;
    s.closingAlpha-=dt*1.6;
    if(s.closingAlpha<=0){s.gone=true;s.meshes.forEach(m=>scene.remove(m));}
    else s.meshes.forEach((m,i)=>m.material.opacity=(s.closingOps[i]||0)*s.closingAlpha);
  });
  for(let i=sparks.length-1;i>=0;i--){if(sparks[i].strand.gone){scene.remove(sparks[i].mesh);sparks.splice(i,1);}}

  // ── Intro (two-phase) ─────────────────────────
  if(intro.active){
    intro.timer+=dt;
    const elapsed=intro.timer-intro.delay;
    if(elapsed>0){
      // Phase 1 — camZ pull-back: easeOutExpo (snappy lift that settles into place)
      const zRaw=clamp(elapsed/intro.zDuration,0,1);
      camZ=lerp(intro.startZ,intro.endZ,easeOutExpo(zRaw));
      // Phase 2 — scrollX pan: starts after xDelay, easeInOutCubic (graceful arc)
      const xElapsed=elapsed-intro.xDelay;
      if(xElapsed>0){
        const xRaw=clamp(xElapsed/intro.xDuration,0,1);
        scrollX=lerp(intro.startX,intro.endX,easeInOutCubic(xRaw));
      }
      // Intro ends when both phases are done
      if(elapsed>=intro.xDelay+intro.xDuration){
        intro.active=false; camZ=intro.endZ; scrollX=intro.endX;
      }
    }
  }
  // ── Transition ─────────────────────────────────
  if(tran&&!tran.done){
    tran.timer+=dt;
    const raw=Math.min(1,tran.timer/tran.duration), e=easeInOutQuad(raw);
    scrollX=lerp(tran.startX,tran.endX,e); lookYTgt=lerp(tran.startY,tran.endY,e);
    if(!tran.branchFired&&tran.timer>=tran.branchDelay){tran.branchFired=true;tran.branchFn();}
    if(raw>=1){tran.done=true;scrollX=tran.endX;lookYTgt=tran.endY;}
  }
  // ── Scroll ──────────────────────────────────────
  const frozen=intro.active||(tran&&!tran.done);
  if(!frozen){
    scrollX+=scrollV; scrollV*=.832;
    if(depth>=3&&selBranch[1]&&scrollX<selBranch[1].endPt.x-5)closeLayer(3);
    if(depth>=2&&selBranch[0]&&scrollX<selBranch[0].endPt.x-7)closeLayer(2);
    const sMax=depth>=3?BX[3]+5:depth>=2?BX[2]+5:BX[1]+4;
    scrollX=clamp(scrollX,ROOT.x-2,sMax);
  } else scrollV=0;

  // ── Camera ──────────────────────────────────────
  lookY+=(lookYTgt-lookY)*.048;
  orbYaw+=(orbYawTgt-orbYaw)*.085; orbPit+=(orbPitTgt-orbPit)*.085;
  const sp=new THREE.Spherical(camZ,Math.PI/2-orbPit,orbYaw);
  const off=new THREE.Vector3().setFromSpherical(sp);
  camera.position.set(scrollX+off.x,lookY+off.y+Math.sin(t*.17)*.18,off.z);
  camera.lookAt(scrollX,lookY,0);

  // ── Terminals pulse ─────────────────────────────
  clickable.forEach((ct,i)=>{
    const s=ct.strand, p=.5+.5*Math.sin(t*2.8+i*1.37);
    if(s.termCore)s.termCore.material.opacity=.55+p*.32;
    if(s.termHalo){s.termHalo.material.opacity=.12+p*.18;const sc=.62+p*.32;s.termHalo.scale.set(sc,sc,sc);}
  });

  // ── Shimmer ─────────────────────────────────────
  strands.forEach((s,i)=>{
    if(!s.done||s.closing||s.gone||s.kind!=='main')return;
    s.meshes[0].material.opacity=(.76+.24*Math.sin(t*4+i*.89))*.72;
  });
  strands.forEach((s,i)=>{
    if(!s.done||s.closing||s.gone||s.kind!=='thick')return;
    s.meshes[0].material.opacity=s.baseOps[0]*(.92+.08*Math.sin(t*1.8+i*.55));
  });

  // ── Sparks ──────────────────────────────────────
  sparks.forEach(sp=>{
    if(sp.strand.gone||sp.strand.closing){sp.mesh.visible=false;return;}
    sp.mesh.visible=true; sp.t+=sp.speed*dt; if(sp.t>1)sp.t-=1;
    sp.mesh.position.copy(sp.strand.curve.getPoint(sp.t));
    sp.mesh.material.opacity=Math.sin(sp.t*Math.PI)*.70;
  });

  updateLabels(t);

  // ── Neon canvas (light mode main strands) ──────────────
  if(lightMode){
    neonCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
    strands.forEach(s=>{ if(s.kind==='main') drawNeonStrand(s); });
  }

  composer.render();
}

animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h); composer.setSize(w,h); bloom.resolution.set(w,h);
  resizeNeonCanvas();
});
</script>
</body>
